                for (let i = 0; i < hist.length; i++) {
                    const entry = hist[i];
                    for (let j = 0; j < entry.items.length; j++) {
                        const candidate = normaliseItemName(entry.items[j].name);
                        const score = candidate === needle ? 1.0 : wordJaccard(needle, candidate);
                        if (score < FUZZY_THRESHOLD || score <= bestScore) continue;
                        const a = entry.assignments[j];
                        if (!a || a.type === 'custom' || a.type === 'quantity') continue;
                        bestScore = score;
                        bestAssignment = a;
                        if (bestScore === 1.0) break; // can't do better
                    }
                    if (bestScore === 1.0) break;
                }
                return bestAssignment ? { assignment: bestAssignment, score: bestScore } : null;
            };

            const formatSuggestionLabel = (assignment) => {
                if (!assignment) return null;
                if (assignment === 'Shared') return 'Everyone';
                if (typeof assignment === 'string') return assignment; // group name e.g. "Adults"
                if (assignment.type === 'individuals') {
                    const people = assignment.people || [];
                    if (people.length === 0) return null;
                    return people.join(' & ');
                }
                return null;
            };

            const generateShareText = () => {
                const totals = calculateSummary();
                const totalBill = Object.values(totals).reduce((s, v) => s + v, 0);
                const date = receiptDate || new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

                // Build per-person item list with context labels
                const perPerson = {};
                config.people.forEach(p => { perPerson[p] = []; });

                const addFor = (person, amt, context) => {
                    if (person in perPerson) perPerson[person].push({ amt, context });
                };

                // Helper: join a list of names nicely e.g. "Rosie, Stu & Joe"
                const joinNames = (names) => {
                    if (names.length === 0) return '';
                    if (names.length === 1) return names[0];
                    return names.slice(0, -1).join(', ') + ' & ' + names[names.length - 1];
                };

                items.forEach((item, i) => {
                    const a = assignments[i];
                    if (!a) return;
                    const itemLine = item.name + '  £' + item.price.toFixed(2);

                    if (a === 'Shared') {
                        const amt = item.price / config.people.length;
                        const ctx = itemLine + '\n  (everyone · £' + amt.toFixed(2) + ' each)';
                        config.people.forEach(p => addFor(p, amt, ctx));

                    } else if (typeof a === 'string') {
                        const grp = config.groups.find(g => g.name === a);
                        if (grp && grp.members.length > 0) {
                            const amt = item.price / grp.members.length;
                            const ctx = grp.members.length === 1
                                ? itemLine + '\n  (just ' + grp.members[0] + ')'
                                : itemLine + '\n  (' + a + ' · £' + amt.toFixed(2) + ' each)';
                            grp.members.forEach(p => addFor(p, amt, ctx));
                        }

                    } else if (a.type === 'individuals') {
                        if (a.people && a.people.length > 0) {
                            const amt = item.price / a.people.length;
                            for (let j = 0; j < a.people.length; j++) {
                                const p = a.people[j];
                                const others = a.people.filter(x => x !== p);
                                const ctx = others.length === 0
                                    ? itemLine + '\n  (just ' + p + ')'
                                    : itemLine + '\n  (with ' + joinNames(others) + ' · £' + amt.toFixed(2) + ' each)';
                                addFor(p, amt, ctx);
                            }
                        }

                    } else if (a.type === 'custom') {
                        const keyMap = {};
                        config.people.forEach(p => { keyMap[p.toLowerCase()] = p; });
                        if (config.people.length > 0) keyMap['you'] = config.people[0];
                        const keys = Object.keys(a.splits);
                        for (let j = 0; j < keys.length; j++) {
                            const key = keys[j];
                            const pct = a.splits[key];
                            const name = keyMap[key] || keyMap[key.toLowerCase()];
                            if (name) {
                                const amt = (item.price * pct) / 100;
                                addFor(name, amt, itemLine + '\n  (custom split ' + pct.toFixed(0) + '%)');
                            }
                        }

                    } else if (a.type === 'quantity') {
                        const ppu = item.price / a.totalQty;
                        const g0 = config.groups[0], g1 = config.groups[1];
                        if (g0 && g0.members.length > 0) {
                            const amt = (ppu * a.splits.youLisa) / g0.members.length;
                            const ctx = itemLine + '\n  (' + g0.name + ': ' + a.splits.youLisa + ' of ' + a.totalQty + ' · £' + amt.toFixed(2) + ' each)';
                            g0.members.forEach(p => addFor(p, amt, ctx));
                        }
                        if (g1 && g1.members.length > 0) {
                            const amt = (ppu * a.splits.kids) / g1.members.length;
                            const ctx = itemLine + '\n  (' + g1.name + ': ' + a.splits.kids + ' of ' + a.totalQty + ' · £' + amt.toFixed(2) + ' each)';
                            g1.members.forEach(p => addFor(p, amt, ctx));
                        }
                    }
                });

                let text = '🛒 Sainsbury\'s · ' + date + '\nTotal: £' + totalBill.toFixed(2) + ' · ' + Object.keys(assignments).length + ' items\n';

                config.people.forEach(person => {
                    const pItems = perPerson[person] || [];
                    if (pItems.length === 0) return;
                    const personTotal = totals[person] || 0;
                    text += '\n── ' + person + ' · £' + personTotal.toFixed(2) + ' ──\n';
                    pItems.forEach(function(entry) { text += entry.context + '\n'; });
                });

                return text.trim();
            };
            // ────────────────────────────────────────────────────────────

            const generateShoppingListText = () => {
                const totals = calculateSummary();
                const totalBill = Object.values(totals).reduce((s, v) => s + v, 0);
                const date = receiptDate || new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

                const joinNames = (names) => {
                    if (names.length === 0) return '';
                    if (names.length === 1) return names[0];
                    return names.slice(0, -1).join(', ') + ' & ' + names[names.length - 1];
                };

                let text = '🛒 Sainsbury\'s · ' + date + '\nTotal: £' + totalBill.toFixed(2) + ' · ' + Object.keys(assignments).length + ' items\n\n';

                items.forEach((item, i) => {
                    const a = assignments[i];
                    if (!a) return;

                    let who = '';
                    if (a === 'Shared') {
                        who = 'Everyone';
                    } else if (typeof a === 'string') {
                        const grp = config.groups.find(g => g.name === a);
                        who = a;
                    } else if (a.type === 'individuals') {
                        who = joinNames(a.people || []);
                    } else if (a.type === 'custom') {
                        const parts = [];
                        const keyMap = {};
                        config.people.forEach(p => { keyMap[p.toLowerCase()] = p; });
                        if (config.people.length > 0) keyMap['you'] = config.people[0];
                        const keys = Object.keys(a.splits);
                        for (let j = 0; j < keys.length; j++) {
                            const key = keys[j];
                            const name = keyMap[key] || keyMap[key.toLowerCase()];
                            if (name) parts.push(name + ' ' + a.splits[key].toFixed(0) + '%');
                        }
                        who = parts.join(', ');
                    } else if (a.type === 'quantity') {
                        const g0 = config.groups[0], g1 = config.groups[1];
                        const parts = [];
                        if (g0 && a.splits.youLisa > 0) parts.push(g0.name + ': ' + a.splits.youLisa);
                        if (g1 && a.splits.kids > 0) parts.push(g1.name + ': ' + a.splits.kids);
                        who = parts.join(', ');
                    }

                    text += item.name + '  £' + item.price.toFixed(2) + '  [' + who + ']\n';
                });

                return text.trim();
            };

            const getTotalPercentage = () => {
                return Object.values(customSplit).reduce((sum, val) => sum + val, 0);
            };

            const getTotalQuantity = () => {
                return Object.values(quantitySplit).reduce((sum, val) => sum + val, 0);
            };

            const currentItem = items[currentItemIndex];
            const progress = items.length > 0 ? ((currentItemIndex + 1) / items.length) * 100 : 0;
            const totalPercentage = getTotalPercentage();
            const currentQty = currentItem ? (parseFloat(currentItem.quantity) || 1) : 1;
            const totalQty = getTotalQuantity();

            // Real-time: sync any bill_history UPDATE into localStorage immediately
            useEffect(function() {
                if (!_sb || !_user) return;
                const channel = _sb.channel('bill-completions-' + (_user.id || 'user'))
                    .on('postgres_changes', {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'bill_history'
                    }, function(payload) {
                        const row = payload.new;
                        if (!row) return;
                        // Map DB row → app history entry
                        const updated = {
                            id:             row.id,
                            savedAt:        new Date(row.saved_at).getTime(),
                            updatedAt:      row.updated_at ? new Date(row.updated_at).getTime() : null,
                            items:          row.items,
                            assignments:    row.assignments,
                            totals:         row.totals,
                            totalBill:      Number(row.total_bill),
                            receiptDate:    row.receipt_date || '',
                            config:         row.config_snapshot,
                            assignedTo:     row.assigned_to || null,
                            assignedBy:     row.assigned_by || null,
                            assignedStatus: row.assigned_status || null,
                            completedBy:    row.completed_by || null,
                            completedAt:    row.completed_at ? new Date(row.completed_at).getTime() : null,
                        };
                        // Write into localStorage
                        try {
                            const existing = getHistory();
                            const idx = existing.findIndex(function(e) { return e.id === updated.id; });
                            if (idx >= 0) { existing[idx] = updated; } else { existing.unshift(updated); }
                            localStorage.setItem(HISTORY_KEY, JSON.stringify(existing));
                        } catch(e) {}
                        // Notify if someone completed a bill that was assigned by me
                        if (row.assigned_status === 'completed' &&
                            row.assigned_by === _user.email &&
                            row.completed_by !== _user.email) {
                            const who = (row.completed_by || 'Someone').split('@')[0];
                            const when = row.receipt_date || 'a receipt';
                            setNotification({ message: who + ' has finished the ' + when + ' receipt' });
                            setTimeout(function() { setNotification(null); }, 8000);
                        }
                        setHistoryVersion(function(v) { return v + 1; });
                    })
                    .subscribe();
                return function() { _sb.removeChannel(channel); };
            }, []);

            // Handle ?bill=<id> link: load the specific bill when history becomes available
            useEffect(function() {
                if (!window._pendingBillId) return;
                const pendingId = window._pendingBillId;
                const allBills = getHistory();
                for (let i = 0; i < allBills.length; i++) {
                    if (allBills[i].id === pendingId) {
                        window._pendingBillId = null;
                        loadBillForEditing(allBills[i], true);
                        break;
                    }
                }
            }, [historyVersion]);

            // ── Settings Screen ─────────────────────────────────────────
            if (showSettings) {
                const unassigned = config.people.filter(p => !getPersonGroup(p));
                return (
                    <>
                    {notification && (
                        <div style={{ position: 'fixed', top: 'max(20px, env(safe-area-inset-top))', left: '50%', transform: 'translateX(-50%)', zIndex: 9999, background: '#065f46', color: 'white', borderRadius: '12px', padding: '12px 20px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', fontSize: '14px', fontWeight: 600, maxWidth: '90vw', textAlign: 'center', display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span>✅ {notification.message}</span>
                            <button onClick={function() { setNotification(null); }} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', fontSize: '16px', padding: '0', lineHeight: 1, flexShrink: 0 }}>✕</button>
                        </div>
                    )}
                    <div className="card">
                        <div className="screen-bar" style={{ marginBottom: '4px' }}>
                            <h1 className="title" style={{ fontSize: '22px', marginBottom: 0 }}>Settings</h1>
                            <button className="nano-btn" onClick={() => setShowSettings(false)} title="Close settings" style={{ fontSize: '14px', fontWeight: 700 }}>✕</button>
                        </div>
                        <p className="subtitle">Manage people and groups</p>

                        {/* Account section */}
                        <div style={{ marginBottom: '24px', padding: '14px 16px', background: '#f9fafb', borderRadius: '10px', border: '1px solid #e5e7eb' }}>
                            <div style={{ fontSize: '12px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '10px' }}>Account</div>
                            <div style={{ fontSize: '14px', color: '#374151', marginBottom: '10px' }}>
                                <span style={{ color: '#9ca3af' }}>Signed in as </span>
                                <strong>{_user ? _user.email : ''}</strong>
                            </div>
                            <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                <button onClick={() => { setShowSettings(false); setShowUsers(true); }}
                                    style={{ padding: '7px 14px', background: '#eff6ff', border: '1px solid #bfdbfe', borderRadius: '8px', fontSize: '13px', fontWeight: 600, color: '#1d4ed8', cursor: 'pointer' }}>
                                    👥 Manage users
                                </button>
                                <button onClick={() => { if (_sb) _sb.auth.signOut(); setShowSettings(false); }}
                                    style={{ padding: '7px 14px', background: '#fef2f2', border: '1px solid #fecaca', borderRadius: '8px', fontSize: '13px', fontWeight: 600, color: '#dc2626', cursor: 'pointer' }}>
                                    Sign out
                                </button>
                            </div>
                            {cloudSyncStatus && (
                                <div style={{ marginTop: '10px', fontSize: '12px', color: cloudSyncStatus === 'synced' ? '#10b981' : cloudSyncStatus === 'error' ? '#ef4444' : '#f59e0b' }}>
                                    {cloudSyncStatus === 'synced' ? '✓ Cloud synced' : cloudSyncStatus === 'error' ? '✗ Sync failed' : '⏳ Syncing…'}
                                </div>
                            )}
                        </div>

                        {/* ── People ── */}
                        <div className="cfg-section-head">
                            <span className="cfg-section-title">👤 People</span>
                        </div>
                        <table className="cfg-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Groups (click to toggle)</th>
                                    <th style={{width:'80px'}}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {config.people.map((person, idx) => (
                                    <tr key={person}>
                                        <td>
                                            {editingPerson === idx ? (
                                                <input
                                                    className="cfg-input"
                                                    defaultValue={person}
                                                    autoFocus
                                                    onBlur={e => renamePerson(person, e.target.value)}
                                                    onKeyDown={e => { if (e.key === 'Enter') renamePerson(person, e.target.value); if (e.key === 'Escape') setEditingPerson(null); }}
                                                />
                                            ) : (
                                                <span
                                                    style={{cursor:'pointer', fontWeight:600}}
                                                    onClick={() => setEditingPerson(idx)}
                                                    title="Click to rename"
                                                >{person} ✏️</span>
                                            )}
                                        </td>
                                        <td>
                                            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                                                {config.groups.length === 0
                                                    ? <span className="no-group-tag">No groups defined</span>
                                                    : config.groups.map(g => {
                                                        const inGroup = g.members.includes(person);
                                                        return (
                                                            <button
                                                                key={g.name}
                                                                onClick={() => togglePersonGroup(person, g.name)}
                                                                className="cfg-btn"
                                                                style={{
                                                                    border: `1.5px solid ${inGroup ? '#818cf8' : '#d1d5db'}`,
                                                                    background: inGroup ? '#e0e7ff' : '#f9fafb',
                                                                    color: inGroup ? '#3730a3' : '#9ca3af',
                                                                    fontWeight: inGroup ? 700 : 500
                                                                }}
                                                            >
                                                                {inGroup ? '✓ ' : ''}{g.name}
                                                            </button>
                                                        );
                                                    })
                                                }
                                            </div>
                                        </td>
                                        <td>
                                            <button className="cfg-btn cfg-btn-red" onClick={() => removePerson(person)}>Remove</button>
                                        </td>
                                    </tr>
                                ))}
                                <tr className="cfg-add-row">
                                    <td colSpan="2">
                                        <input
                                            className="cfg-input"
                                            placeholder="Add new person..."
                                            value={newPersonName}
                                            onChange={e => setNewPersonName(e.target.value)}
                                            onKeyDown={e => { if (e.key === 'Enter') addPerson(); }}
                                        />
                                    </td>
                                    <td>
                                        <button className="cfg-btn cfg-btn-green" onClick={addPerson}>Add</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        {/* ── Groups ── */}
                        <div className="cfg-section-head" style={{marginTop:'28px'}}>
                            <span className="cfg-section-title">👥 Groups</span>
                        </div>
                        <table className="cfg-table">
                            <thead>
                                <tr>
                                    <th>Group</th>
                                    <th>Members</th>
                                    <th style={{width:'80px'}}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {config.groups.map((group, idx) => (
                                    <tr key={group.name}>
                                        <td>
                                            {editingGroup === idx ? (
                                                <input
                                                    className="cfg-input"
                                                    defaultValue={group.name}
                                                    autoFocus
                                                    onBlur={e => renameGroup(group.name, e.target.value)}
                                                    onKeyDown={e => { if (e.key === 'Enter') renameGroup(group.name, e.target.value); if (e.key === 'Escape') setEditingGroup(null); }}
                                                />
                                            ) : (
                                                <span
                                                    style={{cursor:'pointer', fontWeight:600}}
                                                    onClick={() => setEditingGroup(idx)}
                                                    title="Click to rename"
                                                >{group.name} ✏️</span>
                                            )}
                                        </td>
                                        <td>
                                            {group.members.length === 0
                                                ? <span className="no-group-tag">Empty</span>
                                                : group.members.map(m => <span key={m} className="group-tag" style={{marginRight:'4px'}}>{m}</span>)
                                            }
                                        </td>
                                        <td>
                                            <button className="cfg-btn cfg-btn-red" onClick={() => removeGroup(group.name)}>Remove</button>
                                        </td>
                                    </tr>
                                ))}
                                <tr className="cfg-add-row">
                                    <td colSpan="2">
                                        <input
                                            className="cfg-input"
                                            placeholder="Add new group..."
                                            value={newGroupName}
                                            onChange={e => setNewGroupName(e.target.value)}
                                            onKeyDown={e => { if (e.key === 'Enter') addGroup(); }}
                                        />
                                    </td>
                                    <td>
                                        <button className="cfg-btn cfg-btn-green" onClick={addGroup}>Add</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        {unassigned.length > 0 && (
                            <div style={{marginTop:'16px', padding:'12px', background:'#fef3c7', borderRadius:'8px', fontSize:'13px', color:'#92400e'}}>
                                ⚠️ Not in any group: {unassigned.join(', ')}
                            </div>
                        )}

                        <button className="button button-primary" onClick={() => setShowSettings(false)} style={{marginTop:'24px', width:'100%'}}>
                            Done
                        </button>
                    </div>
                    </>
                );
            }
            // ────────────────────────────────────────────────────────────

            // ── User Management Screen ───────────────────────────────────
            if (showUsers) return <UserManagementScreen onClose={() => setShowUsers(false)} />;

            // ── History Screen ──────────────────────────────────────────
            // Refresh from cloud whenever history screen is opened or historyVersion bumps
            useEffect(function() {
                if (!showHistory || !_user) return;
                setHistoryLoading(true);
                loadData().then(function(remote) {
                    if (!remote) { setHistoryLoading(false); return; }
                    const merged = mergeHistories(getHistory(), remote.history || []);
                    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(merged)); } catch {}
                    setHistoryVersion(function(v) { return v + 1; });
                    setHistoryLoading(false);
                }).catch(function() { setHistoryLoading(false); });
            }, [showHistory]);

            if (showHistory) {
                void historyVersion; // read to trigger re-render when history changes
                const _rawBills = getHistory();
                const bills = Array.isArray(_rawBills) ? _rawBills : [];
                return (
                    <>
                    {notification && (
                        <div style={{ position: 'fixed', top: 'max(20px, env(safe-area-inset-top))', left: '50%', transform: 'translateX(-50%)', zIndex: 9999, background: '#065f46', color: 'white', borderRadius: '12px', padding: '12px 20px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', fontSize: '14px', fontWeight: 600, maxWidth: '90vw', textAlign: 'center', display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span>✅ {notification.message}</span>
                            <button onClick={function() { setNotification(null); }} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', fontSize: '16px', padding: '0', lineHeight: 1, flexShrink: 0 }}>✕</button>
                        </div>
                    )}
                    <div className="card">
                        <div className="screen-bar" style={{ marginBottom: '4px' }}>
                            <div style={{ display: 'flex', alignItems: 'baseline', gap: '10px' }}>
                                <h1 className="title" style={{ fontSize: '22px', marginBottom: 0 }}>Past Bills</h1>
                                {historyLoading && <span style={{ fontSize: '12px', color: '#9ca3af' }}>syncing…</span>}
                            </div>
                            <button className="nano-btn" onClick={() => setShowHistory(false)} title="Close" style={{ fontSize: '14px', fontWeight: 700 }}>✕</button>
                        </div>
                        <p className="subtitle" style={{ marginBottom: '20px' }}>{bills.length} saved bill{bills.length !== 1 ? 's' : ''}</p>

                        {bills.length === 0 ? (
                            <div style={{ textAlign: 'center', color: '#9ca3af', padding: '40px 0', fontSize: '15px' }}>
                                No bills saved yet.<br/>
                                <span style={{ fontSize: '13px' }}>Bills are saved automatically when you upload a receipt.</span>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {bills.map(function(entry) {
                                    const isExpanded = expandedPerson === entry.id;
                                    const isConfirming = deletingHistoryId === entry.id;
                                    const receiptDateStr = entry.receiptDate || null;
                                    const uploadedStr = new Date(entry.savedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

                                    const entryItems = entry.items || [];
                                    const entryAssignments = entry.assignments || {};
                                    const entryCfg = entry.config || { people: [], groups: [] };
                                    const entryPeople = entryCfg.people || [];
                                    const assignedCount = Object.keys(entryAssignments).length;
                                    const totalCount = entryItems.length;
                                    const fullyAssigned = totalCount > 0 && assignedCount >= totalCount;
                                    const isActive = entry.id === sessionId;
                                    const updatedStr = entry.updatedAt
                                        ? new Date(entry.updatedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                                        : null;

                                    return (
                                        <div key={entry.id} style={{ border: '1px solid ' + (isConfirming ? '#fca5a5' : isActive ? '#f59e0b' : '#e5e7eb'), borderRadius: '12px', overflow: 'hidden', transition: 'border-color 0.2s' }}>
                                            {/* Header row */}
                                            {isConfirming ? (
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', background: '#fef2f2' }}>
                                                    <span style={{ fontSize: '13px', fontWeight: 600, color: '#991b1b' }}>Delete this bill?</span>
                                                    <div style={{ display: 'flex', gap: '8px' }}>
                                                        <button onClick={() => setDeletingHistoryId(null)}
                                                            style={{ padding: '6px 14px', background: 'white', border: '1px solid #e5e7eb', borderRadius: '8px', fontSize: '13px', fontWeight: 600, color: '#374151', cursor: 'pointer' }}>
                                                            Cancel
                                                        </button>
                                                        <button onClick={() => deleteHistoryEntry(entry.id)}
                                                            style={{ padding: '6px 14px', background: '#ef4444', border: 'none', borderRadius: '8px', fontSize: '13px', fontWeight: 700, color: 'white', cursor: 'pointer' }}>
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', background: isExpanded ? '#fffbeb' : (isActive ? '#fffdf5' : 'white'), cursor: 'pointer' }}
                                                onClick={() => { setExpandedPerson(isExpanded ? null : entry.id); setHistoryExpandedTab('items'); }}>
                                                <div style={{ flex: 1, minWidth: 0 }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                                                        <span style={{ fontWeight: 700, color: '#1f2937', fontSize: '15px' }}>
                                                            {receiptDateStr || <span style={{ color: '#9ca3af', fontStyle: 'italic' }}>Date unknown</span>}
                                                        </span>
                                                        {isActive && <span style={{ fontSize: '11px', fontWeight: 700, color: '#92400e', background: '#fef3c7', border: '1px solid #fde68a', borderRadius: '4px', padding: '1px 6px' }}>IN PROGRESS</span>}
                                                    </div>
                                                    <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '1px' }}>Uploaded {uploadedStr}</div>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginTop: '4px', flexWrap: 'wrap' }}>
                                                        <span style={{
                                                            fontSize: '11px', fontWeight: 600, borderRadius: '4px', padding: '2px 7px',
                                                            background: fullyAssigned ? '#dcfce7' : '#fef9c3',
                                                            color: fullyAssigned ? '#15803d' : '#854d0e',
                                                            border: '1px solid ' + (fullyAssigned ? '#bbf7d0' : '#fde68a')
                                                        }}>
                                                            {fullyAssigned ? '✓ Fully assigned' : assignedCount + ' of ' + totalCount + ' assigned'}
                                                        </span>
                                                        {updatedStr && <span style={{ fontSize: '11px', color: '#9ca3af' }}>· updated {updatedStr}</span>}
                                                        {entry.assignedTo && (
                                                            <span style={{
                                                                fontSize: '11px', fontWeight: 600, borderRadius: '4px', padding: '2px 7px',
                                                                background: entry.assignedStatus === 'completed' ? '#dcfce7' : '#eff6ff',
                                                                color: entry.assignedStatus === 'completed' ? '#15803d' : '#1d4ed8',
                                                                border: '1px solid ' + (entry.assignedStatus === 'completed' ? '#bbf7d0' : '#bfdbfe')
                                                            }}>
                                                                {entry.assignedStatus === 'completed'
                                                                    ? '✅ Done by ' + (entry.completedBy || entry.assignedTo).split('@')[0]
                                                                    : '⏳ Shared with ' + entry.assignedTo.split('@')[0]}
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flexShrink: 0 }}>
                                                    <span style={{ fontWeight: 700, color: '#92400e', fontSize: '18px' }}>£{(entry.totalBill || 0).toFixed(2)}</span>
                                                    <button onClick={function(e) { e.stopPropagation(); fetchAppUsers(); setShowAssignModal(isExpanded && showAssignModal === entry.id ? null : entry.id); }}
                                                        style={{ background: showAssignModal === entry.id ? '#1d4ed8' : '#eff6ff', border: '1px solid #bfdbfe', borderRadius: '8px', fontSize: '12px', fontWeight: 600, color: showAssignModal === entry.id ? 'white' : '#1d4ed8', cursor: 'pointer', padding: '4px 10px', lineHeight: 1.4, flexShrink: 0 }}
                                                        title="Share with another user">
                                                        Share
                                                    </button>
                                                    <button onClick={function(e) { e.stopPropagation(); loadBillForEditing(entry); }}
                                                        style={{ background: '#f0fdf4', border: '1px solid #86efac', borderRadius: '8px', fontSize: '12px', fontWeight: 600, color: '#15803d', cursor: 'pointer', padding: '4px 10px', lineHeight: 1.4, flexShrink: 0 }}
                                                        title="Load this bill and continue">
                                                        Continue →
                                                    </button>
                                                    <button onClick={function(e) { e.stopPropagation(); setDeletingHistoryId(entry.id); }}
                                                        style={{ background: 'none', border: 'none', fontSize: '16px', cursor: 'pointer', color: '#d1d5db', padding: '4px', lineHeight: 1 }}
                                                        title="Delete this bill">🗑️</button>
                                                    <span style={{ color: '#9ca3af', fontSize: '12px' }}>{isExpanded ? '▲' : '▼'}</span>
                                                </div>
                                            </div>
                                            )}

                                            {/* Share user picker */}
                                            {showAssignModal === entry.id && (
                                                <div style={{ padding: '12px 16px', borderTop: '1px solid #e5e7eb', background: '#f0f9ff' }}>
                                                    <div style={{ fontSize: '12px', fontWeight: 700, color: '#1d4ed8', marginBottom: '8px' }}>Share with:</div>
                                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '8px' }}>
                                                        {appUsers
                                                            .filter(function(u) { return !_user || u.email !== _user.email; })
                                                            .map(function(u) {
                                                                return (
                                                                    <button key={u.id}
                                                                        onClick={function() { assignBillTo(entry, u.email); }}
                                                                        style={{ padding: '6px 14px', background: 'white', border: '1px solid #bfdbfe', borderRadius: '8px', fontSize: '13px', cursor: 'pointer', fontWeight: 600, color: '#1d4ed8' }}>
                                                                        {u.email.split('@')[0]}
                                                                    </button>
                                                                );
                                                            })
                                                        }
                                                        {appUsers.filter(function(u) { return !_user || u.email !== _user.email; }).length === 0 && (
                                                            <span style={{ fontSize: '13px', color: '#9ca3af' }}>No other users yet — add someone in Settings → Manage Users</span>
                                                        )}
                                                    </div>
                                                    <button onClick={function() { setShowAssignModal(null); }}
                                                        style={{ background: 'none', border: 'none', fontSize: '12px', color: '#9ca3af', cursor: 'pointer', padding: 0 }}>
                                                        Cancel
                                                    </button>
                                                </div>
                                            )}

                                            {/* Per-person totals strip (always visible) */}
                                            <div style={{ display: 'flex', flexWrap: 'wrap', borderTop: '1px solid #f3f4f6', background: '#fafafa' }}>
                                                {entryPeople.map(function(person, idx) {
                                                    return (
                                                        <div key={person} style={{ flex: '1 0 calc(33% - 1px)', padding: '8px 14px', borderRight: (idx + 1) % 3 !== 0 ? '1px solid #f3f4f6' : 'none', borderBottom: idx < entryPeople.length - 3 ? '1px solid #f3f4f6' : 'none' }}>
                                                            <div style={{ fontSize: '11px', color: '#6b7280' }}>{person}</div>
                                                            <div style={{ fontWeight: 700, color: '#1f2937', fontSize: '13px' }}>£{((entry.totals || {})[person] || 0).toFixed(2)}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* Expanded detail */}
                                            {isExpanded && (
                                                <div style={{ borderTop: '1px solid #e5e7eb' }}>
                                                    {/* Tab toggle */}
                                                    <div style={{ display: 'flex', borderBottom: '1px solid #e5e7eb', background: '#f9fafb' }}>
                                                        <button
                                                            onClick={() => setHistoryExpandedTab('items')}
                                                            style={{ flex: 1, padding: '9px', border: 'none', background: historyExpandedTab === 'items' ? 'white' : 'transparent', fontSize: '12px', fontWeight: 700, color: historyExpandedTab === 'items' ? '#1f2937' : '#9ca3af', cursor: 'pointer', borderBottom: historyExpandedTab === 'items' ? '2px solid #f59e0b' : '2px solid transparent' }}>
                                                            All Items
                                                        </button>
                                                        <button
                                                            onClick={() => setHistoryExpandedTab('byPerson')}
                                                            style={{ flex: 1, padding: '9px', border: 'none', background: historyExpandedTab === 'byPerson' ? 'white' : 'transparent', fontSize: '12px', fontWeight: 700, color: historyExpandedTab === 'byPerson' ? '#1f2937' : '#9ca3af', cursor: 'pointer', borderBottom: historyExpandedTab === 'byPerson' ? '2px solid #f59e0b' : '2px solid transparent' }}>
                                                            By Person
                                                        </button>
                                                    </div>

                                                    {/* All Items tab */}
                                                    {historyExpandedTab === 'items' && (
                                                        <div style={{ maxHeight: '340px', overflowY: 'auto' }}>
                                                            {entryItems.map(function(item, i) {
                                                                const a = entryAssignments[i];
                                                                let who = 'Unassigned';

                                                                else if (typeof a === 'string') who = a;
                                                                else if (a && a.type === 'individuals') who = a.people.join(', ');

                                                                else if (a && a.type === 'quantity') who = 'Qty split';

                                                                                <span style={{ fontWeight: 700, color: '#1f2937', fontSize: '13px' }}>{person}</span>
                                                                                <span style={{ fontWeight: 700, color: '#92400e', fontSize: '14px' }}>£{personTotal.toFixed(2)}</span>
                                                                            </div>

                                                                                <div style={{ padding: '6px 16px 8px', fontSize: '12px', color: '#9ca3af' }}>No items</div>

                                                                                            <span style={{ fontWeight: 600, color: '#374151', whiteSpace: 'nowrap' }}>£{pi.amount.toFixed(2)}</span>
                                                                                        </div>
                                                                                    );
                                                                                })
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        );
                                                    })()}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                        <button className="button button-back" onClick={() => setShowHistory(false)} style={{ width: '100%', marginTop: '20px' }}>
                            ← Back
                        </button>
                    </div>
                    </>

            }
            // ────────────────────────────────────────────────────────────

            if (loading) {
                return (
                    <>
                    {notification && (
                        <div style={{ position: 'fixed', top: 'max(20px, env(safe-area-inset-top))', left: '50%', transform: 'translateX(-50%)', zIndex: 9999, background: '#065f46', color: 'white', borderRadius: '12px', padding: '12px 20px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', fontSize: '14px', fontWeight: 600, maxWidth: '90vw', textAlign: 'center', display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span>✅ {notification.message}</span>
                            <button onClick={function() { setNotification(null); }} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', fontSize: '16px', padding: '0', lineHeight: 1, flexShrink: 0 }}>✕</button>
                        </div>
                    )}
                    <div className="card">
                        <div className="screen-bar">
                            <span style={{ fontSize: '11px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.07em' }}>Reading receipt…</span>
                            <div className="screen-bar-icons">
                                <button className="nano-btn" onClick={openHistoryScreen} title="Past bills">📋</button>
                                <button className="nano-btn" onClick={() => setShowSettings(true)} title="Settings">⚙️</button>
                            </div>
                        </div>
                        <div className="loading">Loading PDF...</div>
                    </div>
                    </>
                );
            }

            if (showSummary) {
                const totals = calculateSummary();
                const totalBill = Object.values(totals).reduce((sum, val) => sum + val, 0);
                const breakdown = buildBreakdown();
                const unassignedCount = items.filter((_, i) => !assignments[i]).length;

                return (
                    <>
                    {notification && (
                        <div style={{ position: 'fixed', top: 'max(20px, env(safe-area-inset-top))', left: '50%', transform: 'translateX(-50%)', zIndex: 9999, background: '#065f46', color: 'white', borderRadius: '12px', padding: '12px 20px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', fontSize: '14px', fontWeight: 600, maxWidth: '90vw', textAlign: 'center', display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <span>✅ {notification.message}</span>
                            <button onClick={function() { setNotification(null); }} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', fontSize: '16px', padding: '0', lineHeight: 1, flexShrink: 0 }}>✕</button>
                        </div>
                    )}
                    <div className="card">
                        <div className="screen-bar" style={{ marginBottom: '12px' }}>
                            <span style={{ fontSize: '11px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.07em' }}>Summary</span>
                            <div className="screen-bar-icons">
                                <button className="nano-btn" onClick={openHistoryScreen} title="Past bills">📋</button>
                                <button className="nano-btn" onClick={() => setShowSettings(true)} title="Settings">⚙️</button>
                            </div>
                        </div>

{/* ── Header row ── */}
                        <div className="summary-header">
                            <div>
                                <h1 className="title" style={{ marginBottom: '4px' }}>Bill Summary</h1>
                                {receiptDate
                                    ? <p className="subtitle" style={{ marginBottom: 0 }}>🗓 {receiptDate} · {items.length} items</p>
                                    : <p className="subtitle" style={{ marginBottom: 0 }}>{items.length} items</p>
                                }
                            </div>
                            <div style={{ background: 'linear-gradient(135deg, #fed7aa 0%, #fb923c 100%)', borderRadius: '12px', padding: '12px 20px', textAlign: 'right', flexShrink: 0 }}>

                                <div style={{ fontSize: '26px', fontWeight: 'bold', color: '#7c2d12' }}>£{totalBill.toFixed(2)}</div>
                            </div>
                        </div>

                        {isAssigneeMode && (
                            <button onClick={markBillComplete}
                                style={{ display: 'block', width: '100%', padding: '16px', background: '#16a34a', border: 'none', borderRadius: '12px', fontSize: '17px', fontWeight: 700, color: 'white', cursor: 'pointer', marginBottom: '16px', boxShadow: '0 4px 16px rgba(22,163,74,0.35)' }}>
                                ✅ Mark as complete
                            </button>
                        )}

                            <button
                                onClick={() => {
                                    // Jump to first unassigned item and return to assignment screen
                                    for (let i = 0; i < items.length; i++) {
                                        if (!assignments[i]) { setCurrentItemIndex(i); break; }
                                    }
                                    setShowSummary(false);
                                }}

                                    const personTotal = totals[person] || 0;

                                                borderBottom: idx < config.people.length - 1 ? '1px solid #f3f4f6' : 'none',

                                                            style={{ marginLeft: '8px', background: '#e0e7ff', color: '#3730a3', border: 'none', borderRadius: '6px', padding: '3px 8px', cursor: 'pointer', fontSize: '11px', fontWeight: 600, flexShrink: 0 }}

                                                            Edit
                                                        </button>
                                                    </div>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '3px' }}>
                                                        <span style={{ fontSize: '11px', color: '#9ca3af', fontStyle: 'italic' }}>{entry.splitLabel}</span>
                                                        <span style={{ fontSize: '12px', whiteSpace: 'nowrap', marginLeft: '8px' }}>
                                                            <strong style={{ color: '#92400e' }}>£{entry.amount.toFixed(2)}</strong>
                                                            {Math.abs(entry.totalPrice - entry.amount) > 0.001 && (
                                                                <span style={{ color: '#b45309', opacity: 0.65 }}> of £{entry.totalPrice.toFixed(2)}</span>
                                                            )}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                ) : (
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', minHeight: '120px', color: '#d1d5db', fontSize: '13px' }}>
                                        ← Select a person to see their items
                                    </div>
                                )}
                            </div>
                        </div>

                        <div style={{ display: 'flex', gap: '10px' }}>
                            <button className="button button-back" onClick={clearSession} style={{ flex: 1, margin: 0 }}>
                                New Bill
                            </button>
                        </div>

                        {/* ── Share modal overlay (removed) ── */}
                        {false && (
                            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 1000, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', padding: '20px' }}
                                onClick={() => setShowShareModal(false)}>
                                <div style={{ background: 'white', borderRadius: '16px', padding: '20px', width: '100%', maxWidth: '560px', maxHeight: '80vh', display: 'flex', flexDirection: 'column' }}
                                    onClick={e => e.stopPropagation()}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                        <span style={{ fontWeight: 700, fontSize: '15px', color: '#1f2937' }}>Share summary</span>
                                        <button onClick={() => setShowShareModal(false)} style={{ background: 'none', border: 'none', fontSize: '18px', cursor: 'pointer', color: '#6b7280' }}>✕</button>
                                    </div>
                                    <div style={{ display: 'flex', gap: '6px', marginBottom: '12px', flexWrap: 'wrap' }}>
                                        {[['person', 'By person'], ['list', 'Shopping list'], ['review', '🔗 Review link'], ['request', '📤 Request input']].map(function(t) {
                                            return (
                                                <button key={t[0]} onClick={() => { setShareTab(t[0]); setHistoryCopied(false); }}
                                                    style={{ flex: 1, minWidth: '90px', padding: '8px 6px', border: '2px solid ' + (shareTab === t[0] ? '#667eea' : '#e5e7eb'), borderRadius: '8px', background: shareTab === t[0] ? '#eef2ff' : 'white', color: shareTab === t[0] ? '#4338ca' : '#6b7280', fontWeight: 600, fontSize: '12px', cursor: 'pointer' }}>
                                                    {t[1]}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {(shareTab === 'review' || shareTab === 'request') ? (() => {
                                        const isRequest = shareTab === 'request';
                                        let linkUrl = '';
                                        try {
                                            const assignedCount = Object.keys(assignments).length;
                                            const unassignedCount = items.length - assignedCount;
                                            const payload = isRequest
                                                ? JSON.stringify({ items: items, assignments: assignments, receiptDate: receiptDate, sharedBy: config.people[0]?.name || '' })
                                                : JSON.stringify({ items: items, assignments: assignments, receiptDate: receiptDate });
                                            const encoded = btoa(unescape(encodeURIComponent(payload)));
                                            linkUrl = window.location.origin + window.location.pathname + (isRequest ? '#collab=' : '#share=') + encoded;
                                        } catch(e) { linkUrl = 'Error generating link'; }
                                        const assignedCount = Object.keys(assignments).length;
                                        const unassignedCount = items.length - assignedCount;
                                        return (
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', flex: 1 }}>
                                                <p style={{ fontSize: '13px', color: '#6b7280', lineHeight: 1.5 }}>
                                                    {isRequest
                                                        ? 'Send this to a family member. They\'ll be taken to the first unassigned item and can work through the remaining ' + unassignedCount + ' item' + (unassignedCount !== 1 ? 's' : '') + ', then send it back to you.'
                                                        : 'Share this link so someone can load the completed bill and edit any assignments before you check the final split.'}
                                                </p>
                                                <textarea
                                                    readOnly
                                                    value={linkUrl}
                                                    onClick={e => e.target.select()}
                                                    style={{ flex: 1, minHeight: '80px', fontFamily: 'monospace', fontSize: '11px', lineHeight: 1.5, padding: '12px', border: '1px solid #e5e7eb', borderRadius: '8px', resize: 'none', color: '#374151', background: '#f9fafb', wordBreak: 'break-all' }}

                                                <p style={{ fontSize: '12px', color: '#9ca3af' }}>
                                                    {isRequest
                                                        ? assignedCount + ' of ' + items.length + ' items already assigned — the recipient will start from the first unassigned item.'
                                                        : 'When opened, the bill loads straight into the summary — tap any item to edit its assignment.'}
                                                </p>
                                            </div>
                                        );
                                    })() : (
                                        <textarea
                                            readOnly
                                            value={shareTab === 'person' ? generateShareText() : generateShoppingListText()}
                                            onClick={e => e.target.select()}
                                            style={{ flex: 1, minHeight: '260px', fontFamily: 'monospace', fontSize: '12px', lineHeight: 1.6, padding: '12px', border: '1px solid #e5e7eb', borderRadius: '8px', resize: 'none', color: '#374151', background: '#f9fafb', overflowY: 'auto' }}
                                        />
                                    )}
                                    {shareTab === 'request' ? (() => {
                                        const buildCollabUrl = () => {
                                            const payload = JSON.stringify({ items: items, assignments: assignments, receiptDate: receiptDate, sharedBy: config.people[0]?.name || '' });
                                            const encoded = btoa(unescape(encodeURIComponent(payload)));
                                            return window.location.origin + window.location.pathname + '#collab=' + encoded;
                                        };
                                        const unassignedCount = items.length - Object.keys(assignments).length;
                                        const senderName = config.people[0]?.name || '';
                                        return (
                                            <div style={{ marginTop: '12px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                                <button
                                                    onClick={() => {
                                                        try {
                                                            const url = buildCollabUrl();
                                                            const itemWord = unassignedCount === 1 ? '1 item' : unassignedCount + ' items';
                                                            const intro = senderName ? 'Hi! ' + senderName + ' has shared the Sainsbury\'s bill' : 'Hi! Here\'s the Sainsbury\'s bill';
                                                            const msg = intro + ' — there ' + (unassignedCount === 1 ? 'is ' : 'are ') + itemWord + ' left to assign. Tap the link to fill them in, then send it back when you\'re done 🧾';
                                                            if (navigator.share) {
                                                                navigator.share({ text: msg, url: url });
                                                            } else if (navigator.clipboard) {
                                                                navigator.clipboard.writeText(url).then(() => setHistoryCopied(true));
                                                            }
                                                        } catch(e) {}
                                                    }}
                                                    style={{ padding: '13px', background: '#10b981', border: 'none', borderRadius: '10px', fontSize: '15px', fontWeight: 700, color: 'white', cursor: 'pointer' }}
                                                >
                                                    📤 Share…
                                                </button>
                                                <button
                                                    onClick={() => {
                                                        try {
                                                            const url = buildCollabUrl();
                                                            if (navigator.clipboard) {
                                                                navigator.clipboard.writeText(url).then(() => setHistoryCopied(true));
                                                            }
                                                        } catch(e) {}
                                                    }}
                                                    style={{ padding: '10px', background: 'white', border: '2px solid #e5e7eb', borderRadius: '10px', fontSize: '13px', fontWeight: 600, color: historyCopied ? '#10b981' : '#6b7280', cursor: 'pointer', transition: 'color 0.2s' }}
                                                >
                                                    {historyCopied ? '✓ Link copied!' : 'Copy link instead'}
                                                </button>
                                            </div>
                                        );
                                    })() : (
                                        <button
                                            onClick={() => {
                                                let text = '';
                                                if (shareTab === 'review') {
                                                    try {
                                                        const payload = JSON.stringify({ items: items, assignments: assignments, receiptDate: receiptDate });
                                                        const encoded = btoa(unescape(encodeURIComponent(payload)));
                                                        text = window.location.origin + window.location.pathname + '#share=' + encoded;
                                                    } catch(e) {}
                                                } else {
                                                    text = shareTab === 'person' ? generateShareText() : generateShoppingListText();
                                                }
                                                if (navigator.clipboard) {
                                                    navigator.clipboard.writeText(text).then(() => setHistoryCopied(true));
                                                } else {
                                                    const el = document.querySelector('textarea');
                                                    if (el) { el.select(); document.execCommand('copy'); setHistoryCopied(true); }
                                                }
                                            }}
                                            style={{ marginTop: '12px', padding: '12px', background: historyCopied ? '#10b981' : '#667eea', border: 'none', borderRadius: '10px', fontSize: '14px', fontWeight: 700, color: 'white', cursor: 'pointer', transition: 'background 0.2s' }}
                                        >
                                            {historyCopied ? '✓ Copied!' : shareTab === 'review' ? 'Copy link' : 'Copy to clipboard'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                    </>
                );
            }

            if (items.length > 0 && currentItem) {
                if (showCustomSplit) {
                    return (
                        <>
                        {notification && (
                            <div style={{ position: 'fixed', top: 'max(20px, env(safe-area-inset-top))', left: '50%', transform: 'translateX(-50%)', zIndex: 9999, background: '#065f46', color: 'white', borderRadius: '12px', padding: '12px 20px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', fontSize: '14px', fontWeight: 600, maxWidth: '90vw', textAlign: 'center', display: 'flex', alignItems: 'center', gap: '10px' }}>
                                <span>✅ {notification.message}</span>
                                <button onClick={function() { setNotification(null); }} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', fontSize: '16px', padding: '0', lineHeight: 1, flexShrink: 0 }}>✕</button>
                            </div>
                        )}
                        <div className="card">
                            <div className="screen-bar">
                                <div>
                                    <h2 className="title" style={{ fontSize: '22px', marginBottom: '2px' }}>Advanced Split</h2>
                                    <p className="subtitle" style={{ marginBottom: 0, fontSize: '13px' }}>{currentItem.name} · £{currentItem.price.toFixed(2)}</p>
                                </div>
                                <div className="screen-bar-icons">
                                    <button className="nano-btn" onClick={openHistoryScreen} title="Past bills">📋</button>
                                    <button className="nano-btn" onClick={() => setShowSettings(true)} title="Settings">⚙️</button>
                                </div>
                            </div>

                            <div className="split-type-toggle">
                                <button
                                    className={`split-type-button ${splitType === 'individuals' ? 'active' : ''}`}
                                    onClick={() => setSplitType('individuals')}
                                >
                                    Individuals
                                </button>
                                <button
                                    className={`split-type-button ${splitType === 'percentage' ? 'active' : ''}`}
                                    onClick={() => setSplitType('percentage')}
                                >
                                    % Split
                                </button>
                                <button
                                    className={`split-type-button ${splitType === 'quantity' ? 'active' : ''}`}
                                    onClick={() => setSplitType('quantity')}
                                >
                                    Qty Split
                                </button>
                            </div>

                            {splitType === 'individuals' && (
                                <div className="custom-split-panel">
                                    <div className="custom-split-title">Select who pays for this item</div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px', marginBottom: '16px' }}>
                                        {config.people.map(person => {
                                            const sel = selectedIndividuals.includes(person);
                                            return (
                                                <button
                                                    key={person}
                                                    onClick={() => setSelectedIndividuals(
                                                        sel ? selectedIndividuals.filter(p => p !== person)
                                                            : [...selectedIndividuals, person]
                                                    )}

                                const exact = result.score === 1.0;
                                return (
                                    <button
                                        onClick={() => applySuggestion(result)}

                                            display: 'flex', alignItems: 'center', gap: '8px', width: '100%',

                                            border: '1px solid ' + (exact ? '#86efac' : '#e2e8f0'),

                                    <span style={{ display: 'inline-block', fontSize: '9px', opacity: 0.4, marginLeft: '6px', fontFamily: 'monospace', background: 'rgba(0,0,0,0.07)', padding: '1px 4px', borderRadius: '3px', verticalAlign: 'middle' }}>E</span>
                                </button>

                                        <button
                                            key={person}
                                            onClick={() => {

                                                borderRadius: '24px',

                                                fontWeight: 600,
                                                color: sel ? '#4338ca' : '#374151',
                                                cursor: 'pointer',
                                                transition: 'all 0.15s',
                                                boxShadow: focused ? '0 0 0 3px #f59e0b' : 'none',
                                                outline: 'none'
                                            }}
                                        >
                                            {sel ? '✓ ' : ''}{person}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Price preview + Assign button */}
                            {quickSelectPeople.length > 0 ? (
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: '#f0fdf4', border: '1.5px solid #bbf7d0', borderRadius: '10px', padding: '10px 14px' }}>
                                    <span style={{ fontSize: '13px', color: '#166534' }}>
                                        <strong>£{(currentItem.price / quickSelectPeople.length).toFixed(2)}</strong>

                                            ? ` each · ${quickSelectPeople.join(', ')}`
                                            : ` · ${quickSelectPeople[0]}`}
                                    </span>
                                    <button
                                        onClick={assignFromSelection}
                                        style={{ padding: '8px 22px', background: '#10b981', border: 'none', borderRadius: '20px', fontSize: '14px', fontWeight: 700, color: 'white', cursor: 'pointer', flexShrink: 0, marginLeft: '12px' }}
