<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bill Splitter</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f8fafc;
      --surface:       #ffffff;
      --border:        #e2e8f0;
      --text:          #0f172a;
      --muted:         #64748b;
      --primary:       #2563eb;
      --primary-light: #eff6ff;
      --success:       #16a34a;
      --success-light: #dcfce7;
      --danger:        #dc2626;
      --radius:        12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--surface);
      position: relative;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .header-title { flex: 1; font-size: 18px; font-weight: 700; }
    .header-sub   { flex: 1; min-width: 0; }
    .header-sub .htitle  { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-sub .hdetail { font-size: 12px; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      padding: 10px 16px;
      transition: opacity .12s, transform .12s;
      white-space: nowrap;
    }
    .btn:active  { opacity: .8; transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-full    { width: 100%; padding: 14px; font-size: 16px; border-radius: 10px; }
    .btn-lg      { padding: 14px 24px; font-size: 16px; border-radius: 10px; }
    .btn-icon    { padding: 8px; border-radius: 8px; font-size: 18px; line-height: 1; }

    /* ── Inputs ── */
    .input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s;
    }
    .input:focus { border-color: var(--primary); background: #fff; }
    .label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em;
    }

    /* ── Chips ── */
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 5px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent;
      transition: all .12s; user-select: none; -webkit-user-select: none;
    }
    .chip:active { transform: scale(.94); }
    .chip-off { background: #f1f5f9; border-color: #e2e8f0; color: #94a3b8; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 20px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge-done    { background: var(--success-light); color: var(--success); }
    .badge-wip     { background: var(--primary-light);  color: var(--primary); }
    .badge-new     { background: #f1f5f9; color: var(--muted); }
    .badge-active  { background: var(--success-light); color: var(--success); }
    .badge-pending { background: #fef3c7; color: #92400e; }

    /* ── Progress ── */
    .prog-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s; }
    .prog-fill.done { background: var(--success); }

    /* ── Upload area ── */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 36px 20px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s;
      margin: 16px;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--primary); background: var(--primary-light); }
    .upload-area h3 { font-size: 15px; margin: 8px 0 4px; }
    .upload-area p  { font-size: 13px; color: var(--muted); }

    /* ── Tabs ── */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; gap: 4px; }
    .tab {
      padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s;
    }
    .tab.on { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── List rows ── */
    .list-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .list-row:last-child  { border-bottom: none; }
    .list-row:active { background: var(--bg); }

    /* ── Item assignment row ── */
    .item-row { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .item-row:last-child { border-bottom: none; }
    .item-row-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
    .item-name  { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.3; }
    .item-price { font-size: 14px; font-weight: 700; white-space: nowrap; }
    .item-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── Summary row ── */
    .sum-row { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .sum-row:last-child { border-bottom: none; }
    .sum-name   { flex: 1; font-size: 15px; font-weight: 600; }
    .sum-amount { font-size: 18px; font-weight: 700; color: var(--primary); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      white-space: nowrap; z-index: 400; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }

    /* ── Login ── */
    .login-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 20px;
    }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty .eicon { font-size: 40px; margin-bottom: 10px; }
    .empty h3   { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty p    { font-size: 14px; line-height: 1.5; }

    .section-hdr {
      padding: 12px 20px 6px;
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
    }

    @media (max-width: 480px) { #root { max-width: 100%; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ════════════════════════════════════════════════════════════
   BILL SPLITTER  —  Collaborative, Supabase-first
   ════════════════════════════════════════════════════════════ */

const { useState, useEffect, useRef, useMemo } = React;

// ── Colour palette for people chips ─────────────────────────
const PALETTE = [
  { bg:'#dbeafe', bd:'#3b82f6', fg:'#1e40af' },
  { bg:'#ede9fe', bd:'#8b5cf6', fg:'#4c1d95' },
  { bg:'#d1fae5', bd:'#10b981', fg:'#064e3b' },
  { bg:'#fce7f3', bd:'#ec4899', fg:'#831843' },
  { bg:'#ffedd5', bd:'#fb923c', fg:'#7c2d12' },
  { bg:'#fef9c3', bd:'#facc15', fg:'#713f12' },
  { bg:'#cffafe', bd:'#22d3ee', fg:'#164e63' },
  { bg:'#fecaca', bd:'#f87171', fg:'#7f1d1d' },
];

function colorFor(name, allNames) {
  const idx = allNames.indexOf(name);
  return PALETTE[(idx >= 0 ? idx : 0) % PALETTE.length];
}

// ── Supabase ─────────────────────────────────────────────────
const API = '/.netlify/functions';
let _sb = null;

async function initSb() {
  if (_sb) return _sb;
  const r   = await fetch(`${API}/client-config`);
  const cfg = await r.json();
  if (!cfg.supabaseUrl) throw new Error(cfg.error || 'Missing supabaseUrl in config response');
  _sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
    auth: { persistSession: true, autoRefreshToken: true },
  });
  return _sb;
}

// ── Date helpers ──────────────────────────────────────────────
const MONTH_MAP = {
  jan:1, feb:2, mar:3, apr:4, may:5, jun:6,
  jul:7, aug:8, sep:9, oct:10, nov:11, dec:12,
  january:1, february:2, march:3, april:4, june:6,
  july:7, august:8, september:9, october:10, november:11, december:12,
};

function extractReceiptDate(text) {
  if (!text) return '';
  const allMonths = Object.keys(MONTH_MAP).join('|');
  const re = new RegExp(
    '(\\d{1,2})(?:st|nd|rd|th)?\\s+(' + allMonths + ')\\s+(\\d{2,4})',
    'i'
  );
  const m = text.match(re);
  if (m) {
    const day = parseInt(m[1], 10);
    const mon = MONTH_MAP[m[2].toLowerCase()];
    let yr    = parseInt(m[3], 10);
    if (yr < 100) yr += 2000;
    if (mon && yr > 2000) {
      return new Date(yr, mon - 1, day)
        .toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }
  }
  const dmy = text.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (dmy) {
    return new Date(+dmy[3], +dmy[2] - 1, +dmy[1])
      .toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  }
  return '';
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return isNaN(d) ? '' : d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

// ── PDF parsing ───────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function parsePdf(file) {
  const buf  = await file.arrayBuffer();
  const pdf  = await pdfjsLib.getDocument({ data: buf }).promise;
  let   text = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(' ') + '\n';
  }
  return { items: parseReceiptItems(text), receiptDate: extractReceiptDate(text) };
}

function parseReceiptItems(text) {
  const SKIP = /^(subtotal|total|balance|savings|clubcard|nectar|reward|payment|change|cash|visa|mastercard|contactless|approved|thank you|store|receipt|transaction|vat|points|voucher|bag|carrier|loyalty|online|delivery|charge|fee|price match|you save|spend|earn|bonus|offer|discount|saving|low every)/i;
  const PRICE_END = /^(.*?)\s+£?(\d+\.\d{2})\s*[A-Z*]?\s*$/;
  const items = [];
  for (const raw of text.split(/\n/)) {
    const line = raw.trim();
    if (!line || line.length < 3 || SKIP.test(line)) continue;
    const m = PRICE_END.exec(line);
    if (!m) continue;
    const name  = m[1].trim().replace(/^[£*\s]+/, '').trim();
    const price = parseFloat(m[2]);
    if (!name || price <= 0 || price > 300 || name.length < 2) continue;
    if (name === name.toUpperCase() && name.length < 20 && !/\d/.test(name)) continue;
    if (/^\d+\s*[xX]/.test(name)) continue;
    items.push({ name, price });
  }
  return items;
}

// ── Data helpers ──────────────────────────────────────────────
function getAssignees(assignments, idx) {
  const raw = assignments?.[String(idx)] ?? assignments?.[idx] ?? [];
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'object') return raw.people ?? raw.assigned ?? [];
  return [];
}

function countAssigned(items, assignments) {
  return (items || []).filter((_, i) => getAssignees(assignments, i).length > 0).length;
}

function calcTotals(items, assignments, groups) {
  const gmap = {};
  (groups || []).forEach(g => { gmap[g.name] = g.members || []; });
  const totals = {};
  (items || []).forEach((item, i) => {
    const expanded = getAssignees(assignments, i).flatMap(n => gmap[n] || [n]);
    if (!expanded.length) return;
    const share = item.price / expanded.length;
    expanded.forEach(n => { totals[n] = (totals[n] || 0) + share; });
  });
  return totals;
}

function rowToBill(row) {
  return {
    id:          String(row.id),
    savedAt:     row.saved_at    || null,
    updatedAt:   row.updated_at  || null,
    items:       Array.isArray(row.items) ? row.items : [],
    assignments: row.assignments  || {},
    totals:      row.totals       || {},
    totalBill:   Number(row.total_bill || 0),
    receiptDate: row.receipt_date || '',
    completedAt: row.completed_at || null,
    completedBy: row.completed_by || null,
  };
}

// ════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════
function App() {
  const [ready,      setReady]      = useState(false);
  const [initError,  setInitError]  = useState(null);
  const [user,       setUser]       = useState(null);
  const [config,     setConfig]     = useState({ people: [], groups: [] });
  const [bills,      setBills]      = useState([]);
  const [screen,     setScreen]     = useState('bills');
  const [activeBill, setActiveBill] = useState(null);
  const [toastMsg,   setToastMsg]   = useState(null);
  const toastRef = useRef();

  function showToast(msg, ms = 2800) {
    clearTimeout(toastRef.current);
    setToastMsg(msg);
    toastRef.current = setTimeout(() => setToastMsg(null), ms);
  }

  // Init Supabase — use a flat .then chain so ALL errors reach .catch
  useEffect(() => {
    initSb()
      .then(sb => {
        // Set up auth listener first (synchronous)
        sb.auth.onAuthStateChange((_, session) => {
          setUser(session?.user ?? null);
        });
        // Then get current session
        return sb.auth.getSession();
      })
      .then(({ data: { session } }) => {
        setUser(session?.user ?? null);
        setReady(true);
      })
      .catch(err => {
        console.error('Init failed:', err);
        setInitError('Could not connect. Please check your internet and refresh.');
        setReady(true);
      });
  }, []);

  // Load data + subscribe when logged in
  useEffect(() => {
    if (!user || !_sb) return;

    Promise.all([
      _sb.from('bill_history').select('*').order('saved_at', { ascending: false }).limit(50),
      _sb.from('config').select('*').eq('id', 1).single(),
    ]).then(([{ data: bRows }, { data: cfgRow }]) => {
      if (bRows)  setBills(bRows.map(rowToBill));
      if (cfgRow) setConfig({ people: cfgRow.people || [], groups: cfgRow.groups || [] });
    });

    const ch = _sb.channel('bs-collab')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bill_history' }, p => {
        if (p.eventType === 'DELETE') {
          const gone = String(p.old.id);
          setBills(prev => prev.filter(b => b.id !== gone));
          setActiveBill(prev => (prev?.id === gone ? null : prev));
          return;
        }
        const b = rowToBill(p.new);
        setBills(prev => {
          const i = prev.findIndex(x => x.id === b.id);
          if (i >= 0) { const n = [...prev]; n[i] = b; return n; }
          return [b, ...prev];
        });
        setActiveBill(prev => (prev?.id === b.id ? b : prev));
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'config' }, p => {
        if (p.new) setConfig({ people: p.new.people || [], groups: p.new.groups || [] });
      })
      .subscribe();

    return () => _sb.removeChannel(ch);
  }, [user]);

  // ── Actions ───────────────────────────────────────────────
  async function saveConfig(cfg) {
    setConfig(cfg);
    await _sb.from('config').upsert({
      id: 1, people: cfg.people, groups: cfg.groups,
      updated_at: new Date().toISOString(),
    });
  }

  async function saveBillAssignments(bill, newAssign) {
    const newTotals = calcTotals(bill.items, newAssign, config.groups);
    const patched   = { ...bill, assignments: newAssign, totals: newTotals };
    setActiveBill(patched);
    setBills(prev => prev.map(b => b.id === patched.id ? patched : b));
    await _sb.from('bill_history').update({
      assignments: newAssign, totals: newTotals,
      updated_at: new Date().toISOString(),
    }).eq('id', bill.id);
  }

  async function completeBill(bill) {
    const now     = new Date().toISOString();
    const patched = { ...bill, completedAt: now, completedBy: user.email };
    setActiveBill(patched);
    setBills(prev => prev.map(b => b.id === patched.id ? patched : b));
    await _sb.from('bill_history').update({
      completed_at: now, completed_by: user.email, updated_at: now,
    }).eq('id', bill.id);
    showToast('✅ Receipt marked as complete');
  }

  async function deleteBill(bill) {
    await _sb.from('bill_history').delete().eq('id', bill.id);
    setBills(prev => prev.filter(b => b.id !== bill.id));
    if (activeBill?.id === bill.id) { setActiveBill(null); setScreen('bills'); }
  }

  // ── Render ────────────────────────────────────────────────
  if (!ready) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh' }}>
        <div className="spin" style={{ width:32, height:32 }} />
      </div>
    );
  }

  if (initError) {
    return (
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', padding:32, textAlign:'center' }}>
        <div style={{ fontSize:40, marginBottom:16 }}>⚠️</div>
        <h2 style={{ marginBottom:8 }}>Connection Error</h2>
        <p style={{ color:'var(--muted)', fontSize:14, marginBottom:24, maxWidth:280, lineHeight:1.5 }}>{initError}</p>
        <button className="btn btn-primary" onClick={() => window.location.reload()}>Retry</button>
      </div>
    );
  }

  if (!user) return <LoginScreen />;

  const ctx = { user, config, bills, showToast, saveConfig, saveBillAssignments, completeBill, deleteBill };

  return (
    <>
      {screen === 'settings' && (
        <SettingsScreen {...ctx} onBack={() => setScreen('bills')} />
      )}
      {screen === 'bill' && activeBill && (
        <BillDetailScreen
          {...ctx}
          bill={activeBill}
          onBack={() => { setActiveBill(null); setScreen('bills'); }}
        />
      )}
      {screen === 'bills' && (
        <BillsScreen
          {...ctx}
          onOpenBill={bill => { setActiveBill(bill); setScreen('bill'); }}
          onOpenSettings={() => setScreen('settings')}
          onBillCreated={bill => { setBills(p => [bill, ...p]); setActiveBill(bill); setScreen('bill'); }}
        />
      )}
      {toastMsg && <div className="toast">{toastMsg}</div>}
    </>
  );
}

// ════════════════════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════════════════════
function LoginScreen() {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [err,      setErr]      = useState('');
  const [busy,     setBusy]     = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!email || !password) return;
    setBusy(true); setErr('');
    try {
      if (!_sb) await initSb();
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) setErr(error.message);
    } catch (ex) {
      setErr('Connection error: ' + (ex.message || 'please try again'));
    }
    setBusy(false);
  }

  return (
    <div className="login-wrap">
      <div style={{ textAlign:'center', marginBottom:32 }}>
        <div style={{ fontSize:52, marginBottom:8 }}>🛒</div>
        <h1 style={{ fontSize:26, marginBottom:6 }}>Bill Splitter</h1>
        <p style={{ color:'var(--muted)', fontSize:14 }}>Sign in to manage shared receipts</p>
      </div>
      <form onSubmit={submit} style={{ width:'100%', maxWidth:340 }}>
        <div style={{ marginBottom:14 }}>
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="you@example.com"
            value={email} onChange={e => setEmail(e.target.value)} autoComplete="email" />
        </div>
        <div style={{ marginBottom:20 }}>
          <label className="label">Password</label>
          <input className="input" type="password" placeholder="••••••••"
            value={password} onChange={e => setPassword(e.target.value)} autoComplete="current-password" />
        </div>
        {err && (
          <div style={{ background:'#fef2f2', border:'1px solid #fecaca', borderRadius:8,
            padding:'10px 14px', marginBottom:16, fontSize:14, color:'#991b1b' }}>
            {err}
          </div>
        )}
        <button type="submit" className="btn btn-primary btn-full btn-lg" disabled={busy}>
          {busy ? <span className="spin" /> : 'Sign in'}
        </button>
      </form>
    </div>
  );
}

// BILLS LIST SCREEN
// ════════════════════════════════════════════════════════════
function BillsScreen({ bills, config, onOpenBill, onOpenSettings, onBillCreated, showToast }) {
  const [uploading, setUploading] = useState(false);
  const [dragOver,  setDragOver]  = useState(false);
  const fileRef = useRef();

  const allNames = useMemo(() => [
    ...(config.people || []),
    ...(config.groups || []).map(g => g.name),
  ], [config]);

  async function handleFile(file) {
    if (!file) return;
    if (file.type !== 'application/pdf') { showToast('Please upload a PDF file'); return; }
    setUploading(true);
    try {
      const { items, receiptDate } = await parsePdf(file);
      if (!items.length) {
        showToast("No items found — is this a Sainsbury's receipt?");
        setUploading(false); return;
      }
      const total = items.reduce((s, x) => s + x.price, 0);
      const { data, error } = await _sb.from('bill_history').insert({
        id: Date.now(), items, assignments: {}, totals: {},
        total_bill: total, receipt_date: receiptDate,
        config_snapshot: config, saved_at: new Date().toISOString(),
      }).select().single();
      if (error) { showToast('Save failed: ' + error.message); setUploading(false); return; }
      onBillCreated(rowToBill(data));
    } catch (ex) { showToast('Error: ' + ex.message); }
    setUploading(false);
  }

  return (
    <div>
      <div className="header">
        <span style={{ fontSize:22 }}>🛒</span>
        <span className="header-title">Bill Splitter</span>
        <button className="btn btn-ghost btn-icon" onClick={onOpenSettings} title="Settings">⚙️</button>
      </div>

      <div
        className={'upload-area' + (dragOver ? ' drag' : '')}
        onClick={() => !uploading && fileRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
      >
        {uploading
          ? <><div className="spin" style={{ margin:'0 auto 10px' }} /><p>Parsing receipt…</p></>
          : <><div style={{ fontSize:32 }}>📄</div>
              <h3>Upload a Receipt</h3>
              <p>Drag & drop a Sainsbury's PDF, or tap to browse</p></>
        }
        <input ref={fileRef} type="file" accept=".pdf,application/pdf" style={{ display:'none' }}
          onChange={e => handleFile(e.target.files[0])} />
      </div>

      {bills.length === 0
        ? <div className="empty">
            <div className="eicon">🧾</div>
            <h3>No receipts yet</h3>
            <p>Upload a Sainsbury's PDF receipt above to get started.</p>
          </div>
        : <>
            <div className="section-hdr">Receipts ({bills.length})</div>
            {bills.map(bill => (
              <BillCard key={bill.id} bill={bill} allNames={allNames} onClick={() => onOpenBill(bill)} />
            ))}
          </>
      }
    </div>
  );
}

function BillCard({ bill, allNames, onClick }) {
  const assigned  = countAssigned(bill.items, bill.assignments);
  const total     = bill.items.length;
  const pct       = total > 0 ? assigned / total : 0;
  const isDone    = !!bill.completedAt;
  const isReady   = !isDone && assigned === total && total > 0;

  const badge = isDone
    ? <span className="badge badge-done">✓ Complete</span>
    : assigned > 0
      ? <span className="badge badge-wip">● In progress</span>
      : <span className="badge badge-new">○ New</span>;

  return (
    <div className="list-row" onClick={onClick} style={{ flexDirection:'column', gap:8, alignItems:'stretch' }}>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:2 }}>
            {bill.receiptDate || <em style={{ color:'var(--muted)', fontWeight:400 }}>Date unknown</em>}
          </div>
          <div style={{ fontSize:13, color:'var(--muted)' }}>
            {total} items · £{bill.totalBill.toFixed(2)}
          </div>
        </div>
        {badge}
        <span style={{ color:'var(--muted)', fontSize:16 }}>›</span>
      </div>

      {total > 0 && (
        <div>
          <div className="prog-bar" style={{ marginBottom:4 }}>
            <div className={'prog-fill' + (isDone ? ' done' : '')} style={{ width:(pct*100)+'%' }} />
          </div>
          <div style={{ fontSize:12, color:'var(--muted)', display:'flex', justifyContent:'space-between' }}>
            <span>{assigned} of {total} assigned</span>
            {isReady && <span style={{ color:'var(--success)', fontWeight:700 }}>Ready to complete →</span>}
          </div>
        </div>
      )}

      {/* Per-person mini totals */}
      {Object.entries(bill.totals || {}).filter(([,v]) => v > 0).length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
          {Object.entries(bill.totals).filter(([,v]) => v > 0)
            .sort((a, b) => b[1] - a[1])
            .map(([name, amount]) => {
              const c = colorFor(name, allNames);
              return (
                <span key={name} style={{
                  background:c.bg, border:'1px solid '+c.bd, color:c.fg,
                  borderRadius:12, padding:'2px 8px', fontSize:12, fontWeight:700,
                }}>
                  {name} £{amount.toFixed(2)}
                </span>
              );
            })}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// BILL DETAIL SCREEN  (Items tab + Summary tab)
// ════════════════════════════════════════════════════════════
function BillDetailScreen({ bill, config, user, onBack, saveBillAssignments, completeBill, deleteBill, showToast }) {
  const [itemIdx,       setItemIdx]       = useState(0);
  const [view,          setView]          = useState('items'); // 'items' | 'summary'
  const [summaryTab,    setSummaryTab]    = useState('person'); // 'person' | 'item'
  const [expandedPerson, setExpandedPerson] = useState(null);
  const touchStartX = useRef(null);

  const allNames = useMemo(() => [
    ...(config.people || []),
    ...(config.groups || []).map(g => g.name),
  ], [config]);

  const isDone      = !!bill.completedAt;
  const total       = bill.items.length;
  const assigned    = countAssigned(bill.items, bill.assignments);
  const allAssigned = assigned === total && total > 0;
  const pct         = total > 0 ? assigned / total : 0;

  // Keep itemIdx in bounds when bill updates via real-time
  const safeIdx  = Math.min(itemIdx, Math.max(0, total - 1));
  const item     = bill.items[safeIdx] || { name: '', price: 0 };
  const assignees = getAssignees(bill.assignments, safeIdx);

  const totals = useMemo(
    () => calcTotals(bill.items, bill.assignments, config.groups),
    [bill.items, bill.assignments, config.groups]
  );

  async function toggle(name) {
    if (isDone) return;
    const cur = getAssignees(bill.assignments, safeIdx);
    const nxt = cur.includes(name) ? cur.filter(n => n !== name) : [...cur, name];
    await saveBillAssignments(bill, { ...bill.assignments, [String(safeIdx)]: nxt });
  }

  function goNext() {
    if (safeIdx < total - 1) setItemIdx(safeIdx + 1);
    else setView('summary');
  }
  function goPrev() {
    if (safeIdx > 0) setItemIdx(safeIdx - 1);
    else onBack();
  }

  // Swipe left = next, swipe right = prev
  function onTouchStart(e) { touchStartX.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStartX.current === null) return;
    const dx = touchStartX.current - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 55) { dx > 0 ? goNext() : goPrev(); }
    touchStartX.current = null;
  }

  async function handleComplete() {
    await completeBill(bill);
    onBack();
  }

  // ── SUMMARY VIEW ─────────────────────────────────────────
  if (view === 'summary') {
    const gmap = {};
    (config.groups || []).forEach(g => { gmap[g.name] = g.members || []; });
    const unassTotal = bill.items
      .filter((_, i) => !getAssignees(bill.assignments, i).length)
      .reduce((s, x) => s + x.price, 0);

    function goToItemEdit(idx) { setItemIdx(idx); setView('items'); }

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100vh', height:'100dvh' }}>
        {/* Header */}
        <div className="header">
          <button className="btn btn-ghost" style={{ padding:'6px 10px', marginLeft:-6 }}
            onClick={() => setView('items')}>
            ← Items
          </button>
          <div className="header-sub">
            <div className="htitle">Summary</div>
            <div className="hdetail">{bill.receiptDate || 'Receipt'} · £{bill.totalBill.toFixed(2)}</div>
          </div>
          {isDone && <span className="badge badge-done">✓ Done</span>}
        </div>

        {/* View switcher */}
        <div style={{ display:'flex', borderBottom:'1px solid var(--border)', background:'white', flexShrink:0 }}>
          {[['person','By Person'],['item','By Item']].map(([key, label]) => (
            <button key={key} onClick={() => setSummaryTab(key)} style={{
              flex:1, padding:'10px', border:'none', background:'none',
              fontSize:13, fontWeight:600, cursor:'pointer',
              color: summaryTab === key ? 'var(--primary)' : 'var(--muted)',
              borderBottom: summaryTab === key ? '2px solid var(--primary)' : '2px solid transparent',
            }}>
              {label}
            </button>
          ))}
        </div>

        {/* Scrollable content */}
        <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch' }}>

          {/* ── BY PERSON ── */}
          {summaryTab === 'person' && (
            !Object.keys(totals).length
              ? <div className="empty">
                  <div className="eicon">📊</div>
                  <h3>Nothing assigned yet</h3>
                  <p>Go back to Items to start assigning.</p>
                </div>
              : <>
                  {Object.entries(totals).sort((a, b) => b[1] - a[1]).map(([name, amount]) => {
                    const c          = colorFor(name, allNames);
                    const isOpen     = expandedPerson === name;
                    const personItems = bill.items.map((itm, i) => {
                      const exp = getAssignees(bill.assignments, i).flatMap(n => gmap[n] || [n]);
                      if (!exp.includes(name)) return null;
                      return { itm, i, share: itm.price / exp.length, exp };
                    }).filter(Boolean);

                    return (
                      <div key={name} style={{ borderBottom:'1px solid var(--border)' }}>
                        {/* Person header row */}
                        <div
                          onClick={() => setExpandedPerson(isOpen ? null : name)}
                          style={{ display:'flex', alignItems:'center', gap:10, padding:'13px 20px', cursor:'pointer', background: isOpen ? '#f8fafc' : 'white' }}
                        >
                          <div style={{ width:10, height:10, borderRadius:'50%', background:c.bd, flexShrink:0 }} />
                          <span style={{ flex:1, fontWeight:700, fontSize:15 }}>{name}</span>
                          <span style={{ fontSize:16, fontWeight:800, color:'var(--primary)', marginRight:6 }}>£{amount.toFixed(2)}</span>
                          <span style={{ color:'var(--muted)', fontSize:11, fontWeight:600 }}>{isOpen ? '▲' : '▼'}</span>
                        </div>

                        {/* Expanded items list */}
                        {isOpen && (
                          <div style={{ background:'#f8fafc', borderTop:'1px solid var(--border)' }}>
                            {personItems.map(({ itm, i, share, exp }) => {
                              const others = exp.filter(n => n !== name);
                              return (
                                <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'9px 20px 9px 40px', borderBottom:'1px solid var(--border)' }}>
                                  <div style={{ flex:1, minWidth:0 }}>
                                    <div style={{ fontSize:13, lineHeight:1.3, color:'var(--text)' }}>{itm.name}</div>
                                    {others.length > 0 && (
                                      <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>
                                        shared with {others.length <= 2
                                          ? others.join(' & ')
                                          : `${others.slice(0, 2).join(', ')} +${others.length - 2}`
                                        } · £{itm.price.toFixed(2)} ÷ {exp.length}
                                      </div>
                                    )}
                                  </div>
                                  <div style={{ flexShrink:0, textAlign:'right', paddingTop:1 }}>
                                    <span style={{ fontSize:13, color: others.length > 0 ? 'var(--text)' : 'var(--muted)', fontWeight: others.length > 0 ? 600 : 400, whiteSpace:'nowrap' }}>
                                      £{share.toFixed(2)}
                                    </span>
                                  </div>
                                  {!isDone && (
                                    <button onClick={() => goToItemEdit(i)}
                                      style={{ border:'none', background:'none', color:'var(--primary)', cursor:'pointer', fontSize:15, padding:'2px 4px', lineHeight:1, opacity:.8, flexShrink:0, paddingTop:1 }}
                                      title="Edit assignment">✎</button>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {unassTotal > 0 && (
                    <div style={{ display:'flex', alignItems:'center', gap:10, padding:'13px 20px', borderBottom:'1px solid var(--border)', opacity:.5 }}>
                      <div style={{ width:10, height:10, borderRadius:'50%', background:'#94a3b8', flexShrink:0 }} />
                      <span style={{ flex:1, fontWeight:700, fontSize:15, color:'var(--muted)' }}>Unassigned</span>
                      <span style={{ fontSize:16, fontWeight:800, color:'var(--muted)' }}>£{unassTotal.toFixed(2)}</span>
                    </div>
                  )}

                  <div style={{ display:'flex', justifyContent:'space-between', fontWeight:700, fontSize:16, padding:'14px 20px', borderTop:'2px solid var(--border)' }}>
                    <span>Total</span><span>£{bill.totalBill.toFixed(2)}</span>
                  </div>

                  {isDone && (
                    <div style={{ margin:'12px 16px', background:'var(--success-light)', borderRadius:10, padding:'11px 16px', fontSize:13, color:'var(--success)', fontWeight:600, textAlign:'center' }}>
                      ✅ Completed {fmtDate(bill.completedAt)}{bill.completedBy && <> by {bill.completedBy.split('@')[0]}</>}
                    </div>
                  )}

                  <div style={{ textAlign:'center', padding:'8px 20px 24px' }}>
                    <button className="btn btn-ghost" style={{ fontSize:13, color:'var(--danger)' }}
                      onClick={async () => { if (confirm('Delete this receipt?')) await deleteBill(bill); }}>
                      🗑 Delete receipt
                    </button>
                  </div>
                </>
          )}

          {/* ── BY ITEM ── */}
          {summaryTab === 'item' && (
            <div>
              {bill.items.map((itm, i) => {
                const assigneeList = getAssignees(bill.assignments, i);
                const isUnassigned = assigneeList.length === 0;
                return (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 20px', borderBottom:'1px solid var(--border)' }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, marginBottom:5, lineHeight:1.3 }}>{itm.name}</div>
                      <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                        {isUnassigned
                          ? <span style={{ fontSize:12, color:'var(--muted)', fontStyle:'italic' }}>Unassigned</span>
                          : assigneeList.map(a => {
                              const c = colorFor(a, allNames);
                              const isGroup = (gmap[a] || []).length > 0;
                              return (
                                <span key={a} style={{ fontSize:11, fontWeight:600, background:c.bg, color:c.fg, border:'1px solid '+c.bd, borderRadius:10, padding:'1px 7px', whiteSpace:'nowrap' }}>
                                  {isGroup ? `👥 ${a}` : a}
                                </span>
                              );
                            })
                        }
                      </div>
                    </div>
                    <div style={{ flexShrink:0, textAlign:'right' }}>
                      <div style={{ fontSize:14, fontWeight:700, marginBottom:4 }}>£{itm.price.toFixed(2)}</div>
                      {!isDone && (
                        <button onClick={() => goToItemEdit(i)}
                          style={{ border:'none', background:'none', color:'var(--primary)', cursor:'pointer', fontSize:12, fontWeight:600, padding:0 }}>
                          Edit
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

        </div>

        {/* Fixed bottom — Complete button */}
        {!isDone && (
          <div style={{ padding:'12px 20px', paddingBottom:'max(12px, env(safe-area-inset-bottom))', borderTop:'1px solid var(--border)', background:'white' }}>
            {allAssigned
              ? <button className="btn btn-success btn-full btn-lg" onClick={handleComplete}
                  style={{ boxShadow:'0 4px 16px rgba(22,163,74,.28)' }}>
                  ✅ Mark as Complete
                </button>
              : <button className="btn btn-ghost btn-full" onClick={() => setView('items')}>
                  ← Back to Items ({total - assigned} remaining)
                </button>
            }
          </div>
        )}
      </div>
    );
  }

  // ── ITEMS CARD VIEW ───────────────────────────────────────
  return (
    <div
      style={{ display:'flex', flexDirection:'column', height:'100vh', height:'100dvh', userSelect:'none' }}
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}
    >
      {/* Header */}
      <div className="header" style={{ flexShrink:0 }}>
        <button className="btn btn-ghost" style={{ padding:'6px 10px', marginLeft:-6 }} onClick={onBack}>
          ← Back
        </button>
        <div className="header-sub">
          <div className="htitle">{bill.receiptDate || 'Receipt'}</div>
          <div className="hdetail">{total} items · £{bill.totalBill.toFixed(2)}</div>
        </div>
        <button className="btn btn-ghost" style={{ padding:'6px 10px', fontSize:13, whiteSpace:'nowrap' }}
          onClick={() => setView('summary')}>
          Summary
        </button>
      </div>

      {/* Progress bar */}
      <div style={{ flexShrink:0, padding:'10px 20px 8px', borderBottom:'1px solid var(--border)', background:'#fafafa' }}>
        <div className="prog-bar">
          <div className={'prog-fill' + (isDone ? ' done' : '')} style={{ width:(pct*100)+'%' }} />
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:4, fontSize:12, color:'var(--muted)' }}>
          <span>{assigned} of {total} assigned</span>
          {allAssigned && !isDone && (
            <button style={{ background:'none', border:'none', color:'var(--success)', fontWeight:700, fontSize:12, cursor:'pointer', padding:0 }}
              onClick={() => setView('summary')}>
              All done — view summary →
            </button>
          )}
          {isDone && <span style={{ color:'var(--success)', fontWeight:700 }}>✓ Complete</span>}
        </div>
      </div>

      {/* Item card — fills remaining space, content vertically centred */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', padding:'16px 24px', gap:0, overflow:'hidden' }}>

        {allNames.length === 0
          ? <div className="empty" style={{ padding:0 }}>
              <div className="eicon">👤</div>
              <h3>No people configured</h3>
              <p>Go to Settings → People to add household members.</p>
            </div>
          : <>
              {/* Item counter */}
              <div style={{ fontSize:13, fontWeight:600, color:'var(--muted)', marginBottom:16, letterSpacing:'.02em' }}>
                {safeIdx + 1} of {total}
              </div>

              {/* Item name — clamped to exactly 2 lines so nothing below ever shifts */}
              <div style={{
                fontSize: 19, fontWeight: 700, textAlign: 'center', lineHeight: 1.35,
                marginBottom: 10, maxWidth: 320, width: '100%',
                height: '2.7em',           /* always exactly 2 lines tall */
                overflow: 'hidden',
                display: '-webkit-box',
                WebkitLineClamp: 2,
                WebkitBoxOrient: 'vertical',
              }}>
                {item.name}
              </div>

              {/* Price */}
              <div style={{ fontSize:36, fontWeight:800, color:'var(--primary)', letterSpacing:'-1px', marginBottom:28 }}>
                £{item.price.toFixed(2)}
              </div>

              {/* Chips — individuals first, then groups on their own row */}
              {(() => {
                // Build group → members map so we can light up individuals via group selection
                const gmap = {};
                (config.groups || []).forEach(g => { gmap[g.name] = g.members || []; });

                // A person chip is "selected" if directly assigned OR they're in an assigned group
                function personSelected(name) {
                  if (assignees.includes(name)) return true;
                  return assignees.some(a => (gmap[a] || []).includes(name));
                }
                // A person is "via group" (not directly) — show subtly differently
                function personViaGroup(name) {
                  return !assignees.includes(name) && assignees.some(a => (gmap[a] || []).includes(name));
                }

                return (
              <div style={{ width:'100%', maxWidth:360, marginBottom:20 }}>

                {/* Individual people */}
                {(config.people || []).length > 0 && (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center', marginBottom: (config.groups || []).length > 0 ? 10 : 0 }}>
                    {(config.people || []).map(name => {
                      const sel     = personSelected(name);
                      const viaGrp  = personViaGroup(name);
                      const c       = colorFor(name, allNames);
                      return (
                        <button key={name} disabled={isDone}
                          style={{
                            padding:'13px 22px', borderRadius:32, border:'2px solid',
                            fontSize:16, fontWeight:700,
                            cursor: isDone ? 'default' : 'pointer',
                            transition:'all .12s', WebkitTapHighlightColor:'transparent',
                            opacity: viaGrp ? 0.7 : 1,
                            ...(sel
                              ? { background:c.bg, borderColor:c.bd, color:c.fg }
                              : { background:'#f1f5f9', borderColor:'#e2e8f0', color:'#94a3b8' }
                            ),
                          }}
                          onClick={() => toggle(name)}
                        >
                          {name}{viaGrp ? ' ·' : ''}
                        </button>
                      );
                    })}
                  </div>
                )}

                {/* Groups — visually separated */}
                {(config.groups || []).length > 0 && (
                  <>
                    <div style={{ display:'flex', alignItems:'center', gap:8, margin:'2px 0 10px' }}>
                      <div style={{ flex:1, height:1, background:'var(--border)' }} />
                      <span style={{ fontSize:10, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>Groups</span>
                      <div style={{ flex:1, height:1, background:'var(--border)' }} />
                    </div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center' }}>
                      {(config.groups || []).map(g => {
                        const sel = assignees.includes(g.name);
                        const c   = colorFor(g.name, allNames);
                        return (
                          <button key={g.name} disabled={isDone}
                            style={{
                              padding:'13px 22px', borderRadius:32, border:'2px solid',
                              fontSize:16, fontWeight:700,
                              cursor: isDone ? 'default' : 'pointer',
                              transition:'all .12s', WebkitTapHighlightColor:'transparent',
                              ...(sel
                                ? { background:c.bg, borderColor:c.bd, color:c.fg }
                                : { background:'#f1f5f9', borderColor:'#e2e8f0', color:'#94a3b8' }
                              ),
                            }}
                            onClick={() => toggle(g.name)}
                          >
                            👥 {g.name}
                          </button>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
                ); // end IIFE return
              })()} {/* end IIFE */}

              {/* Assignment status line — fixed height so nothing shifts */}
              {(() => {
                const gmap2 = {};
                (config.groups || []).forEach(g => { gmap2[g.name] = g.members || []; });
                // Expand assignees to real people for cost-split display
                const expanded = assignees.flatMap(a => gmap2[a]?.length ? gmap2[a] : [a]);
                return (
                  <div style={{ height:24, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    {assignees.length > 0
                      ? <span style={{ fontSize:14, color:'var(--success)', fontWeight:600 }}>
                          ✓ {assignees.join(' & ')}
                          {expanded.length > 1 && (
                            <span style={{ color:'var(--muted)', fontWeight:400 }}>
                              {' '}· £{(item.price / expanded.length).toFixed(2)} each
                            </span>
                          )}
                        </span>
                      : <span style={{ fontSize:13, color:'var(--muted)' }}>
                          {isDone ? '' : 'Tap a name to assign'}
                        </span>
                    }
                  </div>
                );
              })()}
            </>
        }
      </div>

      {/* Bottom nav — fixed, NEVER moves, same layout always */}
      <div style={{
        flexShrink: 0,
        display: 'grid',
        gridTemplateColumns: '1fr auto 1fr',
        alignItems: 'center',
        gap: 8,
        padding: '12px 20px',
        paddingBottom: 'max(12px, env(safe-area-inset-bottom))',
        borderTop: '1px solid var(--border)',
        background: 'white',
      }}>
        {/* Left — always same width */}
        <button
          className="btn btn-ghost"
          style={{ justifySelf:'start', minWidth:88, fontSize:15 }}
          onClick={goPrev}
        >
          {safeIdx > 0 ? '← Prev' : '← List'}
        </button>

        {/* Centre counter */}
        <span style={{ fontSize:13, color:'var(--muted)', fontWeight:600, textAlign:'center', whiteSpace:'nowrap' }}>
          {safeIdx + 1} / {total}
        </span>

        {/* Right — always same width */}
        <button
          className={'btn ' + (safeIdx < total - 1 ? 'btn-primary' : 'btn-success')}
          style={{ justifySelf:'end', minWidth:88, fontSize:15 }}
          onClick={goNext}
        >
          {safeIdx < total - 1 ? 'Next →' : 'Summary →'}
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// SETTINGS SCREEN
// ════════════════════════════════════════════════════════════
function SettingsScreen({ config, user, onBack, saveConfig, showToast }) {
  const [tab, setTab] = useState('people');

  return (
    <div>
      <div className="header">
        <button className="btn btn-ghost" style={{ padding:'6px 10px', marginLeft:-6 }} onClick={onBack}>
          ← Back
        </button>
        <span className="header-title">Settings</span>
      </div>

      <div className="tab-bar">
        {[['people','👤 People'],['groups','👥 Groups'],['users','🔑 Users']].map(([key, label]) => (
          <div key={key} className={'tab' + (tab === key ? ' on' : '')} onClick={() => setTab(key)}>
            {label}
          </div>
        ))}
      </div>

      {tab === 'people' && <PeopleTab  config={config} saveConfig={saveConfig} showToast={showToast} />}
      {tab === 'groups' && <GroupsTab  config={config} saveConfig={saveConfig} showToast={showToast} />}
      {tab === 'users'  && <UsersTab   user={user} showToast={showToast} />}

      <div style={{ textAlign:'center', padding:'24px 16px 32px' }}>
        <button
          onClick={() => _sb.auth.signOut()}
          style={{ background:'none', border:'none', color:'var(--muted)', fontSize:'0.8rem', cursor:'pointer', textDecoration:'underline', opacity:0.7 }}
        >
          Sign out
        </button>
      </div>
    </div>
  );
}

// ── People tab ────────────────────────────────────────────────
function PeopleTab({ config, saveConfig, showToast }) {
  const [newName,     setNewName]     = useState('');
  const [editingName, setEditingName] = useState(null); // the name currently being edited
  const [editValue,   setEditValue]   = useState('');

  async function add(e) {
    e.preventDefault();
    const n = newName.trim();
    if (!n) return;
    if (config.people.includes(n)) { showToast('Already exists'); return; }
    await saveConfig({ ...config, people: [...config.people, n] });
    setNewName('');
  }

  function startEdit(name) {
    setEditingName(name);
    setEditValue(name);
  }

  function cancelEdit() {
    setEditingName(null);
    setEditValue('');
  }

  async function saveEdit(oldName) {
    const n = editValue.trim();
    if (!n) { cancelEdit(); return; }
    if (n === oldName) { cancelEdit(); return; }
    if (config.people.includes(n)) { showToast('Name already exists'); return; }
    // Rename in people list AND in any group members that reference the old name
    const newPeople = config.people.map(p => p === oldName ? n : p);
    const newGroups = (config.groups || []).map(g => ({
      ...g,
      members: g.members.map(m => m === oldName ? n : m),
    }));
    await saveConfig({ ...config, people: newPeople, groups: newGroups });
    cancelEdit();
  }

  return (
    <div style={{ padding:16 }}>
      <p style={{ fontSize:13, color:'var(--muted)', marginBottom:16 }}>
        People who can be assigned items on receipts.
      </p>

      {config.people.length === 0 && (
        <p style={{ textAlign:'center', color:'var(--muted)', padding:'20px 0', fontSize:14 }}>No people yet.</p>
      )}

      {config.people.map(name => {
        const c        = colorFor(name, config.people);
        const isEditing = editingName === name;
        return (
          <div key={name} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 0', borderBottom:'1px solid var(--border)' }}>
            {/* Avatar */}
            <div style={{ width:34, height:34, borderRadius:'50%', flexShrink:0, background:c.bg, border:'2px solid '+c.bd, display:'flex', alignItems:'center', justifyContent:'center', color:c.fg, fontWeight:700, fontSize:14 }}>
              {(isEditing ? editValue || name : name)[0].toUpperCase()}
            </div>

            {isEditing
              /* Edit mode */
              ? <form style={{ flex:1, display:'flex', gap:6 }}
                  onSubmit={e => { e.preventDefault(); saveEdit(name); }}>
                  <input
                    className="input"
                    value={editValue}
                    onChange={e => setEditValue(e.target.value)}
                    onKeyDown={e => e.key === 'Escape' && cancelEdit()}
                    autoFocus
                    style={{ flex:1, padding:'6px 10px', fontSize:14 }}
                  />
                  <button type="submit" className="btn btn-primary" style={{ padding:'6px 10px', fontSize:13 }}>Save</button>
                  <button type="button" className="btn btn-ghost" style={{ padding:'6px 10px', fontSize:13 }} onClick={cancelEdit}>✕</button>
                </form>

              /* View mode */
              : <>
                  <span style={{ flex:1, fontWeight:600, fontSize:15 }}>{name}</span>
                  <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:13, color:'var(--primary)' }}
                    onClick={() => startEdit(name)}>
                    ✎
                  </button>
                  <button className="btn btn-ghost" style={{ padding:'4px 8px', color:'var(--danger)' }}
                    onClick={() => saveConfig({ ...config, people: config.people.filter(p => p !== name) })}>
                    ✕
                  </button>
                </>
            }
          </div>
        );
      })}

      <form onSubmit={add} style={{ display:'flex', gap:10, marginTop:16 }}>
        <input className="input" placeholder="Enter a name…" value={newName}
          onChange={e => setNewName(e.target.value)} style={{ flex:1 }} />
        <button type="submit" className="btn btn-primary">Add</button>
      </form>
    </div>
  );
}

// ── Groups tab ────────────────────────────────────────────────
function GroupsTab({ config, saveConfig, showToast }) {
  const [newGroup,    setNewGroup]    = useState('');
  const [expanded,    setExpanded]    = useState(null);
  const [newMember,   setNewMember]   = useState('');
  const [editingGroup, setEditingGroup] = useState(null);
  const [editGroupVal, setEditGroupVal] = useState('');

  async function addGroup(e) {
    e.preventDefault();
    const n = newGroup.trim();
    if (!n) return;
    if ((config.groups || []).some(g => g.name === n)) { showToast('Already exists'); return; }
    await saveConfig({ ...config, groups: [...(config.groups || []), { name: n, members: [] }] });
    setNewGroup('');
  }

  async function removeGroup(name) {
    await saveConfig({ ...config, groups: (config.groups || []).filter(g => g.name !== name) });
    if (expanded === name) setExpanded(null);
  }

  function startEditGroup(name, e) {
    e.stopPropagation();
    setEditingGroup(name);
    setEditGroupVal(name);
  }

  function cancelEditGroup() {
    setEditingGroup(null);
    setEditGroupVal('');
  }

  async function saveGroupRename(oldName) {
    const n = editGroupVal.trim();
    if (!n || n === oldName) { cancelEditGroup(); return; }
    if ((config.groups || []).some(g => g.name === n)) { showToast('Name already exists'); return; }
    const groups = (config.groups || []).map(g => g.name === oldName ? { ...g, name: n } : g);
    await saveConfig({ ...config, groups });
    if (expanded === oldName) setExpanded(n);
    cancelEditGroup();
  }

  async function addMember(groupName, e) {
    e.preventDefault();
    const m = newMember.trim();
    if (!m) return;
    const groups = (config.groups || []).map(g =>
      g.name !== groupName ? g
      : g.members.includes(m) ? g
      : { ...g, members: [...g.members, m] }
    );
    await saveConfig({ ...config, groups });
    setNewMember('');
  }

  async function removeMember(groupName, member) {
    const groups = (config.groups || []).map(g =>
      g.name !== groupName ? g : { ...g, members: g.members.filter(m => m !== member) }
    );
    await saveConfig({ ...config, groups });
  }

  return (
    <div style={{ padding:16 }}>
      <p style={{ fontSize:13, color:'var(--muted)', marginBottom:16 }}>
        Groups let you assign an item to multiple people at once.
      </p>

      {(config.groups || []).length === 0 && (
        <p style={{ textAlign:'center', color:'var(--muted)', padding:'20px 0', fontSize:14 }}>No groups yet.</p>
      )}

      {(config.groups || []).map(group => (
        <div key={group.name} style={{ marginBottom:8, border:'1px solid var(--border)', borderRadius:10, overflow:'hidden' }}>
          <div
            style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 14px', cursor: editingGroup === group.name ? 'default' : 'pointer', background: expanded === group.name ? '#f8fafc' : 'white' }}
            onClick={() => editingGroup !== group.name && setExpanded(expanded === group.name ? null : group.name)}
          >
            <span style={{ fontSize:18 }}>👥</span>

            {editingGroup === group.name
              /* Rename mode */
              ? <form style={{ flex:1, display:'flex', gap:6 }}
                  onSubmit={e => { e.preventDefault(); saveGroupRename(group.name); }}>
                  <input
                    className="input"
                    value={editGroupVal}
                    onChange={e => setEditGroupVal(e.target.value)}
                    onKeyDown={e => e.key === 'Escape' && cancelEditGroup()}
                    autoFocus
                    style={{ flex:1, padding:'5px 9px', fontSize:13 }}
                  />
                  <button type="submit" className="btn btn-primary" style={{ padding:'5px 10px', fontSize:12 }}>Save</button>
                  <button type="button" className="btn btn-ghost" style={{ padding:'5px 10px', fontSize:12 }} onClick={e => { e.stopPropagation(); cancelEditGroup(); }}>✕</button>
                </form>

              /* View mode */
              : <>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:700, fontSize:14 }}>{group.name}</div>
                    <div style={{ fontSize:12, color:'var(--muted)' }}>
                      {group.members.length ? group.members.join(', ') : 'No members'}
                    </div>
                  </div>
                  <button className="btn btn-ghost" style={{ padding:'3px 8px', color:'var(--primary)', fontSize:12 }}
                    onClick={e => startEditGroup(group.name, e)}>
                    ✎
                  </button>
                  <button className="btn btn-ghost" style={{ padding:'3px 8px', color:'var(--danger)', fontSize:12 }}
                    onClick={e => { e.stopPropagation(); removeGroup(group.name); }}>
                    ✕
                  </button>
                  <span style={{ color:'var(--muted)', fontSize:12 }}>{expanded === group.name ? '▲' : '▼'}</span>
                </>
            }
          </div>

          {expanded === group.name && (
            <div style={{ padding:'0 14px 14px', background:'#f8fafc', borderTop:'1px solid var(--border)' }}>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6, padding:'10px 0 8px' }}>
                {group.members.map(m => (
                  <span key={m} style={{ display:'inline-flex', alignItems:'center', gap:4, background:'white', border:'1px solid var(--border)', borderRadius:20, padding:'4px 10px', fontSize:13 }}>
                    {m}
                    <button style={{ border:'none', background:'none', cursor:'pointer', color:'var(--muted)', fontSize:12, lineHeight:1 }}
                      onClick={() => removeMember(group.name, m)}>✕</button>
                  </span>
                ))}
                {!group.members.length && <span style={{ fontSize:13, color:'var(--muted)' }}>No members yet</span>}
              </div>
              <form onSubmit={e => addMember(group.name, e)} style={{ display:'flex', gap:8 }}>
                <input className="input" placeholder="Add member…" value={newMember}
                  onChange={e => setNewMember(e.target.value)}
                  style={{ flex:1, padding:'8px 10px', fontSize:13 }} />
                <button type="submit" className="btn btn-primary" style={{ padding:'8px 12px', fontSize:13 }}>Add</button>
              </form>
            </div>
          )}
        </div>
      ))}

      <form onSubmit={addGroup} style={{ display:'flex', gap:10, marginTop:16 }}>
        <input className="input" placeholder="Group name (e.g. Everyone)" value={newGroup}
          onChange={e => setNewGroup(e.target.value)} style={{ flex:1 }} />
        <button type="submit" className="btn btn-primary">Add</button>
      </form>
    </div>
  );
}

// ── Users tab ─────────────────────────────────────────────────
function UsersTab({ user, showToast }) {
  const [users,    setUsers]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [newEmail, setNewEmail] = useState('');
  const [newPass,  setNewPass]  = useState('');
  const [adding,   setAdding]   = useState(false);

  useEffect(() => { fetchUsers(); }, []);

  async function fetchUsers() {
    setLoading(true);
    try {
      const { data: { session } } = await _sb.auth.getSession();
      const r = await fetch(`${API}/users`, {
        headers: { Authorization: `Bearer ${session?.access_token}` },
      });
      const d = await r.json();
      setUsers(d.users || []);
    } catch {}
    setLoading(false);
  }

  async function addUser(e) {
    e.preventDefault();
    if (!newEmail || !newPass) return;
    setAdding(true);
    try {
      const { data: { session } } = await _sb.auth.getSession();
      const r = await fetch(`${API}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session?.access_token}` },
        body: JSON.stringify({ email: newEmail, password: newPass }),
      });
      const d = await r.json();
      if (d.error) showToast('Error: ' + d.error);
      else { showToast('User added ✓'); setNewEmail(''); setNewPass(''); fetchUsers(); }
    } catch (ex) { showToast('Failed: ' + ex.message); }
    setAdding(false);
  }

  async function removeUser(uid) {
    if (!confirm('Remove this user?')) return;
    try {
      const { data: { session } } = await _sb.auth.getSession();
      const r = await fetch(`${API}/users`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session?.access_token}` },
        body: JSON.stringify({ userId: uid }),
      });
      const d = await r.json();
      if (d.error) showToast('Error: ' + d.error);
      else { showToast('User removed'); fetchUsers(); }
    } catch (ex) { showToast('Failed: ' + ex.message); }
  }

  if (loading) {
    return <div style={{ display:'flex', justifyContent:'center', padding:40 }}><div className="spin" /></div>;
  }

  return (
    <div style={{ padding:16 }}>
      <p style={{ fontSize:13, color:'var(--muted)', marginBottom:16 }}>
        Manage who has access to this app. Only the admin can add or remove users.
      </p>

      {users.map(u => {
        const isSelf = u.email === user?.email;
        const joined = u.createdAt
          ? new Date(u.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
          : '';
        return (
          <div key={u.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 0', borderBottom:'1px solid var(--border)' }}>
            <div style={{ width:36, height:36, borderRadius:'50%', flexShrink:0, background:'#eff6ff', border:'2px solid #3b82f6', display:'flex', alignItems:'center', justifyContent:'center', color:'#1d4ed8', fontWeight:700, fontSize:14 }}>
              {(u.email || '?')[0].toUpperCase()}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:600, fontSize:14, display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>
                <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{u.email}</span>
                {isSelf && <span style={{ fontSize:10, background:'#f1f5f9', color:'var(--muted)', borderRadius:10, padding:'1px 6px', flexShrink:0 }}>You</span>}
              </div>
              <div style={{ fontSize:12, color:'var(--muted)', display:'flex', alignItems:'center', gap:6 }}>
                <span className={'badge ' + (u.confirmed ? 'badge-active' : 'badge-pending')}
                  style={{ fontSize:10, padding:'1px 6px' }}>
                  {u.confirmed ? 'Active' : 'Pending'}
                </span>
                {u.confirmed ? 'Joined' : 'Added'} {joined}
              </div>
            </div>
            {!isSelf && (
              <button className="btn btn-ghost" style={{ padding:'4px 8px', color:'var(--danger)', fontSize:12, flexShrink:0 }}
                onClick={() => removeUser(u.id)}>
                Remove
              </button>
            )}
          </div>
        );
      })}

      <form onSubmit={addUser} style={{ marginTop:20, background:'#f8fafc', borderRadius:10, padding:14, border:'1px solid var(--border)' }}>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:12 }}>➕ Add User</div>
        <div style={{ marginBottom:10 }}>
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="user@example.com"
            value={newEmail} onChange={e => setNewEmail(e.target.value)} />
        </div>
        <div style={{ marginBottom:12 }}>
          <label className="label">Password</label>
          <input className="input" type="password" placeholder="Set a temporary password"
            value={newPass} onChange={e => setNewPass(e.target.value)} />
        </div>
        <button type="submit" className="btn btn-primary btn-full" disabled={adding}>
          {adding ? <span className="spin" /> : 'Add User'}
        </button>
      </form>
    </div>
  );
}
