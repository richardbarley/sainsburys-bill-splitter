<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bill Splitter</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f8fafc;
      --surface:       #ffffff;
      --border:        #e2e8f0;
      --text:          #0f172a;
      --muted:         #64748b;
      --primary:       #2563eb;
      --primary-light: #eff6ff;
      --success:       #16a34a;
      --success-light: #dcfce7;
      --danger:        #dc2626;
      --radius:        12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #0f172a;
        --surface:       #1e293b;
        --border:        #334155;
        --text:          #f1f5f9;
        --muted:         #94a3b8;
        --primary:       #60a5fa;
        --primary-light: #1e3a5f;
        --success:       #4ade80;
        --success-light: #14532d;
        --danger:        #f87171;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--surface);
      position: relative;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .header-title { flex: 1; font-size: 18px; font-weight: 700; }
    .header-sub   { flex: 1; min-width: 0; }
    .header-sub .htitle  { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-sub .hdetail { font-size: 12px; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      padding: 10px 16px;
      transition: opacity .12s, transform .12s;
      white-space: nowrap;
    }
    .btn:active  { opacity: .8; transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-full    { width: 100%; padding: 14px; font-size: 16px; border-radius: 10px; }
    .btn-lg      { padding: 14px 24px; font-size: 16px; border-radius: 10px; }
    .btn-icon    { padding: 8px; border-radius: 8px; font-size: 18px; line-height: 1; }

    /* ── Inputs ── */
    .input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; color: var(--text); background: var(--bg);
      outline: none; transition: border-color .15s;
    }
    .input:focus { border-color: var(--primary); background: var(--surface); }
    .label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em;
    }

    /* ── Chips ── */
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 5px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent;
      transition: all .12s; user-select: none; -webkit-user-select: none;
    }
    .chip:active { transform: scale(.94); }
    .chip-off { background: var(--bg); border-color: var(--border); color: var(--muted); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 20px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge-done    { background: var(--success-light); color: var(--success); }
    .badge-wip     { background: var(--primary-light);  color: var(--primary); }
    .badge-new     { background: var(--bg); color: var(--muted); }
    .badge-active  { background: var(--success-light); color: var(--success); }
    .badge-pending { background: #fef3c7; color: #92400e; }
    @media (prefers-color-scheme: dark) {
      .badge-pending { background: #451a03; color: #fbbf24; }
    }

    /* ── Progress ── */
    .prog-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s; }
    .prog-fill.done { background: var(--success); }

    /* ── Upload area ── */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 36px 20px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s;
      margin: 16px;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--primary); background: var(--primary-light); }
    .upload-area h3 { font-size: 15px; margin: 8px 0 4px; }
    .upload-area p  { font-size: 13px; color: var(--muted); }

    /* ── Tabs ── */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; gap: 4px; }
    .tab {
      padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s;
    }
    .tab.on { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── List rows ── */
    .list-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .list-row:last-child  { border-bottom: none; }
    .list-row:active { background: var(--bg); }

    /* ── Item assignment row ── */
    .item-row { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .item-row:last-child { border-bottom: none; }
    .item-row-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
    .item-name  { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.3; }
    .item-price { font-size: 14px; font-weight: 700; white-space: nowrap; }
    .item-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ── Summary row ── */
    .sum-row { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .sum-row:last-child { border-bottom: none; }
    .sum-name   { flex: 1; font-size: 15px; font-weight: 600; }
    .sum-amount { font-size: 18px; font-weight: 700; color: var(--primary); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--surface); padding: 10px 20px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      white-space: nowrap; z-index: 400; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }

    /* ── Login ── */
    .login-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 20px;
    }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty .eicon { font-size: 40px; margin-bottom: 10px; }
    .empty h3   { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty p    { font-size: 14px; line-height: 1.5; }

    .section-hdr {
      padding: 12px 20px 6px;
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
    }

    @media (max-width: 480px) { #root { max-width: 100%; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ════════════════════════════════════════════════════════════
   BILL SPLITTER  —  Collaborative, Supabase-first
   ════════════════════════════════════════════════════════════ */

const { useState, useEffect, useRef, useMemo } = React;

// ── Colour palette for people chips ─────────────────────────
const PALETTE = [
  { bg:'#dbeafe', bd:'#3b82f6', fg:'#1e40af' },
  { bg:'#ede9fe', bd:'#8b5cf6', fg:'#4c1d95' },
  { bg:'#d1fae5', bd:'#10b981', fg:'#064e3b' },
  { bg:'#fce7f3', bd:'#ec4899', fg:'#831843' },
  { bg:'#ffedd5', bd:'#fb923c', fg:'#7c2d12' },
  { bg:'#fef9c3', bd:'#facc15', fg:'#713f12' },
  { bg:'#cffafe', bd:'#22d3ee', fg:'#164e63' },
  { bg:'#fecaca', bd:'#f87171', fg:'#7f1d1d' },
];

function colorFor(name, allNames) {
  const idx = allNames.indexOf(name);
  return PALETTE[(idx >= 0 ? idx : 0) % PALETTE.length];
}

// ── Supabase ─────────────────────────────────────────────────
const API = '/.netlify/functions';
let _sb = null;

async function initSb() {
  if (_sb) return _sb;
  const r   = await fetch(`${API}/client-config`);
  const cfg = await r.json();
  if (!cfg.supabaseUrl) throw new Error(cfg.error || 'Missing supabaseUrl in config response');
  _sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
    auth: { persistSession: true, autoRefreshToken: true },
  });
  return _sb;
}

// ── Date helpers ──────────────────────────────────────────────
const MONTH_MAP = {
  jan:1, feb:2, mar:3, apr:4, may:5, jun:6,
  jul:7, aug:8, sep:9, oct:10, nov:11, dec:12,
  january:1, february:2, march:3, april:4, june:6,
  july:7, august:8, september:9, october:10, november:11, december:12,
};

function extractReceiptDate(text) {
  if (!text) return '';
  const allMonths = Object.keys(MONTH_MAP).join('|');
  const re = new RegExp(
    '(\\d{1,2})(?:st|nd|rd|th)?\\s+(' + allMonths + ')\\s+(\\d{2,4})',
    'i'
  );
  const m = text.match(re);
  if (m) {
    const day = parseInt(m[1], 10);
    const mon = MONTH_MAP[m[2].toLowerCase()];
    let yr    = parseInt(m[3], 10);
    if (yr < 100) yr += 2000;
    if (mon && yr > 2000) {
      return new Date(yr, mon - 1, day)
        .toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }
  }
  const dmy = text.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (dmy) {
    return new Date(+dmy[3], +dmy[2] - 1, +dmy[1])
      .toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  }
  return '';
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return isNaN(d) ? '' : d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function sanitizePdfStr(str) {
  return str
    .replace(/\u0000/g, '')
    .replace(/[\uD800-\uDFFF]/g, '')
    .replace(/\u00a3/g, '\u00a3');
}

// ── PDF parsing ───────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Sanitise strings extracted by pdfjs before they reach Supabase/PostgreSQL.
// PostgreSQL rejects: null bytes (\u0000) and lone Unicode surrogates (U+D800–U+DFFF).
// pdfjs can produce both when PDFs use non-standard font encodings.
function sanitizePdfStr(str) {
  return str
    .replace(/\u0000/g, '')                   // remove null bytes
    .replace(/[\uD800-\uDFFF]/g, '')          // remove lone surrogates
    .replace(/\u00a3/g, '\u00a3');            // ensure £ is clean NFC
}

async function parsePdf(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const allLines = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Group text items into visual rows using a ±3px Y-tolerance bucket.
    // Math.round alone is too brittle — items on the same line can differ by
    // a fraction of a point in transform[5].
    const rows = [];
    for (const item of content.items) {
      const str = sanitizePdfStr(item.str);
      if (!str.trim()) continue;
      const y = item.transform[5];
      const existing = rows.find(r => Math.abs(r.y - y) <= 3);
      if (existing) {
        existing.items.push({ str, x: item.transform[4] });
      } else {
        rows.push({ y, items: [{ str, x: item.transform[4] }] });
      }
    }
    // PDF Y axis is bottom-up → sort descending = top-to-bottom reading order
    rows.sort((a, b) => b.y - a.y);
    for (const row of rows) {
      const line = row.items.sort((a, b) => a.x - b.x).map(i => i.str).join(' ').trim();
      if (line) allLines.push(line);
    }
  }

  // Merge wrapped item lines.
  // Only lines starting with a digit go into the pending buffer — they're
  // quantity prefixes ("1 ", "14 ", "2.14kg ") that belong with the next
  // priced line. Header/footer lines ("Groceries (106 items)" etc.) start
  // with uppercase and must go straight to output so they never get
  // prepended to an item and trigger the SKIP filter.
  const mergedLines = [];
  let pending = '';
  for (const line of allLines) {
    const hasPriceAtEnd = /£\d+\.\d{2}\s*$/.test(line);
    if (hasPriceAtEnd) {
      // Prepend any pending quantity/continuation fragment
      mergedLines.push(pending ? pending + ' ' + line : line);
      pending = '';
    } else if (pending && /^[a-z]/.test(line)) {
      // Lowercase continuation of a wrapped name (e.g. "x 28g" after "Pack 4")
      pending += ' ' + line;
    } else if (/^\d/.test(line)) {
      // Starts with a digit — quantity prefix; hold it for the next priced line
      if (pending) mergedLines.push(pending);
      pending = line;
    } else {
      // Uppercase header/footer — send straight through, don't accumulate
      if (pending) mergedLines.push(pending);
      mergedLines.push(line);
      pending = '';
    }
  }
  if (pending) mergedLines.push(pending);

  const text = mergedLines.join('\n');
  return { items: parseReceiptItems(text), receiptDate: extractReceiptDate(text) };
}

function parseReceiptItems(text) {
  const SKIP = /^(subtotal|total|balance|savings|saved|clubcard|nectar|reward|payment|change|cash|visa|mastercard|contactless|approved|thank you|store|receipt|transaction|vat|points|voucher|bag|carrier|loyalty|online|delivery|charge|fee|price match|you save|you've|spend|earn|bonus|offer|discount|saving|low every|previous|new points|slot time|your receipt|we took|thanks for)/i;
  // Require literal £ so negative savings lines and bare numbers never match
  const PRICE_LINE = /^(.*?)\s+£(\d+\.\d{2})\s*$/;
  const items = [];
  let inGroceries = false;

  for (const raw of text.split(/\n/)) {
    const line = raw.trim();
    if (!line || line.length < 3) continue;

    // Start parsing items only after the "Groceries (X items)" heading
    if (/^Groceries\s*\(/i.test(line)) { inGroceries = true; continue; }
    // Stop parsing at "Order summary"
    if (/^Order\s+summary/i.test(line)) break;

    if (!inGroceries || SKIP.test(line)) continue;
    const m = PRICE_LINE.exec(line);
    if (!m) continue;

    // Keep the leading quantity in the name ("14 GetPro...", "2.14kg Bananas...")
    // — the user wants it as context; do not strip it.
    const name  = m[1].trim();
    const price = parseFloat(m[2]);
    if (!name || price <= 0 || price > 500 || name.length < 2) continue;
    // Skip short all-caps section headers
    if (name === name.toUpperCase() && name.length < 20 && !/\d/.test(name)) continue;

    items.push({ name, price });
  }
  return items;
}

// ── Item categoriser ──────────────────────────────────────────
const CAT_RULES = [
  ['Dairy & Eggs',         /\bmilk\b|cheese|butter|yogur|fromage|creme fraiche|\bcream\b(?!.*crisp)|egg\b|margarin|cheddar|brie|mozzarella|stilton|oat milk|soy milk/i],
  ['Meat & Fish',          /chicken|beef|pork|lamb|\bfish\b|salmon|tuna|\bcod\b|steak|mince|bacon|sausag|\bham\b|turkey|prawn|shrimp|fillet|brisket|mackerel|haddock|kipper|scallop|mussel/i],
  ['Bakery',               /\bbread\b|loaf|\broll\b|bagel|croissant|muffin|\bcake\b|scone|pastry|doughnut|baguette|sourdough|brioche|crumpet|waffle|\bwrap\b|pitta|flatbread|naan|tortilla/i],
  ['Drinks',               /\bjuice\b|squash|\bcola\b|\bbeer\b|wine|lemonade|coffee|espresso|\btea\b|smoothie|cordial|cider|vodka|prosecco|\bgin\b|fizzy|tonic|sparkling|still water|oat drink/i],
  ['Snacks & Treats',      /crisp|chocolate|biscuit|sweet\b|candy|\bnuts?\b|popcorn|pretzel|cracker|flapjack|pick up|kitkat|twix|haribo|chew|choc|brownie|browni|cookie|shortbread|wafer|cereal bar/i],
  ['Fruit & Veg',          /apple|banana|carrot|potato|tomato|lettuce|onion|pepper|cucumber|salad|spinach|broccoli|mushroom|garlic|lemon|lime|\borange\b|grape|strawberr|raspberr|blueberr|berry|avocado|courgette|aubergine|leek|celery|\bpeas?\b|cauliflower|kale|cabbage|sweetcorn|parsnip|beetroot|mango|pineapple|peach|plum|cherry|watermelon|melon|ginger|chilli/i],
  ['Frozen',               /frozen|ice cream|sorbet|\bice loll|gelato/i],
  ['Tins & Jars',          /\btin\b|tinned|canned|baked bean|pasta sauce|pesto|\bjam\b|marmalade|honey|pickle|chutney|relish|passata|coconut milk|chopped tomato/i],
  ['Breakfast Cereals',    /cereal|porridge|\boats?\b|granola|muesli|weetabix|cornflake|shreddies|crunchy nut|bran flake|rice krispie/i],
  ['Pasta, Rice & Grains', /\bpasta\b|risotto|\brice\b|noodle|couscous|quinoa|\blentil\b|chickpea|spaghetti|penne|fusilli|linguine|tagliatelle/i],
  ['Condiments & Oils',    /ketchup|mayonnais|mustard|vinegar|\boil\b|dressing|seasoning|\bspice\b|\bherb\b|stock cube|gravy|soy sauce|worcester|tabasco|sriracha|teriyaki/i],
  ['Toiletries',           /shampoo|toothpaste|toothbrush|deodorant|conditioner|shower gel|moisturis|face wash|razor|toilet roll|toilet tissue|cotton|bodywash|skincare|lotion|perfume|cologne|lip balm|sunscreen|hand wash/i],
  ['Cleaning & Household', /washing up|detergent|bleach|cleaner|wipes?|dishwash|laundry|fabric cond|kitchen roll|bin bag|cling film|foil|parchment/i],
];

function categorizeItem(name) {
  for (const [cat, re] of CAT_RULES) {
    if (re.test(name)) return cat;
  }
  return 'Other';
}

// Palette for charts
const CHART_PERSON_COLORS = ['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#06b6d4'];
const CHART_CAT_COLORS    = ['#6366f1','#ec4899','#10b981','#f59e0b','#3b82f6','#ef4444','#8b5cf6','#06b6d4','#14b8a6','#f97316','#84cc16','#94a3b8'];

// Simple CSS bar (no SVG dependency)
function ChartBar({ value, max, color = 'var(--primary)', height = 7 }) {
  const pct = max > 0 ? Math.max(3, (value / max) * 100) : 0;
  return (
    <div style={{ flex:1, height, background:'var(--border)', borderRadius:height/2, overflow:'hidden' }}>
      <div style={{ width: pct + '%', height:'100%', background: color, borderRadius: height/2, transition:'width .4s ease' }} />
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// INSIGHTS SCREEN
// ════════════════════════════════════════════════════════════
function InsightsScreen({ bills, config, onBack }) {
  const [selectedPerson, setSelectedPerson] = useState(null);
  const completedBills = bills.filter(b => b.completedAt);
  const people = config.people || [];

  // Build group expansion map from all groups incl Everyone
  const gmap = {};
  getEffectiveGroups(config).forEach(g => { gmap[g.name] = g.members || []; });

  // Aggregate across completed bills
  const stats = useMemo(() => {
    const personTotals = {};
    const personItems  = {};   // {name: [{name, price, share, solo, sharedWith}]}
    const catTotals    = {};
    const perPersonCats = {};
    people.forEach(p => { personTotals[p] = 0; personItems[p] = []; perPersonCats[p] = {}; });

    completedBills.forEach(bill => {
      bill.items.forEach((item, idx) => {
        const raw = getAssignees(bill.assignments, idx);
        if (!raw.length) return;
        const expanded = [...new Set(raw.flatMap(n => gmap[n] || [n]))];
        if (!expanded.length) return;

        const share = item.price / expanded.length;
        const cat   = categorizeItem(item.name);
        catTotals[cat] = (catTotals[cat] || 0) + item.price;

        expanded.forEach(person => {
          if (!people.includes(person)) return;
          personTotals[person] = (personTotals[person] || 0) + share;
          (personItems[person] = personItems[person] || []).push({
            name: item.name, price: item.price, share,
            solo: expanded.length === 1,
            sharedWith: expanded.filter(n => n !== person),
          });
          perPersonCats[person] = perPersonCats[person] || {};
          perPersonCats[person][cat] = (perPersonCats[person][cat] || 0) + share;
        });
      });
    });

    return { personTotals, personItems, catTotals, perPersonCats };
  }, [completedBills.length, config]);

  if (completedBills.length === 0) {
    return (
      <div>
        <div className="header">
          <button className="btn btn-ghost btn-icon" onClick={onBack}>←</button>
          <span className="header-title">Insights</span>
          <div style={{ width:40 }} />
        </div>
        <div className="empty">
          <div className="eicon">📊</div>
          <h3>No data yet</h3>
          <p>Insights appear once you've completed at least one receipt.</p>
        </div>
      </div>
    );
  }

  if (selectedPerson) {
    return <PersonInsights person={selectedPerson} stats={stats} bills={completedBills}
      config={config} onBack={() => setSelectedPerson(null)} />;
  }

  return <HouseholdInsights bills={completedBills} config={config} stats={stats}
    onSelectPerson={setSelectedPerson} onBack={onBack} />;
}

function HouseholdInsights({ bills, config, stats, onSelectPerson, onBack }) {
  const { personTotals, catTotals } = stats;
  const people = config.people || [];

  const grandTotal    = Object.values(personTotals).reduce((s, v) => s + v, 0);
  const rawTotal      = bills.reduce((s, b) => s + b.totalBill, 0);
  const avgBill       = bills.length > 0 ? rawTotal / bills.length : 0;
  const maxPerson     = Math.max(...Object.values(personTotals), 0.01);

  const sortedPeople  = [...people].sort((a, b) => (personTotals[b] || 0) - (personTotals[a] || 0));
  const sortedCats    = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxCat        = sortedCats[0]?.[1] || 0.01;

  const sectionHead   = { fontSize:12, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.07em', marginBottom:10 };

  return (
    <div>
      <div className="header">
        <button className="btn btn-ghost btn-icon" onClick={onBack}>←</button>
        <span className="header-title">📊 Insights</span>
        <div style={{ width:40 }} />
      </div>

      <div style={{ padding:'4px 16px 40px' }}>
        {/* Summary strip */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, margin:'12px 0 24px' }}>
          {[
            { label:'Receipts',    value: bills.length },
            { label:'Total spent', value:`£${grandTotal.toFixed(0)}` },
            { label:'Avg shop',    value:`£${avgBill.toFixed(0)}` },
          ].map(({ label, value }) => (
            <div key={label} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'12px 8px', textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:'var(--text)' }}>{value}</div>
              <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>{label}</div>
            </div>
          ))}
        </div>

        {/* Per-person spending */}
        <div style={{ marginBottom:28 }}>
          <div style={sectionHead}>Spending per person</div>
          {sortedPeople.map((name, i) => {
            const total = personTotals[name] || 0;
            const emoji = getEmoji(config, name);
            const color = CHART_PERSON_COLORS[i % CHART_PERSON_COLORS.length];
            return (
              <div key={name} onClick={() => onSelectPerson(name)}
                style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 0', borderBottom:'1px solid var(--border)', cursor:'pointer' }}>
                <div style={{ width:9, height:9, borderRadius:'50%', background:color, flexShrink:0 }} />
                <span style={{ fontSize:14, minWidth:72 }}>{emoji ? emoji+' ' : ''}{name}</span>
                <ChartBar value={total} max={maxPerson} color={color} />

                <span style={{ color:'var(--muted)', fontSize:14 }}>›</span>
              </div>
            );
          })}
        </div>

        {/* Category breakdown */}
        {sortedCats.length > 0 && (
          <div>
            <div style={sectionHead}>Spending by category</div>
            {sortedCats.map(([cat, total], i) => (
              <div key={cat} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:'1px solid var(--border)' }}>
                <div style={{ width:9, height:9, borderRadius:'50%', background:CHART_CAT_COLORS[i % CHART_CAT_COLORS.length], flexShrink:0 }} />
                <span style={{ fontSize:13, flex:1 }}>{cat}</span>
                <ChartBar value={total} max={maxCat} color={CHART_CAT_COLORS[i % CHART_CAT_COLORS.length]} />
                <span style={{ fontSize:13, fontWeight:700, minWidth:52, textAlign:'right' }}>£{total.toFixed(2)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// Parse "22 March 2026" → Date (returns null if unparseable)
function parseReceiptDateStr(str) {
  if (!str) return null;
  const m = str.match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/i);
  if (!m) return null;
  const mo = MONTH_MAP[m[2].toLowerCase()];
  if (!mo) return null;
  return new Date(parseInt(m[3]), mo - 1, parseInt(m[1]));
}

function PersonInsights({ person, stats, bills, config, onBack }) {
  const { personItems, perPersonCats } = stats;
  const items  = personItems[person] || [];
  const emoji  = getEmoji(config, person);

  // Group expansion map
  const gmap = {};
  getEffectiveGroups(config).forEach(g => { gmap[g.name] = g.members || []; });

  const total       = items.reduce((s, it) => s + it.share, 0);
  const soloTotal   = items.filter(it => it.solo).reduce((s, it) => s + it.share, 0);
  const sharedTotal = total - soloTotal;

  // Per-bill spend for this person
  const perBill = bills.map(bill => {
    let spend = 0;
    bill.items.forEach((item, idx) => {
      const raw      = getAssignees(bill.assignments, idx);
      const expanded = [...new Set(raw.flatMap(n => gmap[n] || [n]))];
      if (!expanded.includes(person)) return;
      spend += item.price / expanded.length;
    });
    const date = parseReceiptDateStr(bill.receiptDate);
    return { bill, spend, date };
  }).filter(x => x.spend > 0);

  const shopCount   = perBill.length;
  const avgPerShop  = shopCount > 0 ? total / shopCount : 0;
  const priciest    = perBill.reduce((a, b) => b.spend > a.spend ? b : a, perBill[0]);
  const cheapest    = perBill.reduce((a, b) => b.spend < a.spend ? b : a, perBill[0]);

  // Weekly average: total spend ÷ number of distinct weeks spanned
  let weeklyAvg = null;
  const datedBills = perBill.filter(x => x.date);
  if (datedBills.length >= 2) {
    const ms     = datedBills.map(x => x.date.getTime());
    const spanMs = Math.max(...ms) - Math.min(...ms);
    const weeks  = spanMs / (7 * 24 * 60 * 60 * 1000);
    if (weeks >= 1) weeklyAvg = total / weeks;
  }

  // Top items by cumulative spend
  const itemMap = {};
  items.forEach(it => {
    itemMap[it.name] = itemMap[it.name] || { name:it.name, total:0, count:0 };
    itemMap[it.name].total += it.share;
    itemMap[it.name].count++;
  });
  const allItems     = Object.values(itemMap).sort((a, b) => b.total - a.total);
  const topItems     = allItems.slice(0, 10);
  const maxItemTotal = topItems[0]?.total || 0.01;
  const mostFrequent = [...allItems].sort((a, b) => b.count - a.count)[0];
  const uniqueItems  = allItems.length;
  const biggestItem  = items.reduce((a, b) => b.share > a.share ? b : a, items[0]);

  // Sharing partners
  const sharePartners = {};
  items.filter(it => !it.solo).forEach(it => {
    it.sharedWith.forEach(p => { sharePartners[p] = (sharePartners[p] || 0) + 1; });
  });
  const topPartners = Object.entries(sharePartners).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // Categories
  const myCats = Object.entries(perPersonCats[person] || {}).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const maxCat = myCats[0]?.[1] || 0.01;
  const topCat = myCats[0]?.[0];

  const sh  = { fontSize:12, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.07em', marginBottom:10 };
  const row = { display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:'1px solid var(--border)' };

  return (
    <div>
      <div className="header">
        <button className="btn btn-ghost btn-icon" onClick={onBack}>←</button>
        <span className="header-title">{emoji ? emoji+' ' : ''}{person}</span>
        <div style={{ width:40 }} />
      </div>

      <div style={{ padding:'4px 16px 40px' }}>

        {/* Top-line summary cards */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, margin:'12px 0 24px' }}>
          {[
            { label:'Total spent',    value:`£${total.toFixed(2)}` },
            { label:'Shops',          value: shopCount },
            { label:'Avg per shop',   value:`£${avgPerShop.toFixed(2)}` },
            { label:'Unique items',   value: uniqueItems },
          ].map(({ label, value }) => (
            <div key={label} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'12px 12px' }}>
              <div style={{ fontSize:20, fontWeight:800 }}>{value}</div>
              <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>{label}</div>
            </div>
          ))}
        </div>

        {/* Shop breakdown */}
        {shopCount > 0 && (
          <div style={{ marginBottom:28 }}>
            <div style={sh}>Shop breakdown</div>
            {weeklyAvg !== null && (
              <div style={row}>
                <span style={{ fontSize:13, color:'var(--muted)' }}>Avg per week</span>
                <span style={{ fontSize:15, fontWeight:700 }}>£{weeklyAvg.toFixed(2)}</span>
              </div>
            )}
            <div style={row}>
              <span style={{ fontSize:13, color:'var(--muted)' }}>Avg per shop</span>
              <span style={{ fontSize:15, fontWeight:700 }}>£{avgPerShop.toFixed(2)}</span>
            </div>
            {priciest && (
              <div style={row}>
                <div>
                  <div style={{ fontSize:13, color:'var(--muted)' }}>Most expensive shop</div>
                  {priciest.bill.receiptDate && <div style={{ fontSize:11, color:'var(--muted)', marginTop:1 }}>{priciest.bill.receiptDate}</div>}
                </div>
                <span style={{ fontSize:15, fontWeight:700, color:'var(--danger)' }}>£{priciest.spend.toFixed(2)}</span>
              </div>
            )}
            {cheapest && shopCount > 1 && (
              <div style={row}>
                <div>
                  <div style={{ fontSize:13, color:'var(--muted)' }}>Cheapest shop</div>
                  {cheapest.bill.receiptDate && <div style={{ fontSize:11, color:'var(--muted)', marginTop:1 }}>{cheapest.bill.receiptDate}</div>}
                </div>
                <span style={{ fontSize:15, fontWeight:700, color:'var(--success)' }}>£{cheapest.spend.toFixed(2)}</span>
              </div>
            )}
          </div>
        )}

        {/* Highlights */}
        {items.length > 0 && (
          <div style={{ marginBottom:28 }}>
            <div style={sh}>Highlights</div>
            {mostFrequent && mostFrequent.count > 1 && (
              <div style={row}>
                <div>
                  <div style={{ fontSize:13, color:'var(--muted)' }}>Most frequently bought</div>
                  <div style={{ fontSize:13, fontWeight:600, marginTop:2 }}>{mostFrequent.name}</div>
                </div>
                <span style={{ fontSize:13, color:'var(--muted)', flexShrink:0, marginLeft:8 }}>{mostFrequent.count}×</span>
              </div>
            )}
            {biggestItem && (
              <div style={row}>
                <div>
                  <div style={{ fontSize:13, color:'var(--muted)' }}>Biggest single purchase</div>
                  <div style={{ fontSize:13, fontWeight:600, marginTop:2 }}>{biggestItem.name}</div>
                </div>
                <span style={{ fontSize:15, fontWeight:700, flexShrink:0, marginLeft:8 }}>£{biggestItem.share.toFixed(2)}</span>
              </div>
            )}
            {topCat && (
              <div style={row}>
                <span style={{ fontSize:13, color:'var(--muted)' }}>Favourite category</span>
                <span style={{ fontSize:13, fontWeight:700 }}>{topCat}</span>
              </div>
            )}
            <div style={row}>
              <span style={{ fontSize:13, color:'var(--muted)' }}>Solo vs shared</span>
              <span style={{ fontSize:13, fontWeight:700 }}>{Math.round(soloTotal/total*100)}% solo</span>
            </div>
          </div>
        )}

        {/* Solo vs shared bar */}
        {total > 0 && (
          <div style={{ marginBottom:28 }}>
            <div style={sh}>Solo vs shared spend</div>
            <div style={{ display:'flex', height:14, borderRadius:7, overflow:'hidden', gap:2, marginBottom:8 }}>
              {soloTotal > 0 && <div style={{ flex:soloTotal, background:'var(--primary)', borderRadius:'7px 0 0 7px' }} />}
              {sharedTotal > 0 && <div style={{ flex:sharedTotal, background:'var(--success)', borderRadius: soloTotal > 0 ? '0 7px 7px 0' : 7 }} />}
            </div>
            <div style={{ display:'flex', gap:20, fontSize:13 }}>
              <span><span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%', background:'var(--primary)', marginRight:5 }} />Solo £{soloTotal.toFixed(2)}</span>
              <span><span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%', background:'var(--success)', marginRight:5 }} />Shared £{sharedTotal.toFixed(2)}</span>
            </div>
          </div>
        )}

        {/* Sharing partners */}
        {topPartners.length > 0 && (
          <div style={{ marginBottom:28 }}>
            <div style={sh}>Most shared with</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {topPartners.map(([p, count]) => {
                const pe = getEmoji(config, p);
                return (
                  <div key={p} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:20, padding:'7px 14px', fontSize:13 }}>
                    {pe ? pe+' ' : ''}{p}
                    <span style={{ color:'var(--muted)', marginLeft:6, fontSize:11 }}>{count}×</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Top items by spend */}
        {topItems.length > 0 && (
          <div style={{ marginBottom:28 }}>
            <div style={sh}>Top items by spend</div>
            {topItems.map(it => (
              <div key={it.name} style={{ display:'flex', alignItems:'center', gap:8, padding:'9px 0', borderBottom:'1px solid var(--border)' }}>
                <span style={{ fontSize:13, flex:1, color:'var(--text)' }}>{it.name}</span>
                {it.count > 1 && <span style={{ fontSize:11, color:'var(--muted)', flexShrink:0 }}>{it.count}×</span>}
                <ChartBar value={it.total} max={maxItemTotal} color={CHART_PERSON_COLORS[0]} height={5} />
                <span style={{ fontSize:13, fontWeight:700, minWidth:50, textAlign:'right' }}>£{it.total.toFixed(2)}</span>
              </div>
            ))}
          </div>
        )}

        {/* Category breakdown */}
        {myCats.length > 0 && (
          <div>
            <div style={sh}>Spending by category</div>
            {myCats.map(([cat, catTotal], i) => (
              <div key={cat} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderBottom:'1px solid var(--border)' }}>
                <div style={{ width:9, height:9, borderRadius:'50%', background:CHART_CAT_COLORS[i%CHART_CAT_COLORS.length], flexShrink:0 }} />
                <span style={{ fontSize:13, flex:1 }}>{cat}</span>
                <ChartBar value={catTotal} max={maxCat} color={CHART_CAT_COLORS[i%CHART_CAT_COLORS.length]} />
                <span style={{ fontSize:13, fontWeight:700, minWidth:50, textAlign:'right' }}>£{catTotal.toFixed(2)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Data helpers ──────────────────────────────────────────────
function getAssignees(assignments, idx) {
  const raw = assignments?.[String(idx)] ?? assignments?.[idx] ?? [];
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'object') return raw.people ?? raw.assigned ?? [];
  return [];
}

function countAssigned(items, assignments) {
  return (items || []).filter((_, i) => getAssignees(assignments, i).length > 0).length;
}

// Returns config.groups prepended with a synthetic "Everyone" group containing
// all current people. Everyone is never stored — always computed fresh.
function getEffectiveGroups(config) {
  return [
    { name: 'Everyone', members: [...(config.people || [])], builtin: true },
    ...(config.groups || []),
  ];
}

// Returns the emoji assigned to a person or group, or '' if none set
function getEmoji(config, name) {
  return (config.peopleEmojis || {})[name] || (config.groupEmojis || {})[name] || '';
}

function calcTotals(items, assignments, groups) {
  const gmap = {};
  (groups || []).forEach(g => { gmap[g.name] = g.members || []; });
  const totals = {};
  (items || []).forEach((item, i) => {
    const expanded = getAssignees(assignments, i).flatMap(n => gmap[n] || [n]);
    if (!expanded.length) return;
    const share = item.price / expanded.length;
    expanded.forEach(n => { totals[n] = (totals[n] || 0) + share; });
  });
  return totals;
}

function rowToBill(row) {
  return {
    id:          String(row.id),
    savedAt:     row.saved_at    || null,
    updatedAt:   row.updated_at  || null,
    items:       Array.isArray(row.items) ? row.items : [],
    assignments: row.assignments  || {},
    totals:      row.totals       || {},
    totalBill:   Number(row.total_bill || 0),
    receiptDate: row.receipt_date || '',
    completedAt: row.completed_at || null,
    completedBy: row.completed_by || null,
  };
}

// ════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════
function App() {
  const [ready,      setReady]      = useState(false);
  const [initError,  setInitError]  = useState(null);
  const [user,       setUser]       = useState(null);
  const [config,     setConfig]     = useState({ people: [], groups: [], peopleEmojis: {}, groupEmojis: {}, admins: [] });
  const [bills,      setBills]      = useState([]);
  const [screen,     setScreen]     = useState('bills');
  const [activeBill, setActiveBill] = useState(null);
  const [toastMsg,   setToastMsg]   = useState(null);
  const toastRef = useRef();

  function showToast(msg, ms = 2800) {
    clearTimeout(toastRef.current);
    setToastMsg(msg);
    toastRef.current = setTimeout(() => setToastMsg(null), ms);
  }

  // Init Supabase — use a flat .then chain so ALL errors reach .catch
  useEffect(() => {
    initSb()
      .then(sb => {
        // Set up auth listener first (synchronous)
        sb.auth.onAuthStateChange((_, session) => {
          setUser(session?.user ?? null);
        });
        // Then get current session
        return sb.auth.getSession();
      })
      .then(({ data: { session } }) => {
        setUser(session?.user ?? null);
        setReady(true);
      })
      .catch(err => {
        console.error('Init failed:', err);
        setInitError('Could not connect. Please check your internet and refresh.');
        setReady(true);
      });
  }, []);

  // Load data + subscribe when logged in
  useEffect(() => {
    if (!user || !_sb) return;

    Promise.all([
      _sb.from('bill_history').select('*').order('saved_at', { ascending: false }).limit(50),
      _sb.from('config').select('*').eq('id', 1).single(),
    ]).then(([{ data: bRows }, { data: cfgRow }]) => {
      if (bRows)  setBills(bRows.map(rowToBill));
      if (cfgRow) setConfig({ people: cfgRow.people || [], groups: cfgRow.groups || [], peopleEmojis: cfgRow.people_emojis || {}, groupEmojis: cfgRow.group_emojis || {}, admins: cfgRow.admins || [] });
    });

    const ch = _sb.channel('bs-collab')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bill_history' }, p => {
        if (p.eventType === 'DELETE') {
          const gone = String(p.old.id);
          setBills(prev => prev.filter(b => b.id !== gone));
          setActiveBill(prev => (prev?.id === gone ? null : prev));
          return;
        }
        const b = rowToBill(p.new);
        setBills(prev => {
          const i = prev.findIndex(x => x.id === b.id);
          if (i >= 0) { const n = [...prev]; n[i] = b; return n; }
          return [b, ...prev];
        });
        setActiveBill(prev => (prev?.id === b.id ? b : prev));
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'config' }, p => {
        if (p.new) setConfig({ people: p.new.people || [], groups: p.new.groups || [], peopleEmojis: p.new.people_emojis || {}, groupEmojis: p.new.group_emojis || {}, admins: p.new.admins || [] });
      })
      .subscribe();

    return () => _sb.removeChannel(ch);
  }, [user]);

  // ── Actions ───────────────────────────────────────────────
  async function saveConfig(cfg) {
    setConfig(cfg);
    await _sb.from('config').upsert({
      id: 1, people: cfg.people, groups: cfg.groups,
      people_emojis: cfg.peopleEmojis || {},
      group_emojis:  cfg.groupEmojis  || {},
      admins:        cfg.admins       || [],
      updated_at: new Date().toISOString(),
    });
  }

  async function saveBillAssignments(bill, newAssign) {
    const newTotals = calcTotals(bill.items, newAssign, getEffectiveGroups(config));
    const patched   = { ...bill, assignments: newAssign, totals: newTotals };
    setActiveBill(patched);
    setBills(prev => prev.map(b => b.id === patched.id ? patched : b));
    await _sb.from('bill_history').update({
      assignments: newAssign, totals: newTotals,
      updated_at: new Date().toISOString(),
    }).eq('id', bill.id);
  }

  async function completeBill(bill) {
    const now     = new Date().toISOString();
    const patched = { ...bill, completedAt: now, completedBy: user.email };
    setActiveBill(patched);
    setBills(prev => prev.map(b => b.id === patched.id ? patched : b));
    await _sb.from('bill_history').update({
      completed_at: now, completed_by: user.email, updated_at: now,
    }).eq('id', bill.id);
    showToast('✅ Receipt marked as complete');
  }

  async function uncompleteBill(bill) {
    const patched = { ...bill, completedAt: null, completedBy: null };
    setActiveBill(patched);
    setBills(prev => prev.map(b => b.id === patched.id ? patched : b));
    await _sb.from('bill_history').update({
      completed_at: null, completed_by: null, updated_at: new Date().toISOString(),
    }).eq('id', bill.id);
    showToast('↩ Receipt reopened for editing');
  }

  async function deleteBill(bill) {
    await _sb.from('bill_history').delete().eq('id', bill.id);
    setBills(prev => prev.filter(b => b.id !== bill.id));
    if (activeBill?.id === bill.id) { setActiveBill(null); setScreen('bills'); }
  }

  // ── Render ────────────────────────────────────────────────
  if (!ready) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh' }}>
        <div className="spin" style={{ width:32, height:32 }} />
      </div>
    );
  }

  if (initError) {
    return (
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', padding:32, textAlign:'center' }}>
        <div style={{ fontSize:40, marginBottom:16 }}>⚠️</div>
        <h2 style={{ marginBottom:8 }}>Connection Error</h2>
        <p style={{ color:'var(--muted)', fontSize:14, marginBottom:24, maxWidth:280, lineHeight:1.5 }}>{initError}</p>
        <button className="btn btn-primary" onClick={() => window.location.reload()}>Retry</button>
      </div>
    );
  }

  if (!user) return <LoginScreen />;

  const ctx = { user, config, bills, showToast, saveConfig, saveBillAssignments, completeBill, uncompleteBill, deleteBill };

  return (
    <>
      {screen === 'settings' && (
        <SettingsScreen {...ctx} onBack={() => setScreen('bills')} />
      )}
      {screen === 'bill' && activeBill && (
        <BillDetailScreen
          {...ctx}
          bill={activeBill}
          onBack={() => { setActiveBill(null); setScreen('bills'); }}
        />
      )}
      {screen === 'insights' && (
        <InsightsScreen bills={bills} config={config} onBack={() => setScreen('bills')} />
      )}
      {screen === 'bills' && (
        <BillsScreen
          {...ctx}
          onOpenBill={bill => { setActiveBill(bill); setScreen('bill'); }}
          onOpenSettings={() => setScreen('settings')}
          onOpenInsights={() => setScreen('insights')}
          onBillCreated={bill => { setBills(p => [bill, ...p]); setActiveBill(bill); setScreen('bill'); }}
        />
      )}
      {toastMsg && <div className="toast">{toastMsg}</div>}
    </>
  );
}

// LOGIN
// ════════════════════════════════════════════════════════════
function LoginScreen() {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [err,      setErr]      = useState('');
  const [busy,     setBusy]     = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!email || !password) return;
    setBusy(true); setErr('');
    try {
      if (!_sb) await initSb();
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) setErr(error.message);
    } catch (ex) {
      setErr('Connection error: ' + (ex.message || 'please try again'));
    }
    setBusy(false);
  }

  return (
    <div className="login-wrap">
      <div style={{ textAlign:'center', marginBottom:32 }}>
        <div style={{ fontSize:52, marginBottom:8 }}>🛒</div>
        <h1 style={{ fontSize:26, marginBottom:6 }}>Bill Splitter</h1>
        <p style={{ color:'var(--muted)', fontSize:14 }}>Sign in to manage shared receipts</p>
      </div>
      <form onSubmit={submit} style={{ width:'100%', maxWidth:340 }}>
        <div style={{ marginBottom:14 }}>
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="you@example.com"
            value={email} onChange={e => setEmail(e.target.value)} autoComplete="email" />
        </div>
        <div style={{ marginBottom:20 }}>
          <label className="label">Password</label>
          <input className="input" type="password" placeholder="••••••••"
            value={password} onChange={e => setPassword(e.target.value)} autoComplete="current-password" />
        </div>
        {err && (
          <div style={{ background:'#fef2f2', border:'1px solid #fecaca', borderRadius:8,
            padding:'10px 14px', marginBottom:16, fontSize:14, color:'#991b1b' }}>
            {err}
          </div>
        )}
        <button type="submit" className="btn btn-primary btn-full btn-lg" disabled={busy}>
          {busy ? <span className="spin" /> : 'Sign in'}
        </button>
      </form>
    </div>
  );
}

// BILLS LIST SCREEN

function BillsScreen({ bills, config, user, onOpenBill, onOpenSettings, onOpenInsights, onBillCreated, completeBill, uncompleteBill, deleteBill, showToast }) {
  const [uploading, setUploading] = useState(false);
  const [dragOver,  setDragOver]  = useState(false);
  const fileRef = useRef();

  // Admin if admins list is empty (first-run) OR user's email is in the list
  const isAdmin = !(config.admins || []).length || (config.admins || []).includes(user?.email);

  const allNames = useMemo(() => [
    ...(config.people || []),
    ...getEffectiveGroups(config).map(g => g.name),
  ], [config]);

  async function handleFile(file) {
    if (!file) return;
    if (file.type !== 'application/pdf') { showToast('Please upload a PDF file'); return; }
    setUploading(true);
    try {
      const { items, receiptDate } = await parsePdf(file);
      if (!items.length) {
        showToast("No items found — is this a Sainsbury's receipt?");
        setUploading(false); return;
      }
      const total = items.reduce((s, x) => s + x.price, 0);
      const { data, error } = await _sb.from('bill_history').insert({
        id: Date.now(), items, assignments: {}, totals: {},
        total_bill: total, receipt_date: receiptDate,
        config_snapshot: config, saved_at: new Date().toISOString(),
      }).select().single();
      if (error) { showToast('Save failed: ' + error.message); setUploading(false); return; }
      onBillCreated(rowToBill(data));
    } catch (ex) { showToast('Error: ' + ex.message); }
    setUploading(false);
  }

  return (
    <div>
      <div className="header">
        <span style={{ fontSize:22 }}>🛒</span>
        <span className="header-title">Bill Splitter</span>
        <div style={{ display:'flex', gap:0 }}>
          <button className="btn btn-ghost btn-icon" onClick={onOpenInsights} title="Insights">📊</button>
          <button className="btn btn-ghost btn-icon" onClick={onOpenSettings} title="Settings">⚙️</button>
        </div>
      </div>

      {(() => {
        const active = bills.filter(b => !b.completedAt);
        const done   = bills.filter(b =>  b.completedAt);
        const hasActive = active.length > 0;

        return <>
          {/* Upload area — blocked when an active receipt exists */}
          {!hasActive
            ? <div
                className={'upload-area' + (dragOver ? ' drag' : '')}
                onClick={() => !uploading && fileRef.current.click()}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
              >
                {uploading
                  ? <><div className="spin" style={{ margin:'0 auto 10px' }} /><p>Parsing receipt…</p></>
                  : <><div style={{ fontSize:32 }}>📄</div>
                      <h3>Upload a Receipt</h3>
                      <p>Drag & drop a Sainsbury's PDF, or tap to browse</p></>
                }
                <input ref={fileRef} type="file" accept=".pdf,application/pdf" style={{ display:'none' }}
                  onChange={e => handleFile(e.target.files[0])} />
              </div>
            : <div style={{ margin:'12px 16px', background:'var(--primary-light)', border:'1px solid #bfdbfe', borderRadius:10, padding:'11px 16px', fontSize:13, color:'var(--primary)', textAlign:'center' }}>
                Complete or delete the current receipt before uploading a new one
              </div>
          }

          {bills.length === 0 && (
            <div className="empty">
              <div className="eicon">🧾</div>
              <h3>No receipts yet</h3>
              <p>Upload a Sainsbury's PDF receipt above to get started.</p>
            </div>
          )}

          {/* Active receipt — prominent */}
          {active.length > 0 && <>
            <div style={{ display:'flex', alignItems:'center', gap:8, padding:'14px 20px 6px' }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background:'var(--primary)', flexShrink:0 }} />
              <span style={{ fontSize:12, fontWeight:800, color:'var(--primary)', textTransform:'uppercase', letterSpacing:'.06em' }}>
                Current receipt
              </span>
            </div>
            {active.map(bill => (
              <BillCard key={bill.id} bill={bill} allNames={allNames}
                onClick={() => onOpenBill(bill)}
                onComplete={() => completeBill(bill)}
                onDelete={isAdmin ? () => deleteBill(bill) : null}
                highlight />
            ))}
          </>}

          {/* Completed receipts — muted */}
          {done.length > 0 && <>
            <div style={{ display:'flex', alignItems:'center', gap:10, padding:'18px 20px 6px' }}>
              <div style={{ flex:1, height:1, background:'var(--border)' }} />
              <span style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.06em', color:'var(--muted)' }}>
                Completed ({done.length})
              </span>
              <div style={{ flex:1, height:1, background:'var(--border)' }} />
            </div>
            {done.map(bill => (
              <BillCard key={bill.id} bill={bill} allNames={allNames}
                onClick={() => onOpenBill(bill)}
                onUncomplete={isAdmin ? () => uncompleteBill(bill) : null}
                onDelete={isAdmin ? () => deleteBill(bill) : null}
                muted />
            ))}
          </>}
        </>;
      })()}
    </div>
  );
}

function BillCard({ bill, allNames, onClick, onComplete, onUncomplete, onDelete, muted, highlight }) {
  const assigned  = countAssigned(bill.items, bill.assignments);
  const total     = bill.items.length;
  const pct       = total > 0 ? assigned / total : 0;
  const isDone    = !!bill.completedAt;
  const isReady   = !isDone && assigned === total && total > 0;

  const badge = isDone
    ? <span className="badge badge-done">✓ Complete</span>
    : assigned > 0
      ? <span className="badge badge-wip">● In progress</span>
      : <span className="badge badge-new">○ New</span>;

  return (
    <div className="list-row" onClick={onClick} style={{
      flexDirection:'column', gap:8, alignItems:'stretch',
      opacity: muted ? 0.5 : 1,
      borderLeft: highlight ? '3px solid var(--primary)' : undefined,
    }}>

      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:2 }}>
            {bill.receiptDate || <em style={{ color:'var(--muted)', fontWeight:400 }}>Date unknown</em>}
          </div>
          <div style={{ fontSize:13, color:'var(--muted)' }}>
            {total} items · £{bill.totalBill.toFixed(2)}
          </div>
        </div>
        {badge}
        <span style={{ color:'var(--muted)', fontSize:16 }}>›</span>
      </div>

      {total > 0 && !isDone && (
        <div>
          <div className="prog-bar" style={{ marginBottom:4 }}>
            <div className="prog-fill" style={{ width:(pct*100)+'%' }} />
          </div>
          <div style={{ fontSize:12, color:'var(--muted)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span>{assigned} of {total} assigned</span>
            <button
              className="btn btn-success"
              style={{ fontSize:12, padding:'5px 12px', borderRadius:20, fontWeight:700, letterSpacing:'.01em' }}
              onClick={e => {
                e.stopPropagation();
                if (!isReady && !confirm(`Only ${assigned} of ${total} items assigned. Mark as complete anyway?`)) return;
                onComplete && onComplete();
              }}
            >
              Mark as complete
            </button>
          </div>
        </div>
      )}

      {/* Per-person mini totals */}
      {Object.entries(bill.totals || {}).filter(([,v]) => v > 0).length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:'4px 12px' }}>
          {Object.entries(bill.totals).filter(([,v]) => v > 0)
            .sort((a, b) => b[1] - a[1])
            .map(([name, amount]) => (
              <span key={name} style={{ fontSize:12, color:'var(--muted)' }}>
                {name} <strong style={{ color:'var(--text)', fontWeight:700 }}>£{amount.toFixed(2)}</strong>
              </span>
            ))}
        </div>
      )}

      {/* Admin actions — reopen / delete */}
      {(onUncomplete || onDelete) && (
        <div style={{ borderTop:'1px solid var(--border)', paddingTop:6, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          {onUncomplete ? (
            <button
              onClick={e => { e.stopPropagation(); if (confirm('Reopen this receipt for editing?')) onUncomplete(); }}
              style={{ background:'none', border:'none', color:'var(--primary)', fontSize:12, cursor:'pointer', padding:'2px 4px' }}
            >
              ↩ Reopen
            </button>
          ) : <span />}
          {onDelete && (
            <button
              onClick={e => { e.stopPropagation(); if (confirm('Delete this receipt? This cannot be undone.')) onDelete(); }}
              style={{ background:'none', border:'none', color:'var(--danger)', fontSize:12, cursor:'pointer', opacity:0.7, padding:'2px 4px' }}
            >
              🗑 Delete
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// SUGGESTION ENGINE
// ════════════════════════════════════════════════════════════

// Strip quantities, units, and noise words so "Whole Milk 4 Pints" matches "Whole Milk 6 Pints"
function normalizeForMatch(name) {
  return name
    .toLowerCase()
    .replace(/\d+(\.\d+)?\s*(ml|cl|dl|l|g|kg|mg|lb|oz|pints?|pk|pack|cans?|bottles?|x\d*|\d*x)\b/gi, '')
    .replace(/\b\d+\b/g, '')
    .replace(/[^\w\s]/g, ' ')
    .trim()
    .split(/\s+/)
    .filter(w => w.length > 2); // drop tiny words: "of", "by", "a"
}

function itemSimilarity(a, b) {
  const sa = new Set(normalizeForMatch(a));
  const sb = new Set(normalizeForMatch(b));
  if (!sa.size || !sb.size) return 0;
  let inter = 0;
  sa.forEach(w => { if (sb.has(w)) inter++; });
  return inter / (sa.size + sb.size - inter); // Jaccard index
}

// Returns { [itemIdx]: assignees[] } for items with confident historical matches
function computeSuggestions(pastBills, currentBill) {
  const MATCH_THRESHOLD = 0.35; // minimum per-item similarity to consider
  const MIN_CONFIDENCE  = 0.25; // minimum weighted score to surface suggestion
  const suggestions = {};

  currentBill.items.forEach((item, idx) => {
    const tally = {}; // serialised assignee-list -> weighted score

    pastBills.forEach((past, age) => {
      if (past.id === currentBill.id) return;
      const recency = 1 / (age + 1); // most recent bill gets weight 1, next 0.5, etc.

      past.items.forEach((pastItem, pi) => {
        const sim = itemSimilarity(item.name, pastItem.name);
        if (sim < MATCH_THRESHOLD) return;
        const assignees = getAssignees(past.assignments, pi);
        if (!assignees.length) return;
        const key = JSON.stringify([...assignees].sort());
        tally[key] = (tally[key] || 0) + sim * recency;
      });
    });

    if (!Object.keys(tally).length) return;
    const [bestKey, score] = Object.entries(tally).sort((a, b) => b[1] - a[1])[0];
    if (score >= MIN_CONFIDENCE) suggestions[idx] = JSON.parse(bestKey);
  });

  return suggestions;
}

// BILL DETAIL SCREEN  (Items tab + Summary tab)
// ════════════════════════════════════════════════════════════
function BillDetailScreen({ bill, bills, config, user, onBack, saveBillAssignments, completeBill, uncompleteBill, deleteBill, showToast }) {
  const [itemIdx,       setItemIdx]       = useState(0);
  const [view,          setView]          = useState('items'); // 'items' | 'summary'
  const [summaryTab,    setSummaryTab]    = useState('person'); // 'person' | 'item'
  const [expandedPerson, setExpandedPerson] = useState(null);
  const touchStartX = useRef(null);

  const allNames = useMemo(() => [
    ...(config.people || []),
    ...getEffectiveGroups(config).map(g => g.name),
  ], [config]);

  const isDone      = !!bill.completedAt;
  const isAdmin     = !(config.admins || []).length || (config.admins || []).includes(user?.email);
  const total       = bill.items.length;
  const assigned    = countAssigned(bill.items, bill.assignments);
  const allAssigned = assigned === total && total > 0;
  const pct         = total > 0 ? assigned / total : 0;

  // Keep itemIdx in bounds when bill updates via real-time
  const safeIdx  = Math.min(itemIdx, Math.max(0, total - 1));
  const item     = bill.items[safeIdx] || { name: '', price: 0 };
  const assignees = getAssignees(bill.assignments, safeIdx);

  const totals = useMemo(
    () => calcTotals(bill.items, bill.assignments, getEffectiveGroups(config)),
    [bill.items, bill.assignments, config.groups, config.people]
  );

  // Suggestion engine — runs once per bill load, uses all other bills as history
  const suggestions = useMemo(
    () => computeSuggestions(bills || [], bill),
    [bill.id] // only recompute when a different bill is opened
  );

  async function acceptSuggestion(assignees) {
    const newAssign = { ...bill.assignments, [String(safeIdx)]: assignees };
    await saveBillAssignments(bill, newAssign);
  }

  async function toggle(name) {
    if (isDone) return;
    const cur = getAssignees(bill.assignments, safeIdx);
    const nxt = cur.includes(name) ? cur.filter(n => n !== name) : [...cur, name];
    await saveBillAssignments(bill, { ...bill.assignments, [String(safeIdx)]: nxt });
  }

  function goNext() {
    if (safeIdx < total - 1) setItemIdx(safeIdx + 1);
    else setView('summary');
  }
  function goPrev() {
    if (safeIdx > 0) setItemIdx(safeIdx - 1);
    else onBack();
  }

  // Swipe left = next, swipe right = prev
  function onTouchStart(e) { touchStartX.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStartX.current === null) return;
    const dx = touchStartX.current - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 55) { dx > 0 ? goNext() : goPrev(); }
    touchStartX.current = null;
  }

  async function handleComplete() {
    await completeBill(bill);
    onBack();
  }

  // ── SUMMARY VIEW ─────────────────────────────────────────
  if (view === 'summary') {
    const gmap = {};
    getEffectiveGroups(config).forEach(g => { gmap[g.name] = g.members || []; });
    const unassTotal = bill.items
      .filter((_, i) => !getAssignees(bill.assignments, i).length)
      .reduce((s, x) => s + x.price, 0);

    function goToItemEdit(idx) { setItemIdx(idx); setView('items'); }

    async function sharePersonSummary(name, total, personItems, bill) {
      try {
        const emoji = getEmoji(config, name);
        const lines = [
          `🧾 Sainsbury's – ${bill.receiptDate || 'Receipt'}`,
          `${emoji ? emoji + ' ' : ''}${name}'s share: £${total.toFixed(2)}`,
          '',
          ...personItems.map(({ itm, share, exp, raw }) => {
            // 'others' was not stored on personItems — compute it here
            const others = (raw || []).filter(n => n !== name);
            let line = `• ${itm.name}  £${share.toFixed(2)}`;
            if (others.length > 0) {
              line += ` (shared with ${others.join(' & ')})`;
            }
            return line;
          }),
          '',
          `─────────────────`,
          `Total: £${total.toFixed(2)}`,
        ];
        const text = lines.join('\n');
        if (navigator.share) {
          await navigator.share({ text });
        } else {
          await navigator.clipboard.writeText(text);
          showToast('Copied to clipboard');
        }
      } catch (e) {
        if (e.name !== 'AbortError') showToast('Could not share — try again');
      }
    }

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100vh', height:'100dvh' }}>
        {/* Header */}
        <div className="header">
          <button className="btn btn-ghost" style={{ padding:'6px 10px', marginLeft:-6 }}
            onClick={() => setView('items')}>
            ← Items
          </button>
          <div className="header-sub">
            <div className="htitle">Summary</div>
            <div className="hdetail">{bill.receiptDate || 'Receipt'} · £{bill.totalBill.toFixed(2)}</div>
          </div>
          {isDone && <span className="badge badge-done">✓ Done</span>}
        </div>

        {/* View switcher */}
        <div style={{ display:'flex', borderBottom:'1px solid var(--border)', background:'white', flexShrink:0 }}>
          {[['person','By Person'],['item','By Item']].map(([key, label]) => (
            <button key={key} onClick={() => setSummaryTab(key)} style={{
              flex:1, padding:'10px', border:'none', background:'none',
              fontSize:13, fontWeight:600, cursor:'pointer',
              color: summaryTab === key ? 'var(--primary)' : 'var(--muted)',
              borderBottom: summaryTab === key ? '2px solid var(--primary)' : '2px solid transparent',
            }}>
              {label}
            </button>
          ))}
        </div>

        {/* Scrollable content */}
        <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch' }}>

          {/* ── BY PERSON ── */}
          {summaryTab === 'person' && (
            !Object.keys(totals).length
              ? <div className="empty">
                  <div className="eicon">📊</div>
                  <h3>Nothing assigned yet</h3>
                  <p>Go back to Items to start assigning.</p>
                </div>
              : <>
                  {Object.entries(totals).sort((a, b) => b[1] - a[1]).map(([name, amount]) => {
                    const c          = colorFor(name, allNames);
                    const isOpen     = expandedPerson === name;
                    const personItems = bill.items.map((itm, i) => {
                      const raw = getAssignees(bill.assignments, i);
                      const exp = raw.flatMap(n => gmap[n] || [n]);
                      if (!exp.includes(name)) return null;
                      return { itm, i, share: itm.price / exp.length, exp, raw };
                    }).filter(Boolean);

                    return (
                      <div key={name} style={{ borderBottom:'1px solid var(--border)' }}>
                        {/* Person header row */}
                        <div
                          onClick={() => setExpandedPerson(isOpen ? null : name)}
                          style={{ display:'flex', alignItems:'center', gap:10, padding:'13px 20px', cursor:'pointer', background: isOpen ? '#f8fafc' : 'white' }}
                        >
                          <div style={{ width:10, height:10, borderRadius:'50%', background:c.bd, flexShrink:0 }} />
                          <span style={{ flex:1, fontWeight:700, fontSize:15 }}>
                            {getEmoji(config, name) ? getEmoji(config, name) + ' ' : ''}{name}
                          </span>
                          <span style={{ fontSize:16, fontWeight:800, color:'var(--primary)', marginRight:6 }}>£{amount.toFixed(2)}</span>
