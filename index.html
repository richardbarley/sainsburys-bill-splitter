                                        ✓ Assign <span style={{ fontSize: '10px', opacity: 0.5, fontFamily: 'monospace', background: 'rgba(255,255,255,0.25)', padding: '1px 4px', borderRadius: '3px' }}>↵</span>
                                    </button>
                                </div>
                            ) : (
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 4px' }}>
                                    <span style={{ color: '#9ca3af', fontSize: '13px' }}>Select people above to assign</span>
                                    <button
                                        onClick={openCustomSplit}
                                        style={{ background: 'none', border: 'none', color: '#8b5cf6', fontSize: '12px', fontWeight: 600, cursor: 'pointer' }}
                                    >
                                        ⚙ Advanced →
                                    </button>
                                </div>
                            )}

                            {/* Advanced split — also shown when selection IS made */}
                            {quickSelectPeople.length > 0 && (
                                <div style={{ textAlign: 'right', marginTop: '6px' }}>
                                    <button
                                        onClick={openCustomSplit}
                                        style={{ background: 'none', border: 'none', color: '#8b5cf6', fontSize: '12px', fontWeight: 600, cursor: 'pointer' }}
                                    >
                                        ⚙ Advanced split →
                                    </button>
                                </div>
                            )}
                        </div>

                        <div style={{ display: 'flex', gap: '10px', marginTop: '16px' }}>
                            {(currentItemIndex > 0 || reviewMode) && (
                                <button
                                    className="button button-back"
                                    onClick={goBack}
                                    style={{ flex: 1, margin: 0 }}
                                >
                                    {reviewMode ? '← Back to Summary' : '← Back'}
                                </button>
                            )}
                            {!reviewMode && (
                                <button
                                    onClick={() => {
                                        const next = showUnassignedOnly
                                            ? (() => { for (let i = currentItemIndex + 1; i < items.length; i++) { if (!assignments[i]) return i; } return -1; })()
                                            : (currentItemIndex < items.length - 1 ? currentItemIndex + 1 : -1);
                                        if (next >= 0) setCurrentItemIndex(next);
                                        else setShowSummary(true);
                                    }}
                                    style={{
                                        flex: 1, padding: '16px 24px', border: 'none',
                                        borderRadius: '8px', fontSize: '15px', fontWeight: 600, cursor: 'pointer',
                                        background: currentAssignment ? '#d1fae5' : '#f3f4f6',
                                        color: currentAssignment ? '#065f46' : '#6b7280',
                                        transition: 'all 0.2s'
                                    }}
                                >
                                    {currentAssignment ? 'Next ✓' : 'Skip →'}
                                </button>
                            )}
                        </div>

                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '10px' }}>
                            <button
                                onClick={clearSession}
                                style={{ background: 'none', border: 'none', color: '#d1d5db', fontSize: '12px', cursor: 'pointer' }}
                                onMouseEnter={e => e.target.style.color = '#9ca3af'}
                                onMouseLeave={e => e.target.style.color = '#d1d5db'}
                            >
                                New bill
                            </button>
                            {!reviewMode && currentItemIndex < items.length - 1 && (
                                <button
                                    onClick={() => setShowSummary(true)}
                                    style={{ background: 'none', border: 'none', color: '#9ca3af', fontSize: '12px', cursor: 'pointer', fontWeight: 600 }}
                                >
                                    Jump to summary →
                                </button>
                            )}
                        </div>
                    </div>
                    <div className="running-totals-sidebar">
                        <div className="rt-header">Running Totals</div>
                        {config.people.map(person => {
                            const total = runningTotals[person] || 0;
                            return (
                                <div key={person} className="rt-person">
                                    <div className="rt-name">{person}</div>
                                    <div className="rt-amount" style={{ color: total > 0 ? '#059669' : '#d1d5db' }}>
                                        £{total.toFixed(2)}
                                    </div>
                                </div>
                            );
                        })}
                        <div className="rt-footer">
                            <div className="rt-name">Assigned so far</div>
                            <div className="rt-amount" style={{ color: '#374151' }}>£{runningTotal.toFixed(2)}</div>
                            <div style={{ marginTop: '8px', fontSize: '11px', color: '#9ca3af' }}>
                                {Object.keys(assignments).length} of {items.length} items
                            </div>
                        </div>
                    </div>
                    </div>
                    </>
                );
            }

            return (
                <>
                {notification && (
                    <div style={{ position: 'fixed', top: 'max(20px, env(safe-area-inset-top))', left: '50%', transform: 'translateX(-50%)', zIndex: 9999, background: '#065f46', color: 'white', borderRadius: '12px', padding: '12px 20px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', fontSize: '14px', fontWeight: 600, maxWidth: '90vw', textAlign: 'center', display: 'flex', alignItems: 'center', gap: '10px' }}>
                        <span>✅ {notification.message}</span>
                        <button onClick={function() { setNotification(null); }} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.7)', cursor: 'pointer', fontSize: '16px', padding: '0', lineHeight: 1, flexShrink: 0 }}>✕</button>
                    </div>
                )}
                <div className="card">
                    <div className="screen-bar">
                        <div>
                            <h1 className="title" style={{ marginBottom: '4px' }}>Sainsbury's Bill Splitter</h1>
                            <p className="subtitle" style={{ marginBottom: 0 }}>Upload your Sainsbury's receipt PDF to split the bill</p>
                        </div>
                        <div className="screen-bar-icons" style={{ paddingTop: '4px' }}>
                            <button className="nano-btn" onClick={openHistoryScreen} title="Past bills">📋</button>
                            <button className="nano-btn" onClick={() => setShowSettings(true)} title="Settings">⚙️</button>
                        </div>
                    </div>

                    {error && <div className="error">{error}</div>}

                    <div
                        className={`upload-area ${dragOver ? 'drag-over' : ''}`}
                        style={{ marginTop: '16px' }}
                        onDrop={handleDrop}
                        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                        onDragLeave={() => setDragOver(false)}
                        onClick={() => document.getElementById('fileInput').click()}
                    >
                        <div className="upload-icon">📄</div>
                        <div className="upload-text">Drop your PDF here or click to browse</div>
                        <div className="upload-hint">Sainsbury's grocery receipt only</div>
                    </div>

                    <input
                        id="fileInput"
                        type="file"
                        accept="application/pdf"
                        onChange={handleFileSelect}
                        style={{ display: 'none' }}
                    />

                </div>
                </>
            );
        };

        // ── LoginScreen ──────────────────────────────────────────────────
        const LoginScreen = function({ onLogin, authError, authLoading }) {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [resetSent, setResetSent] = React.useState(false);

            const handleSubmit = function(e) {
                e.preventDefault();
                onLogin(email, password);
            };

            const handleReset = function() {
                if (!email.trim() || !_sb) return;
                _sb.auth.resetPasswordForEmail(email.trim())
                    .then(function() { setResetSent(true); });
            };

            return (
                <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px', boxSizing: 'border-box' }}>
                    <div className="card" style={{ width: '100%', maxWidth: '400px' }}>
                        <div style={{ textAlign: 'center', marginBottom: '28px' }}>
                            <div style={{ fontSize: '36px', marginBottom: '8px' }}>🛒</div>
                            <h1 className="title" style={{ marginBottom: '4px' }}>Sainsbury's Bill Splitter</h1>
                            <p className="subtitle" style={{ marginBottom: 0 }}>Sign in to continue</p>
                        </div>
                        <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                            <div>
                                <label style={{ display: 'block', fontSize: '13px', fontWeight: 600, color: '#374151', marginBottom: '6px' }}>Email</label>
                                <input type="email" value={email} onChange={function(e) { setEmail(e.target.value); }}
                                    placeholder="you@example.com" required autoComplete="email"
                                    style={{ width: '100%', padding: '10px 12px', border: '1px solid #d1d5db', borderRadius: '8px', fontSize: '14px', outline: 'none', boxSizing: 'border-box' }} />
                            </div>
                            <div>
                                <label style={{ display: 'block', fontSize: '13px', fontWeight: 600, color: '#374151', marginBottom: '6px' }}>Password</label>
                                <input type="password" value={password} onChange={function(e) { setPassword(e.target.value); }}
                                    placeholder="••••••••" required autoComplete="current-password"
                                    style={{ width: '100%', padding: '10px 12px', border: '1px solid #d1d5db', borderRadius: '8px', fontSize: '14px', outline: 'none', boxSizing: 'border-box' }} />
                            </div>
                            {authError && <div style={{ padding: '10px 12px', background: '#fef2f2', border: '1px solid #fecaca', borderRadius: '8px', fontSize: '13px', color: '#dc2626' }}>{authError}</div>}
                            <button type="submit" disabled={authLoading}
                                style={{ padding: '12px', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', border: 'none', borderRadius: '10px', fontSize: '15px', fontWeight: 700, color: 'white', cursor: 'pointer', opacity: authLoading ? 0.7 : 1, marginTop: '4px' }}>
                                {authLoading ? 'Signing in…' : 'Sign in'}
                            </button>
                        </form>
                        <div style={{ marginTop: '16px', textAlign: 'center' }}>
                            {resetSent ? (
                                <span style={{ fontSize: '13px', color: '#10b981' }}>✓ Password reset email sent</span>
                            ) : (
                                <button onClick={handleReset} style={{ background: 'none', border: 'none', fontSize: '13px', color: '#9ca3af', cursor: 'pointer', textDecoration: 'underline' }}>
                                    Forgot password?
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ── App wrapper — handles Supabase init + auth state ─────────────
        const App = function() {
            const [authState, setAuthState] = React.useState('loading');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);

            React.useEffect(function() {
                // Capture ?bill= param before auth redirect clears it
                const params = new URLSearchParams(window.location.search);
                const billParam = params.get('bill');
                if (billParam) {
                    window._pendingBillId = parseInt(billParam, 10);
                    window.history.replaceState(null, '', window.location.pathname);
                }
                fetch('/api/client-config')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.supabaseUrl || !data.supabaseAnonKey) {
                            setAuthState('unauthenticated');
                            return;
                        }
                        _sb = window.supabase.createClient(data.supabaseUrl, data.supabaseAnonKey);
                        return _sb.auth.getSession().then(function(r) {
                            const session = r.data.session;
                            _user = session ? session.user : null;
                            setAuthState(session ? 'authenticated' : 'unauthenticated');
                            _sb.auth.onAuthStateChange(function(event, session) {
                                _user = session ? session.user : null;
                                setAuthState(session ? 'authenticated' : 'unauthenticated');
                            });
                        });
                    })
                    .catch(function() { setAuthState('unauthenticated'); });
            }, []);

            const handleLogin = function(email, password) {
                if (!_sb) return;
                setAuthLoading(true);
                setAuthError('');
                _sb.auth.signInWithPassword({ email: email, password: password })
                    .then(function(r) {
                        if (r.error) setAuthError(r.error.message);
                        setAuthLoading(false);
                    });
            };

            if (authState === 'loading') {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#9ca3af', fontSize: '15px' }}>
                        Loading…
                    </div>
                );
            }
            if (authState === 'unauthenticated') {
                return <LoginScreen onLogin={handleLogin} authError={authError} authLoading={authLoading} />;
            }
            return <BillSplitter />;
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
