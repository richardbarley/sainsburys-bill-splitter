<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sainsbury's Bill Splitter</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bill Splitter">
    <meta name="theme-color" content="#667eea">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        #root { max-width: 1040px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.13); padding: 28px; margin-bottom: 24px; }
        .nano-btn { width: 32px; height: 32px; background: rgba(0,0,0,0.05); border: none; border-radius: 8px; font-size: 15px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
        .nano-btn:hover { background: rgba(0,0,0,0.1); }
        .title { font-size: 32px; font-weight: bold; color: #1f2937; margin-bottom: 8px; }
        .subtitle { color: #6b7280; margin-bottom: 24px; }
        .upload-area { border: 2px dashed #d1d5db; border-radius: 12px; padding: 36px 24px; text-align: center; cursor: pointer; transition: all 0.3s; background: #f9fafb; }
        .upload-area:hover, .upload-area.drag-over { border-color: #667eea; background: #eef2ff; }
        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .upload-text { font-size: 18px; color: #4b5563; margin-bottom: 8px; }
        .upload-hint { font-size: 14px; color: #9ca3af; }
        .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f97316, #fb923c); transition: width 0.3s; }
        .progress-text { text-align: right; color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .item-card { background: #fffbeb; border-radius: 10px; padding: 14px 16px; margin-bottom: 24px; border-left: 3px solid #f59e0b; }
        .item-name { font-size: 20px; font-weight: 600; color: #1f2937; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .item-details { display: flex; gap: 24px; color: #6b7280; font-size: 14px; margin-bottom: 20px; }
        .button { padding: 16px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .button-primary { background: #667eea; color: white; }
        .button-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .button-secondary { background: #10b981; color: white; }
        .button-secondary:hover { background: #059669; transform: translateY(-2px); }
        .button-tertiary { background: #f59e0b; color: white; }
        .button-tertiary:hover { background: #d97706; transform: translateY(-2px); }
        .button-custom { background: #8b5cf6; color: white; }
        .button-custom:hover { background: #7c3aed; transform: translateY(-2px); }
        .button-back { background: #6b7280; color: white; }
        .button-back:hover { background: #4b5563; }
        .button-group { display: flex; gap: 16px; }
        .button-group button { flex: 1; }
        .custom-split-panel { background: #f3f4f6; border-radius: 12px; padding: 24px; margin-top: 16px; }
        .custom-split-title { font-size: 18px; font-weight: 600; color: #1f2937; margin-bottom: 16px; text-align: center; }
        .split-person-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 12px; background: white; border-radius: 8px; }
        .split-person-name { font-weight: 600; color: #1f2937; width: 80px; }
        .split-controls { display: flex; align-items: center; gap: 12px; flex: 1; }
        .split-button { background: #667eea; color: white; border: none; border-radius: 6px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .split-button:hover { background: #5568d3; }
        .split-button:disabled { background: #d1d5db; cursor: not-allowed; }
        .split-input { width: 80px; text-align: center; border: 2px solid #d1d5db; border-radius: 6px; padding: 8px; font-size: 16px; font-weight: 600; }
        .split-amount { font-size: 16px; font-weight: 600; color: #059669; width: 80px; text-align: right; }
        .split-actions { display: flex; gap: 12px; margin-top: 16px; }
        .split-actions button { flex: 1; }
        .quantity-split-panel { background: #fef3c7; border-radius: 12px; padding: 20px; margin-top: 16px; }
        .quantity-split-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .quantity-split-label { font-weight: 600; color: #78350f; }
        .quantity-input { width: 60px; text-align: center; border: 2px solid #fbbf24; border-radius: 6px; padding: 6px; font-size: 16px; font-weight: 600; }
        .quantity-total { font-size: 14px; color: #92400e; margin-top: 8px; text-align: center; }
        .split-type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
        .split-type-button { flex: 1; padding: 12px; border: 2px solid #d1d5db; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .split-type-button.active { border-color: #667eea; background: #eef2ff; color: #667eea; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .person-card { background: linear-gradient(135deg, #fef3c7 0%, #fcd34d 100%); border-radius: 12px; padding: 20px; text-align: center; }
        .person-name { font-size: 18px; font-weight: bold; color: #78350f; margin-bottom: 8px; }
        .person-amount { font-size: 28px; font-weight: bold; color: #92400e; }
        .person-breakdown { font-size: 12px; color: #92400e; margin-top: 8px; opacity: 0.8; }
        .total-bill { background: linear-gradient(135deg, #fed7aa 0%, #fb923c 100%); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 24px; }
        .total-bill-label { font-size: 14px; opacity: 0.8; margin-bottom: 4px; }
        .total-bill-amount { font-size: 36px; font-weight: bold; }
        .divider { border: none; border-top: 1px solid #fed7aa; margin: 16px 0; }
        .details-section { margin-bottom: 24px; }
        details { background: #f9fafb; border-radius: 8px; margin-bottom: 12px; }
        summary { padding: 16px; font-weight: 600; cursor: pointer; color: #1f2937; }
        summary:hover { background: #f3f4f6; }
        .item-list { padding: 0 16px 16px 16px; }
        .item-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #e5e7eb; }
        .item-row:last-child { border-bottom: none; }
        .item-row-name { color: #4b5563; flex: 1; }
        .item-row-price { font-weight: 600; color: #1f2937; margin-left: 16px; }
        .loading { text-align: center; padding: 32px; color: #666; }
        .error { background: #fef2f2; color: #991b1b; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .assignment-indicator { background: #e0e7ff; border: 2px solid #818cf8; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .assignment-title { font-size: 14px; font-weight: 600; color: #4338ca; margin-bottom: 8px; }
        .assignment-detail { font-size: 13px; color: #4338ca; line-height: 1.6; }
        .assignment-detail-row { display: flex; justify-content: space-between; padding: 4px 0; }
        /* Screen title bar */
        .screen-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .screen-bar-icons { display: flex; gap: 6px; flex-shrink: 0; }
        .cfg-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .cfg-table th { text-align: left; padding: 8px 10px; background: #f3f4f6; color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
        .cfg-table td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        .cfg-table tr:last-child td { border-bottom: none; }
        .cfg-table tr:hover td { background: #fafafa; }
        .cfg-input { border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 8px; font-size: 14px; width: 100%; }
        .cfg-input:focus { outline: none; border-color: #667eea; }
        .cfg-select { border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 8px; font-size: 14px; background: white; }
        .cfg-btn { padding: 4px 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .cfg-btn-red { background: #fee2e2; color: #991b1b; }
        .cfg-btn-red:hover { background: #fecaca; }
        .cfg-btn-blue { background: #e0e7ff; color: #3730a3; }
        .cfg-btn-blue:hover { background: #c7d2fe; }
        .cfg-btn-green { background: #d1fae5; color: #065f46; }
        .cfg-btn-green:hover { background: #a7f3d0; }
        .cfg-add-row td { padding: 12px 10px; background: #fafafa; }
        .cfg-add-row input { border: 1.5px dashed #d1d5db; }
        .cfg-section-head { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 8px; }
        .cfg-section-title { font-size: 16px; font-weight: 700; color: #1f2937; }
        .group-tag { display: inline-block; background: #e0e7ff; color: #3730a3; font-size: 12px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
        .no-group-tag { display: inline-block; background: #f3f4f6; color: #9ca3af; font-size: 12px; padding: 2px 8px; border-radius: 12px; }
        .running-totals-sidebar {
            width: 185px;
            flex-shrink: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 20px;
            position: sticky;
            top: 20px;
            align-self: flex-start;
        }
        .running-totals-sidebar .rt-header {
            font-weight: 700;
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .running-totals-sidebar .rt-person { margin-bottom: 12px; }
        .running-totals-sidebar .rt-name { font-size: 12px; color: #6b7280; margin-bottom: 2px; }
        .running-totals-sidebar .rt-amount { font-weight: 700; font-size: 15px; }
        .running-totals-sidebar .rt-footer {
            border-top: 1px solid #e5e7eb;
            margin-top: 6px;
            padding-top: 10px;
        }
        @media (max-width: 900px) {
            .running-totals-sidebar { display: none; }
        }
        /* Summary two-panel */
        .summary-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .summary-two-panel { display: flex; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        .summary-person-list { width: 200px; flex-shrink: 0; border-right: 1px solid #e5e7eb; }
        .summary-breakdown { flex: 1; background: #fafafa; overflow-y: auto; max-height: 420px; }

        @media (max-width: 640px) {
            .card { padding: 16px; }
            .title { font-size: 24px; }
            .item-name { font-size: 18px; }
            .button-group { flex-direction: column; }
            .split-person-row { flex-wrap: wrap; }
            .split-controls { width: 100%; margin-top: 8px; }
            /* Summary: stack panels vertically on mobile */
            .summary-header { flex-direction: column; gap: 10px; }
            .summary-two-panel { flex-direction: column; }
            .summary-person-list { width: 100%; border-right: none; border-bottom: 1px solid #e5e7eb; }
            .summary-breakdown { max-height: 260px; }
            /* Larger touch targets for person pills */
            .quick-pill { padding: 12px 20px !important; font-size: 15px !important; }
        }
        /* Safe area insets for iPhone notch/home bar — never less than 16px */
        body { padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const DEFAULT_CONFIG = {
            people: ['Richard', 'Lisa', 'Molly', 'Rosie', 'Stu', 'Joe'],
            groups: [
                { name: 'Adults', members: ['Richard', 'Lisa'] },
                { name: 'Kids', members: ['Molly', 'Rosie', 'Stu', 'Joe'] }
            ]
        };

        // ── Auth helpers ─────────────────────────────────────────────
        let _sb = null;   // Supabase browser client (set by App on init)
        let _user = null; // Current signed-in user (set by App on auth change)

        const getAuthToken = function() {
            if (!_sb) return Promise.resolve(null);
            return _sb.auth.getSession().then(function(r) {
                return (r.data.session && r.data.session.access_token) || null;
            });
        };

        const API_URL = '/api/data';

        const loadData = function() {
            return getAuthToken().then(function(token) {
                if (!token) return null;
                return fetch(API_URL, {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(function(res) {
                    if (!res.ok) return null;
                    return res.json();
                }).catch(function() { return null; });
            });
        };

        const saveData = function(cfg, hist) {
            return getAuthToken().then(function(token) {
                if (!token) return;
                const uploadCfg = {};
                const keys = Object.keys(cfg);
                for (let i = 0; i < keys.length; i++) { uploadCfg[keys[i]] = cfg[keys[i]]; }
                return fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ config: uploadCfg, history: hist })
                }).catch(function() {});
            });
        };

        const deleteRemoteHistory = function(historyId) {
            return getAuthToken().then(function(token) {
                if (!token) return;
                return fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ historyId: historyId })
                }).catch(function() {});
            });
        };

        // Merge two history arrays by id, newest first, capped at 30 entries
        const mergeHistories = function(local, cloud) {
            const seen = {};
            const merged = [];
            const all = (local || []).concat(cloud || []);
            for (let i = 0; i < all.length; i++) {
                const e = all[i];
                const key = String(e.id || e.savedAt || i);
                if (!seen[key]) { seen[key] = true; merged.push(e); }
            }
            merged.sort(function(a, b) { return (b.savedAt || 0) - (a.savedAt || 0); });
            if (merged.length > 30) merged.length = 30;
            return merged;
        };

        const loadConfig = () => {
            try {
                const saved = localStorage.getItem('billSplitterConfig');
                return saved ? JSON.parse(saved) : DEFAULT_CONFIG;
            } catch { return DEFAULT_CONFIG; }
        };

        const saveConfig = (cfg) => {
            try { localStorage.setItem('billSplitterConfig', JSON.stringify(cfg)); } catch {}
        };

        const SESSION_KEY = 'billSplitterSession';
        const HISTORY_KEY = 'billSplitterHistory';
        const getSavedSession = () => {
            try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || {}; }
            catch { return {}; }
        };
        const getHistory = () => {
            try {
                const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY));
                return Array.isArray(parsed) ? parsed : [];
            }
            catch { return []; }
        };

        // ── UserManagementScreen component ───────────────────────────────
        const UserManagementScreen = function({ onClose }) {
            const [userList, setUserList] = React.useState([]);
            const [usersLoading, setUsersLoading] = React.useState(true);
            const [inviteEmail, setInviteEmail] = React.useState('');
            const [invitePassword, setInvitePassword] = React.useState('');
            const [inviteStatus, setInviteStatus] = React.useState('');
            const [removeConfirm, setRemoveConfirm] = React.useState(null);

            const fetchUsers = function() {
                setUsersLoading(true);
                getAuthToken().then(function(token) {
                    if (!token) { setUsersLoading(false); return; }
                    fetch('/api/users', { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(function(r) { return r.json(); })
                        .then(function(data) { setUserList(data.users || []); setUsersLoading(false); })
                        .catch(function() { setUsersLoading(false); });
                });
            };

            React.useEffect(function() { fetchUsers(); }, []);

            const sendInvite = function() {
                if (!inviteEmail.trim() || !invitePassword.trim()) return;
                setInviteStatus('sending');
                getAuthToken().then(function(token) {
                    fetch('/api/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ email: inviteEmail.trim(), password: invitePassword.trim() })
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.error) { setInviteStatus('error:' + data.error); }
                        else { setInviteStatus('sent'); setInviteEmail(''); setInvitePassword(''); fetchUsers(); }
                    })
                    .catch(function() { setInviteStatus('error:Network error'); });
                });
            };

            const removeUser = function(userId) {
                getAuthToken().then(function(token) {
                    fetch('/api/users', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ userId: userId })
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (!data.error) setUserList(function(prev) { return prev.filter(function(u) { return u.id !== userId; }); });
                        setRemoveConfirm(null);
                    })
                    .catch(function() { setRemoveConfirm(null); });
                });
            };

            return (
                <div className="card">
                    <div className="screen-bar" style={{ marginBottom: '4px' }}>
                        <h1 className="title" style={{ fontSize: '22px', marginBottom: 0 }}>Manage Users</h1>
                        <button className="nano-btn" onClick={onClose} title="Close" style={{ fontSize: '14px', fontWeight: 700 }}>✕</button>
                    </div>
                    <p className="subtitle" style={{ marginBottom: '20px' }}>Add a family member and set their password. Tell them their login details directly.</p>

                    <div style={{ marginBottom: '24px', padding: '16px', background: '#f0fdf4', borderRadius: '10px', border: '1px solid #bbf7d0' }}>
                        <div style={{ fontSize: '13px', fontWeight: 700, color: '#15803d', marginBottom: '10px' }}>Add a new user</div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                            <input type="email" value={inviteEmail}
                                onChange={function(e) { setInviteEmail(e.target.value); setInviteStatus(''); }}
                                onKeyDown={function(e) { if (e.key === 'Enter') sendInvite(); }}
                                placeholder="Email address"
                                style={{ padding: '9px 12px', border: '1px solid #86efac', borderRadius: '8px', fontSize: '14px', outline: 'none' }}
                            />
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <input type="text" value={invitePassword}
                                    onChange={function(e) { setInvitePassword(e.target.value); setInviteStatus(''); }}
                                    onKeyDown={function(e) { if (e.key === 'Enter') sendInvite(); }}
                                    placeholder="Set a password"
                                    style={{ flex: 1, padding: '9px 12px', border: '1px solid #86efac', borderRadius: '8px', fontSize: '14px', outline: 'none' }}
                                />
                                <button onClick={sendInvite}
                                    disabled={inviteStatus === 'sending' || !inviteEmail.trim() || !invitePassword.trim()}
                                    style={{ padding: '9px 16px', background: '#16a34a', border: 'none', borderRadius: '8px', fontSize: '13px', fontWeight: 700, color: 'white', cursor: 'pointer', opacity: (inviteStatus === 'sending' || !inviteEmail.trim() || !invitePassword.trim()) ? 0.6 : 1 }}>
                                    {inviteStatus === 'sending' ? 'Adding…' : 'Add'}
                                </button>
                            </div>
                        </div>
                        {inviteStatus === 'sent' && <div style={{ marginTop: '8px', fontSize: '13px', color: '#15803d', fontWeight: 600 }}>✓ User added!</div>}
                        {inviteStatus.startsWith('error:') && <div style={{ marginTop: '8px', fontSize: '13px', color: '#dc2626' }}>✗ {inviteStatus.slice(6)}</div>}
                    </div>

                    <div style={{ fontSize: '13px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '12px' }}>
                        {usersLoading ? 'Loading…' : userList.length + ' user' + (userList.length !== 1 ? 's' : '')}
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                        {userList.map(function(u) {
                            const isMe = _user && u.email === _user.email;
                            const isConfirming = removeConfirm === u.id;
                            return (
                                <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 14px', background: isMe ? '#fffbeb' : '#fafafa', borderRadius: '8px', border: '1px solid ' + (isMe ? '#fde68a' : '#e5e7eb') }}>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', flexWrap: 'wrap' }}>
                                            <span style={{ fontSize: '14px', fontWeight: 600, color: '#1f2937', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '200px' }}>
                                                {u.email}
                                            </span>
                                            {isMe && <span style={{ fontSize: '11px', color: '#92400e', background: '#fef3c7', borderRadius: '4px', padding: '1px 5px', flexShrink: 0 }}>you</span>}
                                            {u.confirmed
                                                ? <span style={{ fontSize: '11px', fontWeight: 700, color: '#15803d', background: '#dcfce7', borderRadius: '4px', padding: '1px 6px', flexShrink: 0 }}>Active</span>
                                                : <span style={{ fontSize: '11px', fontWeight: 700, color: '#92400e', background: '#fef3c7', borderRadius: '4px', padding: '1px 6px', flexShrink: 0 }}>Invited</span>
                                            }
                                        </div>
                                        <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '3px' }}>
                                            {u.confirmed
                                                ? 'Joined ' + new Date(u.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
                                                : 'Invited ' + new Date(u.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
                                            }
                                        </div>
                                    </div>
                                    {!isMe && (isConfirming ? (
                                        <div style={{ display: 'flex', gap: '6px', flexShrink: 0 }}>
                                            <button onClick={function() { setRemoveConfirm(null); }} style={{ padding: '5px 10px', background: 'white', border: '1px solid #e5e7eb', borderRadius: '6px', fontSize: '12px', cursor: 'pointer' }}>Cancel</button>
                                            <button onClick={function() { removeUser(u.id); }} style={{ padding: '5px 10px', background: '#ef4444', border: 'none', borderRadius: '6px', fontSize: '12px', fontWeight: 700, color: 'white', cursor: 'pointer' }}>Remove</button>
                                        </div>
                                    ) : (
                                        <button onClick={function() { setRemoveConfirm(u.id); }} style={{ background: 'none', border: 'none', color: '#d1d5db', fontSize: '16px', cursor: 'pointer', padding: '4px', flexShrink: 0 }} title="Remove user">✕</button>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const BillSplitter = () => {
            const [items, setItems] = useState(() => getSavedSession().items || []);
            const [currentItemIndex, setCurrentItemIndex] = useState(() => getSavedSession().currentItemIndex || 0);
            const [assignments, setAssignments] = useState(() => getSavedSession().assignments || {});
            const [showSummary, setShowSummary] = useState(() => getSavedSession().showSummary || false);
            const [receiptDate, setReceiptDate] = useState(() => getSavedSession().receiptDate || '');
            const [sessionId, setSessionId] = useState(() => getSavedSession().sessionId || null);
            const [cloudSyncStatus, setCloudSyncStatus] = useState(''); // '' | 'syncing' | 'synced' | 'error'
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [dragOver, setDragOver] = useState(false);
            const [showCustomSplit, setShowCustomSplit] = useState(false);
            const [splitType, setSplitType] = useState('percentage');
            const [showSettings, setShowSettings] = useState(false);
            const [showUsers, setShowUsers] = useState(false);
            const [showUnassignedOnly, setShowUnassignedOnly] = useState(true);
            const [config, setConfig] = useState(loadConfig());
            const [editingPerson, setEditingPerson] = useState(null); // index being renamed
            const [editingGroup, setEditingGroup] = useState(null);   // index being renamed
            const [newPersonName, setNewPersonName] = useState('');
            const [newGroupName, setNewGroupName] = useState('');

            // Custom split percentages — populated dynamically in openCustomSplit
            const [customSplit, setCustomSplit] = useState({});

            // Track which percentages have been manually adjusted
            const [manuallyAdjusted, setManuallyAdjusted] = useState(new Set());

            // Individuals selection
            const [selectedIndividuals, setSelectedIndividuals] = useState([]);

            // Quick individual selection on main screen
            const [quickSelectPeople, setQuickSelectPeople] = useState([]);

            // Which group preset buttons were explicitly clicked (for highlight only)
            const [selectedGroups, setSelectedGroups] = useState(new Set());

            // Keyboard-focused pill index (-1 = none focused)
            const [focusedPillIndex, setFocusedPillIndex] = useState(-1);

            // Review/edit mode (jumping back from summary)
            const [reviewMode, setReviewMode] = useState(false);
            const [expandedPerson, setExpandedPerson] = useState(null);

            // History screen + share modal
            const [showHistory, setShowHistory] = useState(false);
            const [showShareModal, setShowShareModal] = useState(false);
            const [historyCopied, setHistoryCopied] = useState(false);
            const [shareTab, setShareTab] = useState('person'); // 'person' | 'list'
            const [deletingHistoryId, setDeletingHistoryId] = useState(null);
            const [historyVersion, setHistoryVersion] = useState(0);
            const [historyExpandedTab, setHistoryExpandedTab] = useState('items'); // 'items' | 'byPerson'
            const [historyLoading, setHistoryLoading] = useState(false);

            // Quantity-based split
            const [quantitySplit, setQuantitySplit] = useState({
                youLisa: 0,
                kids: 0
            });

            // Bill assignment flow
            const [billAssignedTo, setBillAssignedTo] = useState(null);
            const [billAssignedBy, setBillAssignedBy] = useState(null);
            const [billAssignedStatus, setBillAssignedStatus] = useState(null);
            const [billCompletedBy, setBillCompletedBy] = useState(null);
            const [billCompletedAt, setBillCompletedAt] = useState(null);
            const [isAssigneeMode, setIsAssigneeMode] = useState(false);
            const [showAssignModal, setShowAssignModal] = useState(null);
            const [notification, setNotification] = useState(null);
            const [appUsers, setAppUsers] = useState([]);

            // ── Settings helpers ────────────────────────────────────────
            const updateConfig = (newCfg) => {
                setConfig(newCfg);
                saveConfig(newCfg);
                if (_user) {
                    setCloudSyncStatus('syncing');
                    saveData(newCfg, getHistory())
                        .then(function() { setCloudSyncStatus('synced'); });
                }
            };

            const getPersonGroup = (personName) =>
                config.groups.find(g => g.members.includes(personName));

            const addPerson = () => {
                const name = newPersonName.trim();
                if (!name || config.people.includes(name)) return;
                updateConfig({ ...config, people: [...config.people, name] });
                setNewPersonName('');
            };

            const removePerson = (name) => {
                const newGroups = config.groups.map(g => ({
                    ...g, members: g.members.filter(m => m !== name)
                }));
                updateConfig({ ...config, people: config.people.filter(p => p !== name), groups: newGroups });
            };

            const renamePerson = (oldName, newName) => {
                newName = newName.trim();
                if (!newName || newName === oldName) { setEditingPerson(null); return; }
                const newPeople = config.people.map(p => p === oldName ? newName : p);
                const newGroups = config.groups.map(g => ({
                    ...g, members: g.members.map(m => m === oldName ? newName : m)
                }));
                updateConfig({ ...config, people: newPeople, groups: newGroups });
                setEditingPerson(null);
            };

            const togglePersonGroup = (personName, groupName) => {
                const newGroups = config.groups.map(g => {
                    if (g.name !== groupName) return g;
                    return g.members.includes(personName)
                        ? { ...g, members: g.members.filter(m => m !== personName) }
                        : { ...g, members: [...g.members, personName] };
                });
                updateConfig({ ...config, groups: newGroups });
            };

            const addGroup = () => {
                const name = newGroupName.trim();
                if (!name || config.groups.find(g => g.name === name)) return;
                updateConfig({ ...config, groups: [...config.groups, { name, members: [] }] });
                setNewGroupName('');
            };

            const removeGroup = (groupName) => {
                updateConfig({ ...config, groups: config.groups.filter(g => g.name !== groupName) });
            };

            const renameGroup = (oldName, newName) => {
                newName = newName.trim();
                if (!newName || newName === oldName) { setEditingGroup(null); return; }
                const newGroups = config.groups.map(g => g.name === oldName ? { ...g, name: newName } : g);
                updateConfig({ ...config, groups: newGroups });
                setEditingGroup(null);
            };
            // ────────────────────────────────────────────────────────────

            // Reset/pre-populate quick selection when moving to a different item
            useEffect(() => {
                const existingAssignment = assignments[currentItemIndex];

                // For custom/quantity splits (can't be shown via buttons) or no assignment → clear
                if (!existingAssignment || existingAssignment.type === 'custom' || existingAssignment.type === 'quantity') {
                    setQuickSelectPeople([]);
                    setSelectedGroups(new Set());
                    setFocusedPillIndex(-1);
                    return;
                }

                // Named group or 'Shared' → highlight the matching group button(s) and their members
                if (typeof existingAssignment === 'string') {
                    if (existingAssignment === 'Shared') {
                        setQuickSelectPeople([...config.people]);
                        setSelectedGroups(new Set(config.groups.map(g => g.name)));
                    } else {
                        const group = config.groups.find(g => g.name === existingAssignment);
                        if (group) {
                            setQuickSelectPeople([...group.members]);
                            setSelectedGroups(new Set([group.name]));
                        } else {
                            setQuickSelectPeople([]);
                            setSelectedGroups(new Set());
                        }
                    }
                // Individual people → highlight their pills only
                } else if (existingAssignment.type === 'individuals') {
                    setQuickSelectPeople([...existingAssignment.people]);
                    setSelectedGroups(new Set());
                }
                setFocusedPillIndex(-1);
            }, [currentItemIndex]);

            // Persist session to localStorage whenever key state changes
            useEffect(() => {
                if (items.length === 0) return;
                try {
                    localStorage.setItem(SESSION_KEY, JSON.stringify({
                        items, assignments, currentItemIndex, showSummary, receiptDate, sessionId, savedAt: Date.now()
                    }));
                } catch {}
            }, [items, assignments, currentItemIndex, showSummary]);

            // On mount: pull from backend, merge history, apply config
            useEffect(() => {
                if (!_user) return;
                setCloudSyncStatus('syncing');
                loadData().then(function(remote) {
                    if (!remote) { setCloudSyncStatus('error'); return; }
                    // Merge histories
                    const merged = mergeHistories(getHistory(), remote.history || []);
                    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(merged)); } catch {}
                    // Apply remote config (people, groups)
                    if (remote.config && (remote.config.people || remote.config.groups)) {
                        const newCfg = Object.assign({}, remote.config);
                        setConfig(newCfg);
                        saveConfig(newCfg);
                    }
                    setCloudSyncStatus('synced');
                });
            }, []);

            const clearSession = () => {
                // Bill is already saved live in history — just clear the active session
                try { localStorage.removeItem(SESSION_KEY); } catch {}
                setSessionId(null);
                setItems([]);
                setAssignments({});
                setCurrentItemIndex(0);
                setShowSummary(false);
                setReceiptDate('');
            };

            // ── Keyboard shortcuts ───────────────────────────────────────
            useEffect(() => {
                if (!items.length || showSummary || showCustomSplit || showSettings || loading) return;
                const handleKey = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                    // Number keys → toggle group presets
                    const num = parseInt(e.key);
                    if (!isNaN(num) && num >= 1 && num <= config.groups.length) {
                        toggleGroupSelection(config.groups[num - 1]);
                    }
                    // E → toggle everyone
                    if (e.key === 'e' || e.key === 'E') toggleEveryone();
                    // Enter → assign
                    if (e.key === 'Enter' && quickSelectPeople.length > 0) assignFromSelection();
                    // Arrow Right → move focus to next pill (enter pill nav from -1)
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        setFocusedPillIndex(prev => Math.min(prev + 1, config.people.length - 1));
                    }
                    // Arrow Left → move focus to previous pill (exit pill nav at 0)
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        setFocusedPillIndex(prev => Math.max(prev - 1, -1));
                    }
                    // Space → toggle the focused pill
                    if (e.key === ' ' && focusedPillIndex >= 0) {
                        e.preventDefault();
                        const person = config.people[focusedPillIndex];
                        setQuickSelectPeople(prev =>
                            prev.includes(person) ? prev.filter(p => p !== person) : [...prev, person]
                        );
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [currentItemIndex, showSummary, showCustomSplit, showSettings, loading, config.groups.length, items.length, quickSelectPeople.length, selectedGroups.size, focusedPillIndex]);
            // ────────────────────────────────────────────────────────────

            const extractTextFromPdf = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                let allText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();

                    const sortedItems = textContent.items.sort((a, b) => {
                        const yDiff = Math.abs(b.transform[5] - a.transform[5]);
                        if (yDiff > 2) return b.transform[5] - a.transform[5];
                        return a.transform[4] - b.transform[4];
                    });

                    let lastY = null;
                    for (let item of sortedItems) {
                        const y = Math.round(item.transform[5]);
                        if (lastY !== null && Math.abs(y - lastY) > 2) {
                            allText += '\n';
                        }
                        allText += item.str;
                        lastY = y;
                    }
                    allText += '\n';
                }

                return allText.split('\n');
            };

            const extractReceiptDate = (lines) => {
                const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
                const monthPat = months.join('|');
                const longRe = new RegExp('(\\d{1,2})\\s+(' + monthPat + ')\\s+(\\d{4})', 'i');
                const shortRe = /(\d{1,2})\/(\d{1,2})\/(\d{4})/;
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const m = line.match(longRe);
                    if (m) {
                        const d = new Date(m[1] + ' ' + m[2] + ' ' + m[3]);
                        if (!isNaN(d)) return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    }
                    const s = line.match(shortRe);
                    if (s) {
                        const d = new Date(s[3] + '-' + s[2].padStart(2,'0') + '-' + s[1].padStart(2,'0'));
                        if (!isNaN(d)) return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    }
                }
                return '';
            };

            const parsePdfLines = (lines) => {
                const items = [];
                let inGroceries = false;
                let i = 0;

                while (i < lines.length) {
                    const line = lines[i].trim();

                    if (line.includes('Groceries (') && line.includes('items)')) {
                        inGroceries = true;
                        i++;
                        continue;
                    }

                    if (line.includes('Order summary')) {
                        break;
                    }

                    if (!inGroceries) {
                        i++;
                        continue;
                    }

                    if (!line) {
                        i++;
                        continue;
                    }

                    const singleLineMatch = line.match(/^(\d+(?:\.\d+)?(?:kg)?)\s+(.+?)\s+£([\d.]+)$/);

                    if (singleLineMatch) {
                        const quantity = singleLineMatch[1];
                        const name = singleLineMatch[2].trim();
                        const price = parseFloat(singleLineMatch[3]);

                        if (name && price > 0) {
                            items.push({ quantity, name, price });
                        }
                        i++;
                    } else {
                        const startMatch = line.match(/^(\d+(?:\.\d+)?(?:kg)?)\s+(.+)$/);

                        if (startMatch && i + 1 < lines.length) {
                            const nextLine = lines[i + 1].trim();
                            const priceMatch = nextLine.match(/^(.+?)\s+£([\d.]+)$/);

                            if (priceMatch) {
                                const quantity = startMatch[1];
                                const namePart1 = startMatch[2].trim();
                                const namePart2 = priceMatch[1].trim();
                                const name = (namePart1 + ' ' + namePart2).trim();
                                const price = parseFloat(priceMatch[2]);

                                if (name && price > 0) {
                                    items.push({ quantity, name, price });
                                }
                                i += 2;
                            } else {
                                i++;
                            }
                        } else {
                            i++;
                        }
                    }
                }

                return items;
            };

            const handleFileUpload = async (file) => {
                if (!file || file.type !== 'application/pdf') {
                    setError('Please upload a PDF file');
                    return;
                }

                setLoading(true);
                setError('');

                try {
                    const lines = await extractTextFromPdf(file);
                    const extractedItems = parsePdfLines(lines);

                    if (extractedItems.length === 0) {
                        setError('Could not extract items from PDF. Please make sure this is a Sainsbury\'s receipt.');
                        setLoading(false);
                        return;
                    }

                    const newSessionId = Date.now();
                    setSessionId(newSessionId);
                    setItems(extractedItems);
                    setReceiptDate(extractReceiptDate(lines));
                    setCurrentItemIndex(0);
                    setAssignments({});
                    setShowSummary(false);
                    setLoading(false);
                } catch (err) {
                    setError('Error reading PDF: ' + err.message);
                    setLoading(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const file = e.dataTransfer.files[0];
                handleFileUpload(file);
            };

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                handleFileUpload(file);
            };

            // Advance after an assignment — respects unassigned-only filter
            const advanceToNext = (afterIndex, newAssignments) => {
                if (showUnassignedOnly) {
                    for (let i = afterIndex + 1; i < items.length; i++) {
                        if (!newAssignments[i]) { setCurrentItemIndex(i); return; }
                    }
                    setShowSummary(true);
                } else if (afterIndex < items.length - 1) {
                    setCurrentItemIndex(afterIndex + 1);
                } else {
                    setShowSummary(true);
                }
            };

            const assignItem = (group) => {
                const newAssignments = { ...assignments };
                newAssignments[currentItemIndex] = group;
                setAssignments(newAssignments);
                setShowCustomSplit(false);

                if (reviewMode) {
                    setReviewMode(false);
                    setShowSummary(true);
                } else {
                    advanceToNext(currentItemIndex, newAssignments);
                }
            };

            const makeEqualSplit = () => {
                const count = config.people.length;
                const split = {};
                if (count > 0) {
                    const base = Math.floor(10000 / count) / 100;
                    let sum = 0;
                    config.people.forEach((p, i) => {
                        if (i === count - 1) {
                            split[p] = Math.round((100 - sum) * 100) / 100;
                        } else {
                            split[p] = base;
                            sum += base;
                        }
                    });
                }
                return split;
            };

            const openCustomSplit = () => {
                setCustomSplit(makeEqualSplit());
                setManuallyAdjusted(new Set());
                setSelectedIndividuals([]);
                const currentItem = items[currentItemIndex];
                const qty = parseFloat(currentItem.quantity) || 1;
                setQuantitySplit({
                    youLisa: Math.floor(qty / 2),
                    kids: Math.ceil(qty / 2)
                });
                setSplitType('individuals');
                setShowCustomSplit(true);
            };

            const redistributePercentages = (changedPerson, newValue) => {
                const people = config.people;
                const newSplit = { ...customSplit };
                newSplit[changedPerson] = newValue;

                const newManuallyAdjusted = new Set(manuallyAdjusted);
                newManuallyAdjusted.add(changedPerson);

                const autoAdjustPeople = people.filter(p =>
                    p !== changedPerson && !newManuallyAdjusted.has(p)
                );

                const manualTotal = people
                    .filter(p => newManuallyAdjusted.has(p))
                    .reduce((sum, p) => sum + (newSplit[p] || 0), 0);

                const remainingPercentage = 100 - manualTotal;

                if (autoAdjustPeople.length > 0) {
                    const perPerson = remainingPercentage / autoAdjustPeople.length;
                    autoAdjustPeople.forEach((p, idx) => {
                        if (idx === autoAdjustPeople.length - 1) {
                            const totalSoFar = people
                                .filter(person => person !== p)
                                .reduce((sum, person) => sum + (newSplit[person] || 0), 0);
                            newSplit[p] = Math.round((100 - totalSoFar) * 100) / 100;
                        } else {
                            newSplit[p] = Math.round(perPerson * 100) / 100;
                        }
                    });
                }

                setCustomSplit(newSplit);
                setManuallyAdjusted(newManuallyAdjusted);
            };

            const updatePercentage = (person, delta) => {
                let newValue = customSplit[person] + delta;
                newValue = Math.max(0, Math.min(100, newValue));
                newValue = Math.round(newValue * 100) / 100;
                redistributePercentages(person, newValue);
            };

            const setPercentage = (person, value) => {
                let newValue = parseFloat(value) || 0;
                newValue = Math.max(0, Math.min(100, newValue));
                redistributePercentages(person, newValue);
            };

            const resetToEqualSplit = () => {
                setCustomSplit(makeEqualSplit());
                setManuallyAdjusted(new Set());
            };

            const updateQuantity = (group, value) => {
                const newSplit = { ...quantitySplit };
                const qty = parseInt(value) || 0;
                newSplit[group] = Math.max(0, qty);
                setQuantitySplit(newSplit);
            };

            const applyCustomSplit = () => {
                const currentItem = items[currentItemIndex];
                const newAssignments = { ...assignments };

                if (splitType === 'individuals') {
                    newAssignments[currentItemIndex] = {
                        type: 'individuals',
                        people: [...selectedIndividuals],
                        price: currentItem.price
                    };
                } else if (splitType === 'percentage') {
                    newAssignments[currentItemIndex] = {
                        type: 'custom',
                        splits: { ...customSplit },
                        price: currentItem.price
                    };
                } else {
                    // Quantity-based split
                    newAssignments[currentItemIndex] = {
                        type: 'quantity',
                        splits: { ...quantitySplit },
                        price: currentItem.price,
                        totalQty: parseFloat(currentItem.quantity) || 1
                    };
                }

                setAssignments(newAssignments);
                setShowCustomSplit(false);

                if (reviewMode) {
                    setReviewMode(false);
                    setShowSummary(true);
                } else {
                    advanceToNext(currentItemIndex, newAssignments);
                }
            };

            const goBack = () => {
                if (showCustomSplit) {
                    setShowCustomSplit(false);
                } else if (reviewMode) {
                    setReviewMode(false);
                    setShowSummary(true);
                } else if (currentItemIndex > 0) {
                    setCurrentItemIndex(currentItemIndex - 1);
                    setShowCustomSplit(false);
                }
            };

            const jumpToItem = (index) => {
                setCurrentItemIndex(index);
                setShowSummary(false);
                setShowCustomSplit(false);
                setReviewMode(true);
            };

            const toggleGroupSelection = (group) => {
                const isActive = selectedGroups.has(group.name);
                const newGroupSet = new Set(selectedGroups);
                if (isActive) {
                    newGroupSet.delete(group.name);
                    setSelectedGroups(newGroupSet);
                    setQuickSelectPeople(quickSelectPeople.filter(p => !group.members.includes(p)));
                } else {
                    newGroupSet.add(group.name);
                    setSelectedGroups(newGroupSet);
                    setQuickSelectPeople([...new Set([...quickSelectPeople, ...group.members])]);
                }
            };

            const toggleEveryone = () => {
                const allSelected = config.people.every(p => quickSelectPeople.includes(p));
                setQuickSelectPeople(allSelected ? [] : [...config.people]);
            };

            const assignFromSelection = () => {
                if (quickSelectPeople.length === 0) return;
                // Matches everyone → save as Shared
                if (quickSelectPeople.length === config.people.length &&
                    config.people.every(p => quickSelectPeople.includes(p))) {
                    assignItem('Shared');
                    return;
                }
                // Matches a group exactly → save as group name
                const matchedGroup = config.groups.find(g =>
                    g.members.length > 0 &&
                    g.members.length === quickSelectPeople.length &&
                    g.members.every(m => quickSelectPeople.includes(m))
                );
                if (matchedGroup) {
                    assignItem(matchedGroup.name);
                    return;
                }
                // Otherwise → individuals
                assignItem({ type: 'individuals', people: [...quickSelectPeople] });
            };

            // Accept a suggestion directly (from the tappable hint) and advance
            const applySuggestion = (result) => {
                if (!result) return;
                const newAssignments = Object.assign({}, assignments, { [currentItemIndex]: result.assignment });
                setAssignments(newAssignments);
                setQuickSelectPeople([]);
                setSelectedGroups(new Set());
                advanceToNext(currentItemIndex, newAssignments);
            };

            const calculateSummary = () => {
                const totals = {};
                config.people.forEach(p => { totals[p] = 0; });

                items.forEach((item, index) => {
                    const assignment = assignments[index];
                    if (!assignment) return;

                    if (typeof assignment === 'string') {
                        if (assignment === 'Shared') {
                            const perPerson = item.price / config.people.length;
                            config.people.forEach(p => { totals[p] += perPerson; });
                        } else {
                            // Group name — find group in config
                            const group = config.groups.find(g => g.name === assignment);
                            if (group && group.members.length > 0) {
                                const perPerson = item.price / group.members.length;
                                group.members.forEach(m => { if (m in totals) totals[m] += perPerson; });
                            }
                        }
                    } else if (assignment.type === 'custom') {
                        // Map lowercase split keys → actual person names
                        const keyMap = {};
                        config.people.forEach(p => { keyMap[p.toLowerCase()] = p; });
                        if (config.people.length > 0) keyMap['you'] = config.people[0];
                        Object.entries(assignment.splits).forEach(([key, pct]) => {
                            const name = keyMap[key] || keyMap[key.toLowerCase()];
                            if (name && name in totals) totals[name] += (item.price * pct) / 100;
                        });
                    } else if (assignment.type === 'individuals') {
                        if (assignment.people && assignment.people.length > 0) {
                            const perPerson = item.price / assignment.people.length;
                            assignment.people.forEach(p => { if (p in totals) totals[p] += perPerson; });
                        }
                    } else if (assignment.type === 'quantity') {
                        // Quantity split: group 0 = youLisa, group 1 = kids
                        const pricePerUnit = item.price / assignment.totalQty;
                        const g0 = config.groups[0];
                        const g1 = config.groups[1];
                        if (g0 && g0.members.length > 0) {
                            const amt = (pricePerUnit * assignment.splits.youLisa) / g0.members.length;
                            g0.members.forEach(m => { if (m in totals) totals[m] += amt; });
                        }
                        if (g1 && g1.members.length > 0) {
                            const amt = (pricePerUnit * assignment.splits.kids) / g1.members.length;
                            g1.members.forEach(m => { if (m in totals) totals[m] += amt; });
                        }
                    }
                });

                return totals;
            };

            const buildBreakdown = () => {
                const breakdown = {};
                config.people.forEach(p => { breakdown[p] = []; });
                const push = (person, name, amount, index, totalPrice, splitLabel) => {
                    if (person in breakdown) breakdown[person].push({ name, amount, index, totalPrice, splitLabel });
                };
                const formatOthers = (allPeople, self) => {
                    const others = allPeople.filter(p => p !== self);
                    if (others.length === 0) return 'Just you';
                    if (others.length === 1) return `Split with ${others[0]}`;
                    return `Split with ${others.slice(0, -1).join(', ')} & ${others[others.length - 1]}`;
                };
                items.forEach((item, index) => {
                    const a = assignments[index];
                    if (!a) return;
                    if (typeof a === 'string') {
                        if (a === 'Shared') {
                            const amt = item.price / config.people.length;
                            const label = `Shared (${config.people.length} ways)`;
                            config.people.forEach(p => push(p, item.name, amt, index, item.price, label));
                        } else {
                            const group = config.groups.find(g => g.name === a);
                            if (group && group.members.length > 0) {
                                const amt = item.price / group.members.length;
                                const label = group.members.length > 1
                                    ? `${group.name} (${group.members.length} members)`
                                    : group.name;
                                group.members.forEach(m => push(m, item.name, amt, index, item.price, label));
                            }
                        }
                    } else if (a.type === 'individuals') {
                        if (a.people && a.people.length > 0) {
                            const amt = item.price / a.people.length;
                            a.people.forEach(p => {
                                const label = formatOthers(a.people, p);
                                push(p, item.name, amt, index, item.price, label);
                            });
                        }
                    } else if (a.type === 'custom') {
                        const keyMap = {};
                        config.people.forEach(p => { keyMap[p.toLowerCase()] = p; });
                        if (config.people.length > 0) keyMap['you'] = config.people[0];
                        Object.entries(a.splits).forEach(([key, pct]) => {
                            const name = keyMap[key] || keyMap[key.toLowerCase()];
                            if (name) {
                                const label = `Custom split (${pct.toFixed(0)}%)`;
                                push(name, item.name, (item.price * pct) / 100, index, item.price, label);
                            }
                        });
                    } else if (a.type === 'quantity') {
                        const ppu = item.price / a.totalQty;
                        const g0 = config.groups[0], g1 = config.groups[1];
                        if (g0 && g0.members.length > 0) {
                            const amt = (ppu * a.splits.youLisa) / g0.members.length;
                            const label = `${g0.name}: ${a.splits.youLisa} of ${a.totalQty} items`;
                            g0.members.forEach(m => push(m, item.name, amt, index, item.price, label));
                        }
                        if (g1 && g1.members.length > 0) {
                            const amt = (ppu * a.splits.kids) / g1.members.length;
                            const label = `${g1.name}: ${a.splits.kids} of ${a.totalQty} items`;
                            g1.members.forEach(m => push(m, item.name, amt, index, item.price, label));
                        }
                    }
                });
                return breakdown;
            };

            // ── Per-person breakdown for a historical entry ──────────────
            // Returns { personName: [{ name, amount }, ...], ... }
            const buildHistoryBreakdown = (entry) => {
                const hConfig = entry.config || { people: [], groups: [] };
                const people = hConfig.people || [];
                const groups = hConfig.groups || [];
                const breakdown = {};
                for (let p = 0; p < people.length; p++) breakdown[people[p]] = [];

                for (let i = 0; i < entry.items.length; i++) {
                    const item = entry.items[i];
                    const a = entry.assignments[i];
                    if (!a) continue;

                    if (typeof a === 'string') {
                        if (a === 'Shared') {
                            if (people.length > 0) {
                                const amt = item.price / people.length;
                                for (let p = 0; p < people.length; p++) {
                                    breakdown[people[p]].push({ name: item.name, amount: amt });
                                }
                            }
                        } else {
                            // named group
                            let group = null;
                            for (let g = 0; g < groups.length; g++) { if (groups[g].name === a) { group = groups[g]; break; } }
                            if (group && group.members.length > 0) {
                                const amt = item.price / group.members.length;
                                for (let m = 0; m < group.members.length; m++) {
                                    const member = group.members[m];
                                    if (breakdown[member] !== undefined) breakdown[member].push({ name: item.name, amount: amt });
                                }
                            }
                        }
                    } else if (a.type === 'individuals') {
                        const members = a.people || [];
                        if (members.length > 0) {
                            const amt = item.price / members.length;
                            for (let m = 0; m < members.length; m++) {
                                const member = members[m];
                                if (breakdown[member] !== undefined) breakdown[member].push({ name: item.name, amount: amt });
                            }
                        }
                    } else if (a.type === 'custom') {
                        const keyMap = {};
                        for (let p = 0; p < people.length; p++) keyMap[people[p].toLowerCase()] = people[p];
                        if (people.length > 0) keyMap['you'] = people[0];
                        const splitKeys = Object.keys(a.splits || {});
                        for (let k = 0; k < splitKeys.length; k++) {
                            const key = splitKeys[k];
                            const pct = a.splits[key];
                            const personName = keyMap[key] || keyMap[key.toLowerCase()];
                            if (personName && breakdown[personName] !== undefined) {
                                breakdown[personName].push({ name: item.name, amount: item.price * pct / 100 });
                            }
                        }
                    } else if (a.type === 'quantity') {
                        const ppu = item.price / (a.totalQty || 1);
                        const g0 = groups[0], g1 = groups[1];
                        if (g0 && g0.members.length > 0 && a.splits) {
                            const amt = (ppu * (a.splits.youLisa || 0)) / g0.members.length;
                            for (let m = 0; m < g0.members.length; m++) {
                                if (breakdown[g0.members[m]] !== undefined) breakdown[g0.members[m]].push({ name: item.name, amount: amt });
                            }
                        }
                        if (g1 && g1.members.length > 0 && a.splits) {
                            const amt = (ppu * (a.splits.kids || 0)) / g1.members.length;
                            for (let m = 0; m < g1.members.length; m++) {
                                if (breakdown[g1.members[m]] !== undefined) breakdown[g1.members[m]].push({ name: item.name, amount: amt });
                            }
                        }
                    }
                }
                return breakdown;
            };

            // ── History & share ──────────────────────────────────────────
            const openHistoryScreen = () => {
                setShowHistory(true);
                setExpandedPerson(null);
                setHistoryExpandedTab('items');
                if (!_user) return;
                setHistoryLoading(true);
                loadData().then(function(remote) {
                    setHistoryLoading(false);
                    if (!remote) return;
                    const merged = mergeHistories(getHistory(), remote.history || []);
                    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(merged)); } catch {}
                    setHistoryVersion(function(v) { return v + 1; });
                });
            };

            const pushToCloud = (hist) => {
                if (!_user) return;
                setCloudSyncStatus('syncing');
                saveData(config, hist)
                    .then(function() { setCloudSyncStatus('synced'); });
            };

            // Upsert the current bill into history by sessionId (insert or update in place)
            const upsertHistory = (sid) => {
                if (!sid || items.length === 0) return;
                try {
                    const totals = calculateSummary();
                    const totalBill = Object.values(totals).reduce((s, v) => s + v, 0);
                    const now = Date.now();
                    const entry = {
                        id: sid,
                        savedAt: sid,        // creation time = session id timestamp
                        updatedAt: now,
                        receiptDate: receiptDate || '',
                        items: [...items],
                        assignments: { ...assignments },
                        config: { people: [...config.people], groups: config.groups.map(g => ({ ...g, members: [...g.members] })) },
                        totals,
                        totalBill,
                        assignedTo: billAssignedTo || null,
                        assignedBy: billAssignedBy || null,
                        assignedStatus: billAssignedStatus || null,
                        completedBy: billCompletedBy || null,
                        completedAt: billCompletedAt || null
                    };
                    const existing = getHistory();
                    let idx = -1;
                    for (let i = 0; i < existing.length; i++) {
                        if (existing[i].id === sid) { idx = i; break; }
                    }
                    if (idx >= 0) {
                        existing[idx] = entry;
                    } else {
                        existing.unshift(entry);
                        if (existing.length > 30) existing.length = 30;
                    }
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(existing));
                    setHistoryVersion(function(v) { return v + 1; });
                    pushToCloud(existing);
                } catch(e) {}
            };

            // Auto-save: upsert whenever assignments or bill assignment status changes
            useEffect(function() {
                if (!sessionId || items.length === 0) return;
                upsertHistory(sessionId);
            }, [assignments, sessionId, billAssignedTo, billAssignedStatus, billCompletedBy]);

            const deleteHistoryEntry = (id) => {
                try {
                    const updated = getHistory().filter(e => e.id !== id);
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
                    setDeletingHistoryId(null);
                    setHistoryVersion(v => v + 1);
                    if (_user) {
                        setCloudSyncStatus('syncing');
                        deleteRemoteHistory(id)
                            .then(function() { setCloudSyncStatus('synced'); });
                    }
                } catch {}
            };

            // Load a history entry into the active session so the user can continue assigning
            const loadBillForEditing = (entry, assigneeMode) => {
                const entryItems = entry.items || [];
                if (entryItems.length === 0) return;
                setSessionId(entry.id);
                setItems(entryItems);
                setAssignments(entry.assignments || {});
                setReceiptDate(entry.receiptDate || '');
                setCurrentItemIndex(0);
                setShowSummary(false);
                setShowHistory(false);
                setReviewMode(false);
                setShowUnassignedOnly(true);
                setBillAssignedTo(entry.assignedTo || null);
                setBillAssignedBy(entry.assignedBy || null);
                setBillAssignedStatus(entry.assignedStatus || null);
                setBillCompletedBy(entry.completedBy || null);
                setBillCompletedAt(entry.completedAt || null);
                setIsAssigneeMode(assigneeMode === true);
            };

            const fetchAppUsers = () => {
                if (appUsers.length > 0) return;
                getAuthToken().then(function(token) {
                    if (!token) return;
                    fetch('/api/users', { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(function(r) { return r.json(); })
                        .then(function(data) { if (data.users) setAppUsers(data.users); })
                        .catch(function() {});
                });
            };

            const assignBillTo = (billEntry, targetEmail) => {
                const existing = getHistory();
                let idx = -1;
                for (let i = 0; i < existing.length; i++) {
                    if (existing[i].id === billEntry.id) { idx = i; break; }
                }
                if (idx < 0) return;
                existing[idx] = Object.assign({}, existing[idx], {
                    assignedTo: targetEmail,
                    assignedBy: _user ? _user.email : '',
                    assignedStatus: 'pending',
                    updatedAt: Date.now()
                });
                try { localStorage.setItem(HISTORY_KEY, JSON.stringify(existing)); } catch {}
                setHistoryVersion(function(v) { return v + 1; });
                pushToCloud(existing);
                const url = window.location.origin + window.location.pathname + '?bill=' + billEntry.id;
                const label = billEntry.receiptDate || new Date(billEntry.savedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                const text = 'I\'ve shared the ' + label + ' Sainsbury\'s receipt with you on the bill splitter.';
                if (navigator.share) {
                    navigator.share({ title: 'Shared Receipt', text: text, url: url }).catch(function() {});
                } else {
                    navigator.clipboard.writeText(text + ' ' + url).catch(function() {});
                }
                setShowAssignModal(null);
            };

            const markBillComplete = () => {
                const now = Date.now();
                const completedByEmail = _user ? _user.email : 'Unknown';
                setBillAssignedStatus('completed');
                setBillCompletedBy(completedByEmail);
                setBillCompletedAt(now);
                setIsAssigneeMode(false);
                if (sessionId) {
                    const existing = getHistory();
                    let idx = -1;
                    for (let i = 0; i < existing.length; i++) {
                        if (existing[i].id === sessionId) { idx = i; break; }
                    }
                    if (idx >= 0) {
                        existing[idx] = Object.assign({}, existing[idx], {
                            assignedStatus: 'completed',
                            completedBy: completedByEmail,
                            completedAt: now,
                            updatedAt: now
                        });
                        try { localStorage.setItem(HISTORY_KEY, JSON.stringify(existing)); } catch {}
                        setHistoryVersion(function(v) { return v + 1; });
                        pushToCloud(existing);
                    }
                }
                const assignedByEmail = billAssignedBy;
                if (assignedByEmail) {
                    getAuthToken().then(function(token) {
                        if (!token) return;
                        fetch('/api/notify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                            body: JSON.stringify({
                                completedBy: completedByEmail,
                                receiptDate: receiptDate || 'your receipt',
                                billId: sessionId,
                                assignedBy: assignedByEmail
                            })
                        }).catch(function() {});
                    });
                }
                setShowSummary(true);
            };

            // ── Learning / suggestions ────────────────────────────────────
            const normaliseItemName = (name) => {
                // Strip leading quantity like "14 x " or "12x " before matching
                return (name || '').replace(/^\d+\s*x\s+/i, '').trim().toLowerCase();
            };

            // Split a normalised name into meaningful words (drop single chars, punctuation)
            const wordTokenise = (name) => {
                return normaliseItemName(name)
                    .replace(/[^a-z0-9\s]/g, '')
                    .split(/\s+/)
                    .filter(function(w) { return w.length > 1; });
            };

            // Jaccard similarity on word sets: |intersection| / |union|
            const wordJaccard = (a, b) => {
                const ta = wordTokenise(a);
                const tb = wordTokenise(b);
                if (ta.length === 0 && tb.length === 0) return 1;
                if (ta.length === 0 || tb.length === 0) return 0;
                // Build lookup from tb
                const inB = {};
                for (let i = 0; i < tb.length; i++) inB[tb[i]] = true;
                let intersection = 0;
                for (let i = 0; i < ta.length; i++) { if (inB[ta[i]]) intersection++; }
                const union = ta.length + tb.length - intersection;
                return intersection / union;
            };

            // Returns { assignment, score } or null.
            // score === 1 → exact match; < 1 → fuzzy match above threshold.
            const getSuggestedAssignment = (itemName) => {
                const needle = normaliseItemName(itemName);
                if (!needle) return null;
                const hist = getHistory(); // newest first
                const FUZZY_THRESHOLD = 0.45;
                let bestAssignment = null;
                let bestScore = 0;
